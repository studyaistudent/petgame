<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>💕 너를 담아 연애 미니게임</title>
<meta property="og:title" content="💕 너를 담아 연애 미니게임">
<meta property="og:description" content="MBTI · 밸런스게임 · 연애성향 · 장미꽃 · 러브몬 육성 · 초성광장 · 캐치마인드 등">
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=Playfair+Display:ital,wght@0,700;1,400&display=swap');
:root {
  --rose:       #E8537A;
  --rose2:      #C73B65;
  --rose-lt:    #FDEEF4;
  --rose-pale:  #FFF6FA;
  --plum:       #7C3F7E;
  --gold:       #D4A853;
  --cream:      #FDF8F2;
  --text1:      #2A1A2E;
  --text2:      #6B4870;
  --text3:      #B89CB8;
  --border:     rgba(232,83,122,.18);
  --border2:    rgba(232,83,122,.35);
  --shadow:     0 4px 24px rgba(232,83,122,.12);
  --r:          14px;
  --r-sm:       10px;
  --mint:       #2EC4B6;
  --mint-lt:    #E8F8F7;
  --lm-gold:    #F0A500;
  --lm-purple:  #9B59B6;
}
*{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:'Noto Sans KR',sans-serif;
  background:#FDF0F6;
  background-image:
    radial-gradient(ellipse 60% 40% at 20% 10%,rgba(232,83,122,.10) 0%,transparent 60%),
    radial-gradient(ellipse 50% 50% at 80% 80%,rgba(124,63,126,.08) 0%,transparent 60%),
    radial-gradient(ellipse 40% 30% at 50% 50%,rgba(212,168,83,.05) 0%,transparent 60%);
  min-height:100vh;color:var(--text1);
}
body::before{
  content:'💕 🌹 💗 🌸 💘 ✨ 🐾 🥚 💕 🌹';
  position:fixed;top:0;left:0;width:100%;
  font-size:11px;letter-spacing:26px;
  color:rgba(232,83,122,.06);
  pointer-events:none;z-index:0;
  line-height:30px;word-spacing:18px;
  white-space:nowrap;overflow:hidden;
}
#app{max-width:560px;margin:0 auto;padding:1rem;position:relative;z-index:1;}
/* ── Card ── */
.card{background:rgba(255,255,255,.92);backdrop-filter:blur(8px);border:1px solid var(--border);border-radius:var(--r);padding:1.25rem;box-shadow:var(--shadow);}
.card-rose{background:linear-gradient(135deg,rgba(253,238,244,.95),rgba(253,245,250,.95));border-color:var(--border2);}
.card-mint{background:linear-gradient(135deg,rgba(232,248,247,.95),rgba(240,253,252,.95));border-color:rgba(46,196,182,.3);}
.card-gold{background:linear-gradient(135deg,rgba(253,248,230,.95),rgba(255,252,240,.95));border-color:rgba(212,168,83,.3);}
/* ── Buttons ── */
.btn{border:1.5px solid var(--border2);border-radius:var(--r-sm);padding:10px 16px;cursor:pointer;font-size:13.5px;font-family:'Noto Sans KR',sans-serif;background:white;color:var(--text1);transition:all .15s;display:inline-flex;align-items:center;justify-content:center;gap:5px;}
.btn:hover{background:var(--rose-lt);}
.btn:active{transform:scale(.97);}
.btn-primary{background:linear-gradient(135deg,var(--rose),var(--rose2)) !important;color:white !important;border:none !important;font-weight:500;box-shadow:0 3px 12px rgba(232,83,122,.35);}
.btn-primary:hover{opacity:.88;box-shadow:0 5px 18px rgba(232,83,122,.45);}
.btn-sel{background:linear-gradient(135deg,var(--rose),var(--rose2)) !important;color:white !important;border-color:transparent !important;}
.btn-plum{background:linear-gradient(135deg,var(--plum),#9C27B0) !important;color:white !important;border:none !important;box-shadow:0 3px 12px rgba(124,63,126,.3);}
.btn-mint{background:linear-gradient(135deg,var(--mint),#1A9E95) !important;color:white !important;border:none !important;box-shadow:0 3px 12px rgba(46,196,182,.3);}
.btn-gold{background:linear-gradient(135deg,var(--gold),#B8860B) !important;color:white !important;border:none !important;box-shadow:0 3px 12px rgba(212,168,83,.3);}
.btn-danger{color:#C62828 !important;border-color:#FFCDD2 !important;}
/* ── Inputs ── */
.inp{width:100%;padding:10px 14px;border:1.5px solid var(--border2);border-radius:var(--r-sm);font-size:13.5px;font-family:'Noto Sans KR',sans-serif;background:white;color:var(--text1);transition:border-color .15s,box-shadow .15s;}
.inp:focus{outline:none;border-color:var(--rose);box-shadow:0 0 0 3px rgba(232,83,122,.12);}
/* ── Progress bar ── */
.prog{height:6px;background:var(--rose-lt);border-radius:99px;overflow:hidden;}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--rose),var(--rose2));border-radius:99px;transition:width .5s cubic-bezier(.4,0,.2,1);}
.prog-mint{background:linear-gradient(90deg,var(--mint),#1A9E95);}
/* ── Tabs ── */
.tabs{display:flex;background:white;border:1px solid var(--border);border-radius:var(--r-sm);overflow-x:auto;margin-bottom:14px;scrollbar-width:none;}
.tabs::-webkit-scrollbar{display:none;}
.tab{flex-shrink:0;min-width:58px;padding:9px 6px;font-size:11px;font-family:'Noto Sans KR',sans-serif;background:transparent;border:none;border-right:1px solid var(--border);cursor:pointer;color:var(--text2);transition:all .15s;line-height:1.3;white-space:pre-line;text-align:center;}
.tab:last-child{border-right:none;}
.tab.on{background:linear-gradient(135deg,var(--rose),var(--rose2));color:white;font-weight:500;}
.tab.on-mint{background:linear-gradient(135deg,var(--mint),#1A9E95);color:white;font-weight:500;}
/* ── Answer buttons ── */
.ans{width:100%;padding:15px;border:1.5px solid var(--border);border-radius:var(--r-sm);background:white;color:var(--text1);cursor:pointer;font-size:14px;font-family:'Noto Sans KR',sans-serif;text-align:center;transition:all .15s;}
.ans:hover{background:var(--rose-lt);border-color:var(--rose);transform:translateY(-1px);}
.ans:active{transform:scale(.98);}
/* ── Scroll list ── */
.slist{max-height:220px;overflow-y:auto;display:flex;flex-direction:column;gap:5px;}
.slist::-webkit-scrollbar{width:3px;}
.slist::-webkit-scrollbar-thumb{background:var(--rose-lt);border-radius:99px;}
/* ── Animations ── */
@keyframes float{0%,100%{transform:translateY(0);}50%{transform:translateY(-7px);}}
@keyframes pulse{0%,100%{transform:scale(1);}50%{transform:scale(1.08);}}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
@keyframes shimmer{0%{background-position:-200% 0;}100%{background-position:200% 0;}}
@keyframes livePulse{0%,100%{opacity:1;}50%{opacity:0.4;}}
.float{animation:float 2.5s ease-in-out infinite;}
.pulse{animation:pulse 1.5s ease-in-out infinite;}
.fadein{animation:fadeIn .4s ease;}
.live-dot{width:7px;height:7px;background:#E8537A;border-radius:50%;display:inline-block;animation:livePulse 1.2s infinite;}
/* ── Score bar ── */
.sbar{height:7px;background:var(--rose-lt);border-radius:99px;overflow:hidden;flex:1;}
.sbar-fill{height:100%;background:linear-gradient(90deg,var(--rose),var(--rose2));border-radius:99px;transition:width .6s ease;}
/* ── Title decorative ── */
.title-deco{font-family:'Playfair Display',serif;font-style:italic;letter-spacing:.5px;}
/* ── Badges ── */
.rose-badge{display:inline-flex;align-items:center;gap:3px;background:linear-gradient(135deg,#FFE4EF,#FFC8DA);color:var(--rose2);padding:2px 9px;border-radius:99px;font-size:11px;font-weight:700;border:1px solid rgba(232,83,122,.3);}
.gold-badge{display:inline-flex;align-items:center;gap:3px;background:linear-gradient(135deg,#FFF3CD,#FFE082);color:#8B6914;padding:2px 9px;border-radius:99px;font-size:11px;font-weight:700;border:1px solid rgba(212,168,83,.4);}
/* ── Heart separator ── */
.sep{display:flex;align-items:center;gap:8px;font-size:11px;color:var(--text3);margin:6px 0;}
.sep::before,.sep::after{content:'';flex:1;height:1px;background:var(--border);}
.chip{display:inline-block;padding:2px 9px;border-radius:99px;font-size:11px;font-weight:500;}
/* ── LoveMon Specific ── */
.lm-pet-card{
  background:linear-gradient(160deg,rgba(253,238,244,.98),rgba(240,230,255,.98));
  border:1.5px solid rgba(155,89,182,.25);
  border-radius:18px;padding:1.4rem;text-align:center;
  box-shadow:0 6px 28px rgba(155,89,182,.12);
}
.lm-xp-bar{height:8px;background:rgba(155,89,182,.12);border-radius:99px;overflow:hidden;}
.lm-xp-fill{height:100%;background:linear-gradient(90deg,var(--rose),var(--lm-purple));border-radius:99px;transition:width .6s cubic-bezier(.4,0,.2,1);}
.lm-stat-row{display:flex;justify-content:center;gap:20px;margin:10px 0;}
.lm-stat{text-align:center;}
.lm-stat .val{font-size:22px;font-weight:700;line-height:1;}
.lm-stat .lbl{font-size:10.5px;color:var(--text3);margin-top:2px;}
.lm-cho-char{
  width:50px;height:50px;border-radius:12px;
  border:2px solid rgba(46,196,182,.4);
  background:white;display:inline-flex;align-items:center;justify-content:center;
  font-size:24px;font-weight:700;color:var(--mint);
  box-shadow:0 3px 12px rgba(46,196,182,.15);
  animation:pulse 2s ease-in-out infinite;
}
.lm-market-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.lm-market-item{
  border:1.5px solid var(--border);border-radius:12px;
  background:white;padding:10px 8px;text-align:center;
  cursor:pointer;transition:all .15s;
}
.lm-market-item:hover{border-color:var(--rose);background:var(--rose-lt);transform:translateY(-2px);}
.lm-market-item:active{transform:scale(.97);}
.lm-feed-log{max-height:150px;overflow-y:auto;}
.lm-feed-log::-webkit-scrollbar{width:3px;}
.lm-feed-log::-webkit-scrollbar-thumb{background:var(--rose-lt);}
.lm-chosung-chat{max-height:200px;overflow-y:auto;display:flex;flex-direction:column;gap:4px;}
.lm-chosung-chat::-webkit-scrollbar{width:3px;}
.lm-chosung-chat::-webkit-scrollbar-thumb{background:rgba(46,196,182,.2);}
.lm-chat-msg{padding:5px 8px;border-radius:8px;font-size:13px;display:flex;gap:6px;align-items:baseline;}
.lm-chat-msg.correct{background:rgba(232,83,122,.07);border:1px solid rgba(232,83,122,.2);}
.lm-chat-nick{font-weight:700;font-size:12px;color:var(--rose2);flex-shrink:0;}
.lm-family-row{display:flex;align-items:center;justify-content:center;gap:6px;padding:8px 0;border-bottom:1px solid var(--border);font-size:13px;flex-wrap:wrap;}
.lm-breed-incoming{background:rgba(155,89,182,.07);border:1px solid rgba(155,89,182,.2);border-radius:10px;padding:10px;margin-top:8px;}
.lm-lb-row{display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid var(--border);}
.lm-lb-rank{font-size:16px;width:26px;text-align:center;}
.lm-lb-pet{font-size:22px;}
.lm-lb-nick{flex:1;font-size:13px;font-weight:600;}
.lm-lb-pts{font-size:13px;font-weight:700;color:var(--gold);}
/* ── 추가된 커스텀 기능 UI ── */
.color-chart-grid {
  display: grid;
  grid-template-columns: repeat(5, 1fr); 
  gap: 8px; margin-top: 15px;
}
.color-slot {
  border: 1px solid var(--border); background: var(--cream);
  padding: 12px 5px;
  text-align: center; border-radius: 8px; cursor: pointer;
  transition: all 0.2s ease; box-shadow: 0 2px 4px rgba(232, 83, 122, 0.05);
}
.color-slot:hover {
  background: var(--rose-pale); border-color: var(--rose); transform: translateY(-2px);
}
.color-slot .slot-num { font-size: 0.75rem; color: var(--text3); margin-bottom: 4px;
}
.color-slot .slot-nick { font-size: 0.85rem; font-weight: 500; color: var(--text2); word-break: break-all; }
.color-slot.has-name { background: var(--rose-lt); border-color: var(--rose2);
}
.color-slot.has-name .slot-nick { color: var(--rose2); font-weight: 700; }
.action-btn.premium {
  background: linear-gradient(135deg, var(--gold), #e8c678);
  color: #fff; border: none; padding: 10px;
  border-radius: 8px; width: 100%;
  margin-top: 8px; cursor: pointer; font-weight: bold; font-family:'Noto Sans KR',sans-serif;
  box-shadow: 0 3px 10px rgba(212,168,83,.3);
  transition: all 0.2s ease;
}
.action-btn.premium:hover { opacity: 0.9; transform: translateY(-1px); }
.action-btn.premium:active { transform: scale(0.97);
}
/* ── 애정도 바 ── */
.affection-bar{height:5px;background:rgba(232,83,122,.12);border-radius:99px;overflow:hidden;margin-top:3px;}
.affection-fill{height:100%;background:linear-gradient(90deg,#F06292,var(--rose2));border-radius:99px;transition:width .5s ease;}
/* ── 장미꽃 알림판 스크롤 ── */
.mutual-roses-scroll{max-height:320px;overflow-y:auto;padding-right:2px;}
.mutual-roses-scroll::-webkit-scrollbar{width:3px;}
.mutual-roses-scroll::-webkit-scrollbar-thumb{background:var(--rose-lt);border-radius:99px;}
/* ── 2세 육아 케어 그리드 ── */
.baby-care-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px;}
.baby-care-item{
  border:1.5px solid var(--border);border-radius:12px;
  background:white;padding:12px 10px;text-align:center;
  cursor:pointer;transition:all .15s;
}
.baby-care-item:hover{border-color:var(--rose);background:var(--rose-lt);transform:translateY(-2px);}
.baby-care-item:active{transform:scale(.97);}
/* ── 던전 / 배틀 UI ── */
.dungeon-floor-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px;}
.dungeon-floor-card{border:1.5px solid var(--border);border-radius:12px;background:white;padding:12px 10px;text-align:center;cursor:pointer;transition:all .15s;}
.dungeon-floor-card:hover{border-color:var(--rose);background:var(--rose-lt);transform:translateY(-2px);}
.dungeon-floor-card.locked{opacity:.45;cursor:not-allowed;pointer-events:none;}
.hp-bar{height:10px;background:#FFCDD2;border-radius:99px;overflow:hidden;}
.hp-fill{height:100%;background:linear-gradient(90deg,#EF5350,#E53935);border-radius:99px;transition:width .4s ease;}
.mp-bar{height:10px;background:#BBDEFB;border-radius:99px;overflow:hidden;}
.mp-fill{height:100%;background:linear-gradient(90deg,#42A5F5,#1E88E5);border-radius:99px;transition:width .4s ease;}
.sp-bar{height:8px;background:#E1BEE7;border-radius:99px;overflow:hidden;}
.sp-fill{height:100%;background:linear-gradient(90deg,#AB47BC,#8E24AA);border-radius:99px;transition:width .4s ease;}
.battle-log{max-height:130px;overflow-y:auto;font-size:12px;line-height:1.7;color:var(--text2);padding:6px 8px;background:rgba(0,0,0,.02);border-radius:8px;border:1px solid var(--border);}
.battle-log::-webkit-scrollbar{width:3px;}
.battle-log::-webkit-scrollbar-thumb{background:var(--rose-lt);}
.skill-btn-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;}
.dice-stat-box{background:white;border:1.5px solid var(--border);border-radius:10px;padding:10px;text-align:center;}
.dice-stat-box .val{font-size:20px;font-weight:700;color:var(--rose2);}
.dice-stat-box .lbl{font-size:10.5px;color:var(--text3);margin-top:2px;}
/* ── 등급별 펫 글로우 효과 (3D 퀄리티) ── */
.glow-normal  { box-shadow: 0 0 15px rgba(158,158,158,.3), var(--shadow); }
.glow-rare    { box-shadow: 0 0 25px rgba(33,150,243,.5), 0 0 60px rgba(33,150,243,.15), var(--shadow); }
.glow-epic    { box-shadow: 0 0 30px rgba(156,39,176,.6), 0 0 80px rgba(156,39,176,.2), var(--shadow); }
.glow-unique  { box-shadow: 0 0 35px rgba(255,87,34,.7), 0 0 90px rgba(255,87,34,.25), var(--shadow); }
.glow-legend  { box-shadow: 0 0 40px rgba(244,67,54,.8), 0 0 100px rgba(244,67,54,.3), var(--shadow); }
.glow-rebirth { box-shadow: 0 0 50px rgba(255,215,0,1), 0 0 120px rgba(255,165,0,.6), 0 0 200px rgba(255,100,0,.3); animation: rebirthPulse 2s ease-in-out infinite; }
@keyframes rebirthPulse { 0%,100%{box-shadow:0 0 50px rgba(255,215,0,1),0 0 120px rgba(255,165,0,.6);} 50%{box-shadow:0 0 70px rgba(255,215,0,1),0 0 160px rgba(255,165,0,.8),0 0 250px rgba(255,100,0,.5);} }
/* ── 장착 아이템 슬롯 ── */
.equip-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:6px; margin-bottom:10px; }
.equip-slot { border:1.5px solid var(--border); border-radius:10px; background:white; padding:8px 6px; text-align:center; cursor:pointer; transition:all .15s; min-height:64px; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:2px; }
.equip-slot:hover { border-color:var(--rose); background:var(--rose-lt); transform:translateY(-2px); }
.equip-slot.filled { background:linear-gradient(135deg,rgba(232,83,122,.06),rgba(155,89,182,.06)); border-color:var(--rose2); }
.equip-slot .slot-emoji { font-size:24px; }
.equip-slot .slot-name { font-size:9px; color:var(--text3); }
.equip-slot .slot-item { font-size:10.5px; font-weight:600; color:var(--text1); }
.grade-normal  { color:#9E9E9E !important; }
.grade-rare    { color:#2196F3 !important; }
.grade-epic    { color:#9C27B0 !important; }
.grade-unique  { color:#FF5722 !important; }
.grade-legend  { color:#F44336 !important; }
.grade-god     { color:#FFD700 !important; }
/* ────────────────────────────────────────
   🏠 하우스 — 인테리어 잡지 감성 UI + 가구 편집기
   ──────────────────────────────────────── */
/* 메인 3D 캔버스 — 깊이감 있는 프레임 */
.house-stage {
  position: relative;
  border-radius: 20px;
  overflow: hidden;
  background:
    radial-gradient(ellipse at top, rgba(255,182,193,.15) 0%, transparent 60%),
    linear-gradient(180deg, #1f1a2e 0%, #0d0a18 100%);
  box-shadow:
    0 1px 0 rgba(255,255,255,.08) inset,
    0 24px 60px rgba(232,83,122,.18),
    0 8px 24px rgba(0,0,0,.25);
  border: 1px solid rgba(232,83,122,.2);
}
.house-stage::before {
  content: '';
  position: absolute; inset: 0;
  background:
    radial-gradient(circle at 20% 30%, rgba(232,83,122,.12), transparent 40%),
    radial-gradient(circle at 80% 70%, rgba(124,63,126,.10), transparent 40%);
  pointer-events: none; z-index: 1;
}
.house-canvas-wrap {
  width: 100%;
  height: 420px;
  position: relative;
  z-index: 2;
}
.house-canvas-wrap canvas { display: block; width: 100% !important; height: 100% !important; }
/* 상단 오버레이 */
.house-overlay-top {
  position: absolute;
  top: 14px; left: 14px; right: 14px;
  z-index: 3;
  display: flex; justify-content: space-between; align-items: flex-start;
  pointer-events: none;
}
.house-name-badge {
  display: inline-flex; align-items: center; gap: 8px;
  background: rgba(255,255,255,.92);
  backdrop-filter: blur(10px);
  border: 1px solid rgba(232,83,122,.25);
  border-radius: 99px;
  padding: 6px 14px 6px 10px;
  box-shadow: 0 4px 14px rgba(0,0,0,.18);
}
.house-name-badge .emoji { font-size: 18px; }
.house-name-badge .name { font-size: 12.5px; font-weight: 700; color: var(--text1); letter-spacing: .2px; }
.house-name-badge .meta { font-size: 10px; color: var(--text3); margin-left: 2px; }
.house-visitor-pill {
  display: inline-flex; align-items: center; gap: 5px;
  background: rgba(0,0,0,.5);
  backdrop-filter: blur(10px);
  border: 1px solid rgba(255,255,255,.15);
  color: #fff;
  border-radius: 99px;
  padding: 5px 12px;
  font-size: 11px;
  font-weight: 600;
}
.house-visitor-pill .dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: #4ADE80;
  box-shadow: 0 0 8px #4ADE80;
}
/* 편집 모드 알림 배지 */
.editing-banner {
  position: absolute;
  bottom: 50px; left: 50%; transform: translateX(-50%);
  z-index: 4;
  display: inline-flex; align-items: center; gap: 8px;
  background: linear-gradient(135deg, #FFD54F, #FFA726);
  color: #5D4037;
  border-radius: 99px;
  padding: 7px 16px;
  font-size: 12px;
  font-weight: 700;
  box-shadow: 0 6px 20px rgba(255,167,38,.5);
  animation: editPulse 1.5s ease-in-out infinite;
  letter-spacing: .3px;
}
@keyframes editPulse {
  0%,100% { transform: translateX(-50%) scale(1); }
  50% { transform: translateX(-50%) scale(1.04); }
}
/* 컨트롤 힌트 */
.house-ctrl-hint {
  position: absolute; bottom: 12px; right: 14px;
  z-index: 3;
  font-size: 10.5px;
  color: rgba(255,255,255,.65);
  background: rgba(0,0,0,.4);
  backdrop-filter: blur(6px);
  padding: 4px 10px;
  border-radius: 99px;
  pointer-events: none;
  letter-spacing: .3px;
}
/* 액션 바 */
.house-action-bar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 16px;
  background: linear-gradient(180deg, rgba(255,255,255,.96), rgba(253,238,244,.92));
  border-top: 1px solid var(--border);
}
.house-action-bar .info { font-size: 11.5px; color: var(--text2); }
.house-action-bar .info b { color: var(--text1); font-weight: 700; }
/* 섹션 헤더 */
.deco-section { margin-bottom: 14px; }
.deco-section-head {
  display: flex; align-items: baseline; justify-content: space-between;
  padding: 0 2px 10px;
  border-bottom: 1px solid var(--border);
  margin-bottom: 12px;
}
.deco-section-head .title {
  font-family: 'Playfair Display', serif;
  font-style: italic;
  font-size: 17px;
  font-weight: 700;
  color: var(--rose2);
  letter-spacing: .3px;
}
.deco-section-head .sub {
  font-size: 10.5px;
  color: var(--text3);
  letter-spacing: 1px;
  text-transform: uppercase;
}
/* 등급 카드 */
.tier-scroll {
  display: flex; gap: 10px;
  overflow-x: auto; scrollbar-width: none;
  padding-bottom: 4px; margin: 0 -4px;
}
.tier-scroll::-webkit-scrollbar { display: none; }
.tier-card-pro {
  flex-shrink: 0; width: 130px;
  border-radius: 14px; background: white;
  border: 1.5px solid var(--border);
  padding: 14px 10px 12px; text-align: center;
  cursor: pointer; transition: all .2s cubic-bezier(.4,0,.2,1);
  position: relative; overflow: hidden;
}
.tier-card-pro:hover {
  transform: translateY(-3px);
  border-color: var(--rose);
  box-shadow: 0 8px 20px rgba(232,83,122,.18);
}
.tier-card-pro.current {
  background: linear-gradient(160deg, var(--rose-lt), white);
  border-color: var(--rose2); border-width: 2px;
}
.tier-card-pro.current::before {
  content: 'NOW LIVING';
  position: absolute; top: 8px; right: -22px;
  background: var(--rose2); color: white;
  font-size: 8.5px; font-weight: 700;
  padding: 2px 24px; transform: rotate(35deg);
  letter-spacing: 1px;
}
.tier-card-pro.locked { opacity: .45; cursor: not-allowed; }
.tier-card-pro .tier-emoji {
  font-size: 38px; margin-bottom: 6px;
  filter: drop-shadow(0 3px 6px rgba(232,83,122,.25));
}
.tier-card-pro .tier-name { font-size: 13px; font-weight: 700; color: var(--text1); margin-bottom: 4px; }
.tier-card-pro .tier-meta { font-size: 10px; color: var(--text3); margin-bottom: 8px; line-height: 1.5; }
.tier-card-pro .tier-cost {
  font-size: 11.5px; font-weight: 700;
  color: var(--gold);
  padding: 4px 10px;
  background: rgba(212,168,83,.1);
  border-radius: 99px; display: inline-block;
}
.tier-card-pro.current .tier-cost { background: var(--rose); color: white; }
/* 벽지/바닥 스워치 */
.swatch-row { display: flex; gap: 8px; flex-wrap: wrap; }
.swatch-card {
  flex: 1; min-width: 88px;
  border-radius: 12px; overflow: hidden;
  cursor: pointer; border: 2px solid transparent;
  transition: all .2s; background: white;
}
.swatch-card:hover { transform: translateY(-2px); }
.swatch-card.active {
  border-color: var(--rose2);
  box-shadow: 0 6px 16px rgba(232,83,122,.25);
}
.swatch-preview { height: 48px; position: relative; }
.swatch-preview::after {
  content: ''; position: absolute; inset: 0;
  background: linear-gradient(180deg, rgba(255,255,255,.15), transparent 50%);
}
.swatch-info { padding: 6px 8px; text-align: center; }
.swatch-info .name { font-size: 11px; font-weight: 600; color: var(--text1); line-height: 1.2; }
.swatch-info .price { font-size: 10px; color: var(--gold); margin-top: 2px; font-weight: 600; }
.swatch-card.active .swatch-info .name { color: var(--rose2); }
/* 가구 상점 */
.furn-grid-pro { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.furn-card-pro {
  background: white; border-radius: 14px;
  border: 1.5px solid var(--border);
  padding: 14px 10px 10px; text-align: center;
  cursor: pointer; transition: all .2s cubic-bezier(.4,0,.2,1);
  position: relative; overflow: hidden;
}
.furn-card-pro:hover {
  transform: translateY(-3px);
  border-color: var(--rose);
  box-shadow: 0 10px 22px rgba(232,83,122,.18);
}
.furn-card-pro .grade-tag {
  position: absolute; top: 8px; left: 8px;
  font-size: 8.5px; font-weight: 700;
  padding: 2px 7px; border-radius: 99px;
  letter-spacing: .5px; text-transform: uppercase;
}
.furn-card-pro .grade-tag.normal { background: #ECEFF1; color: #607D8B; }
.furn-card-pro .grade-tag.rare   { background: #E3F2FD; color: #1976D2; }
.furn-card-pro .grade-tag.epic   { background: #F3E5F5; color: #8E24AA; }
.furn-card-pro .grade-tag.unique { background: #FFF3E0; color: #F4511E; }
.furn-card-pro .grade-tag.legend { background: linear-gradient(135deg,#FFE082,#FFB74D); color: #E65100; }
.furn-card-pro .furn-emoji {
  font-size: 44px; margin: 8px 0 6px;
  filter: drop-shadow(0 4px 8px rgba(0,0,0,.12));
  transition: transform .3s;
}
.furn-card-pro:hover .furn-emoji { transform: scale(1.1) rotate(-3deg); }
.furn-card-pro .furn-name { font-size: 12.5px; font-weight: 700; color: var(--text1); margin-bottom: 6px; line-height: 1.3; }
.furn-card-pro .furn-cost { font-size: 11.5px; font-weight: 700; color: var(--gold); }
/* 가구 칩 */
.furn-chip {
  display: inline-flex; align-items: center; gap: 5px;
  background: white;
  border: 1.5px solid var(--border);
  border-radius: 10px;
  padding: 7px 11px;
  font-size: 12px; font-weight: 600; color: var(--text1);
  cursor: pointer; transition: all .15s;
}
.furn-chip:hover { border-color: var(--rose); background: var(--rose-lt); }
.furn-chip.placed {
  background: linear-gradient(135deg, rgba(232,83,122,.08), rgba(155,89,182,.05));
  border-color: var(--rose2);
}
.furn-chip.editing {
  background: linear-gradient(135deg, #FFD54F, #FFA726) !important;
  border-color: #FF8F00 !important;
  color: #5D4037 !important;
  box-shadow: 0 4px 14px rgba(255,167,38,.4);
}
.furn-chip .chip-emoji { font-size: 18px; }
.furn-chip .chip-edit { color: var(--rose2); font-size: 11px; margin-left: 2px; }
/* ───────────────────────────────────────
   🎯 가구 편집기 패널
   ─────────────────────────────────────── */
.furniture-editor {
  background: linear-gradient(160deg, #FFFBF0 0%, #FFF8E1 100%);
  border: 2px solid #FFB74D;
  border-radius: 16px;
  padding: 14px;
  margin-bottom: 14px;
  box-shadow: 0 8px 26px rgba(255,167,38,.18);
  animation: slideDown .25s ease;
}
@keyframes slideDown {
  from { opacity: 0; transform: translateY(-8px); }
  to   { opacity: 1; transform: translateY(0); }
}
.editor-header {
  display: flex; align-items: center; gap: 10px;
  padding-bottom: 12px;
  border-bottom: 1px dashed rgba(255,143,0,.35);
  margin-bottom: 12px;
}
.editor-header .e-emoji {
  font-size: 32px;
  filter: drop-shadow(0 3px 6px rgba(0,0,0,.15));
}
.editor-header .e-name {
  flex: 1;
  font-size: 14px;
  font-weight: 700;
  color: #5D4037;
}
.editor-header .e-tag {
  display: inline-flex; align-items: center; gap: 4px;
  background: #FF8F00; color: white;
  border-radius: 99px;
  padding: 3px 10px;
  font-size: 10.5px;
  font-weight: 700;
  letter-spacing: .3px;
}
/* 편집 도움말 */
.editor-help {
  font-size: 10.5px;
  color: #8D6E63;
  text-align: center;
  background: rgba(255,255,255,.5);
  border-radius: 8px;
  padding: 6px 10px;
  margin-bottom: 10px;
  line-height: 1.5;
}
/* 컨트롤 행 */
.editor-row {
  display: grid;
  grid-template-columns: 50px 30px 1fr 30px 52px;
  align-items: center;
  gap: 6px;
  margin-bottom: 10px;
}
.editor-row .e-label {
  font-size: 11.5px;
  font-weight: 700;
  color: #6D4C41;
}
.editor-row .e-val {
  font-size: 12.5px;
  font-weight: 700;
  color: #E65100;
  text-align: right;
  font-variant-numeric: tabular-nums;
}
.e-step-btn {
  width: 30px; height: 30px;
  border-radius: 8px;
  border: 1.5px solid #FFB74D;
  background: white;
  color: #E65100;
  font-size: 13px;
  font-weight: 700;
  cursor: pointer;
  transition: all .12s;
  padding: 0;
  display: inline-flex; align-items: center; justify-content: center;
  user-select: none;
}
.e-step-btn:hover { background: #FFE0B2; transform: scale(1.05); }
.e-step-btn:active { transform: scale(.92); }
/* 슬라이더 */
.e-slider {
  -webkit-appearance: none;
  appearance: none;
  width: 100%; height: 8px;
  background: linear-gradient(90deg, #FFE0B2, #FFB74D);
  border-radius: 99px;
  outline: none;
  cursor: pointer;
}
.e-slider::-webkit-slider-thumb {
  -webkit-appearance: none;
  appearance: none;
  width: 22px; height: 22px;
  border-radius: 50%;
  background: linear-gradient(135deg, #FF6F00, #E65100);
  border: 2px solid white;
  box-shadow: 0 3px 8px rgba(230,81,0,.4);
  cursor: pointer;
  transition: transform .1s;
}
.e-slider::-webkit-slider-thumb:hover { transform: scale(1.12); }
.e-slider::-moz-range-thumb {
  width: 22px; height: 22px;
  border-radius: 50%;
  background: linear-gradient(135deg, #FF6F00, #E65100);
  border: 2px solid white;
  box-shadow: 0 3px 8px rgba(230,81,0,.4);
  cursor: pointer;
}
/* 회전 프리셋 */
.rot-presets {
  display: flex; gap: 4px;
  margin: 8px 0 12px;
  padding: 4px;
  background: rgba(255,143,0,.08);
  border-radius: 10px;
}
.rot-preset {
  flex: 1;
  padding: 7px 4px;
  border: none;
  background: transparent;
  font-size: 10.5px;
  font-weight: 700;
  color: #6D4C41;
  border-radius: 7px;
  cursor: pointer;
  transition: all .12s;
  font-family: 'Noto Sans KR', sans-serif;
}
.rot-preset:hover { background: white; color: #E65100; }
.rot-preset.active {
  background: linear-gradient(135deg, #FF8F00, #E65100);
  color: white;
  box-shadow: 0 2px 8px rgba(230,81,0,.35);
}
/* 액션 버튼 */
.editor-actions {
  display: flex; gap: 6px;
  padding-top: 10px;
  border-top: 1px dashed rgba(255,143,0,.35);
}
.editor-actions .btn {
  flex: 1;
  padding: 11px 8px;
  font-size: 12.5px;
}
.editor-actions .btn-cancel {
  background: white !important;
  color: #6D4C41 !important;
  border: 1.5px solid #FFB74D !important;
}
.editor-actions .btn-confirm {
  background: linear-gradient(135deg, #FF6F00, #E65100) !important;
  color: white !important;
  border: none !important;
  font-weight: 700;
  box-shadow: 0 4px 12px rgba(230,81,0,.35);
}
.editor-actions .btn-remove {
  background: white !important;
  color: #C62828 !important;
  border: 1.5px solid #EF9A9A !important;
}
/* 데코 탭 */
.deco-tabs {
  display: flex; gap: 4px;
  background: rgba(232,83,122,.06);
  border-radius: 10px;
  padding: 4px;
  margin-bottom: 14px;
}
.deco-tab {
  flex: 1;
  padding: 8px 6px;
  border: none;
  background: transparent;
  font-size: 11.5px;
  font-weight: 600;
  color: var(--text2);
  border-radius: 8px;
  cursor: pointer;
  transition: all .15s;
  font-family: 'Noto Sans KR', sans-serif;
}
.deco-tab.active {
  background: white;
  color: var(--rose2);
  box-shadow: 0 2px 8px rgba(232,83,122,.15);
}
/* 빈 상태 */
.empty-hint {
  text-align: center;
  padding: 24px 12px;
  color: var(--text3);
  font-size: 12.5px;
  background: rgba(0,0,0,.02);
  border-radius: 10px;
  border: 1px dashed var(--border);
}
.empty-hint .emoji { font-size: 32px; display: block; margin-bottom: 6px; opacity: .6; }
/* 온보딩 */
.house-onboarding {
  text-align: center;
  padding: 2.5rem 1.5rem;
  background:
    radial-gradient(circle at 50% 0%, rgba(232,83,122,.08), transparent 60%),
    linear-gradient(180deg, white, var(--rose-pale));
  border-radius: 18px;
  border: 1px solid var(--border);
  box-shadow: var(--shadow);
}
.house-onboarding .hero-emoji {
  font-size: 80px;
  display: inline-block;
  filter: drop-shadow(0 8px 16px rgba(232,83,122,.25));
  margin-bottom: 14px;
}
.house-onboarding h2 {
  font-family: 'Playfair Display', serif;
  font-style: italic;
  font-size: 22px;
  color: var(--rose2);
  margin-bottom: 8px;
}
.house-onboarding p {
  font-size: 13px; color: var(--text2);
  line-height: 1.75; margin-bottom: 20px;
}
/* 방명록 */
.guestbook-list {
  max-height: 240px;
  overflow-y: auto;
  background:
    repeating-linear-gradient(180deg, transparent 0, transparent 31px, rgba(232,83,122,.08) 31px, rgba(232,83,122,.08) 32px),
    linear-gradient(180deg, rgba(255,250,245,.6), rgba(255,255,255,0));
  border-radius: 10px;
  padding: 4px 12px;
}
.guestbook-entry {
  padding: 8px 0 10px;
  border-bottom: 1px dashed rgba(232,83,122,.18);
}
.guestbook-entry:last-child { border-bottom: none; }
.guestbook-entry .head {
  display: flex; align-items: baseline; gap: 6px;
  margin-bottom: 3px;
}
.guestbook-entry .head .nick {
  font-weight: 700;
  font-size: 12.5px;
  color: var(--rose2);
  font-family: 'Playfair Display', serif;
  font-style: italic;
}
.guestbook-entry .head .date {
  font-size: 10px; color: var(--text3); margin-left: auto;
}
.guestbook-entry .msg {
  font-size: 12.5px; color: var(--text1); line-height: 1.55;
}
/* ── 선물함 ── */
.gift-card { display:flex; align-items:center; gap:10px; padding:10px 12px; border:1.5px solid var(--border); border-radius:10px; background:white; margin-bottom:6px; }
.gift-card.unread { background:var(--rose-lt); border-color:var(--border2); }
.gift-unread-dot { width:8px; height:8px; background:var(--rose); border-radius:50%; flex-shrink:0; animation:pulse 1.5s infinite; }
/* ── 환생 ── */
.rebirth-btn { width:100%; padding:14px; font-size:15px; font-family:'Noto Sans KR',sans-serif; background:linear-gradient(135deg,#FF6B35,#FFD700,#FF6B35); background-size:200% 100%; color:white; border:none; border-radius:12px; cursor:pointer; font-weight:700; animation:shimmerBtn 2s linear infinite; box-shadow:0 4px 20px rgba(255,107,53,.5); }
@keyframes shimmerBtn { 0%{background-position:0% 0%} 100%{background-position:200% 0%} }
.rebirth-badge { display:inline-flex; align-items:center; gap:4px; background:linear-gradient(135deg,#FF6B35,#FFD700); color:white; padding:2px 10px; border-radius:99px; font-size:11px; font-weight:700; }
/* ── 던전 쿨타임 ── */
.dungeon-cooltime { display:flex; align-items:center; gap:10px; padding:12px 14px; background:linear-gradient(135deg,rgba(255,87,34,.08),rgba(255,152,0,.06)); border:1.5px solid rgba(255,87,34,.25); border-radius:12px; margin-bottom:12px; }
.cooltime-timer { font-size:22px; font-weight:700; color:#E64A19; font-variant-numeric:tabular-nums; }
/* ── 🎮 3D 미니 캔버스 — 펫 카드용 ── */
.pet3d-mini-canvas {
  width: 100%;
  height: 280px;
  border-radius: 20px;
  background:
    radial-gradient(ellipse at top, rgba(255,182,193,.25) 0%, transparent 60%),
    radial-gradient(ellipse at bottom, rgba(155,89,182,.15) 0%, transparent 60%),
    linear-gradient(180deg, #FFF5F8 0%, #F8E5F0 100%);
  box-shadow:
    inset 0 1px 2px rgba(255,255,255,.8),
    0 8px 24px rgba(232,83,122,.18);
  position: relative;
  overflow: hidden;
  border: 1.5px solid rgba(232,83,122,.18);
}
.pet3d-mini-canvas canvas { display: block; width: 100% !important; height: 100% !important; cursor: grab; }
.pet3d-mini-canvas canvas:active { cursor: grabbing; }
.pet3d-mini-canvas .lvl-badge {
  position: absolute; top: 8px; left: 10px; z-index: 3;
  background: linear-gradient(135deg, var(--rose), var(--rose2));
  color: white; font-size: 10.5px; font-weight: 700;
  padding: 3px 9px; border-radius: 99px;
  box-shadow: 0 2px 6px rgba(232,83,122,.4);
}
.pet3d-mini-canvas .ctrl-hint {
  position: absolute; bottom: 6px; right: 10px; z-index: 3;
  font-size: 9.5px; color: rgba(0,0,0,.4);
  background: rgba(255,255,255,.7); padding: 2px 8px; border-radius: 99px;
  pointer-events: none;
}

/* ── 👣 방문자 이력 ── */
.visitor-history-list {
  max-height: 280px;
  overflow-y: auto;
  display: flex;
  flex-direction: column;
  gap: 6px;
  padding: 4px 2px;
}
.visitor-history-list::-webkit-scrollbar { width: 4px; }
.visitor-history-list::-webkit-scrollbar-thumb { background: var(--rose-lt); border-radius: 99px; }
.visitor-entry {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 8px 12px;
  background: linear-gradient(135deg, rgba(253,238,244,.6), rgba(255,255,255,.9));
  border: 1px solid var(--border);
  border-radius: 10px;
  transition: all .15s;
}
.visitor-entry:hover {
  transform: translateX(2px);
  border-color: var(--rose2);
  background: linear-gradient(135deg, var(--rose-lt), white);
}
.visitor-entry .v-emoji { font-size: 22px; flex-shrink: 0; }
.visitor-entry .v-info { flex: 1; min-width: 0; }
.visitor-entry .v-nick { font-size: 13px; font-weight: 700; color: var(--text1); }
.visitor-entry .v-time { font-size: 10.5px; color: var(--text3); margin-top: 1px; }
.visitor-entry .v-count {
  font-size: 10.5px; color: var(--rose2);
  background: rgba(232,83,122,.1); padding: 2px 8px;
  border-radius: 99px; font-weight: 700; flex-shrink: 0;
}

/* ── 📋 펫 정보 모달 ── */
.pet-info-modal {
  position: fixed;
  inset: 0;
  z-index: 9999;
  background: rgba(0,0,0,.6);
  backdrop-filter: blur(6px);
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 1rem;
  animation: modalFadeIn .25s ease;
}
@keyframes modalFadeIn { from { opacity: 0; } to { opacity: 1; } }
.pet-info-modal-inner {
  background: white;
  border-radius: 20px;
  width: 100%;
  max-width: 420px;
  max-height: 90vh;
  overflow-y: auto;
  box-shadow: 0 20px 60px rgba(0,0,0,.4);
  animation: modalSlideUp .3s cubic-bezier(.4,0,.2,1);
}
@keyframes modalSlideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
.pet-info-modal-inner::-webkit-scrollbar { width: 5px; }
.pet-info-modal-inner::-webkit-scrollbar-thumb { background: var(--rose-lt); border-radius: 99px; }
.pet-info-header {
  background: linear-gradient(160deg, var(--rose), var(--plum));
  color: white;
  padding: 1.4rem 1.5rem 1rem;
  text-align: center;
  position: relative;
}
.pet-info-header .close-btn {
  position: absolute;
  top: 12px; right: 12px;
  background: rgba(255,255,255,.25);
  border: none;
  width: 30px; height: 30px;
  border-radius: 50%;
  color: white;
  font-size: 16px;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: background .15s;
}
.pet-info-header .close-btn:hover { background: rgba(255,255,255,.4); }
.pet-info-body { padding: 1.4rem; }
.stat-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
  margin-bottom: 16px;
}
.stat-tile {
  background: linear-gradient(135deg, rgba(253,238,244,.4), white);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 10px 12px;
}
.stat-tile .label {
  font-size: 10.5px;
  color: var(--text3);
  letter-spacing: .5px;
  margin-bottom: 4px;
}
.stat-tile .value {
  font-size: 18px;
  font-weight: 700;
  color: var(--text1);
  font-variant-numeric: tabular-nums;
}

/* 던전 쿨타임 라이브 카운트다운 */
function initDungeonCoolTimer(){
  if(window.__dungeonCoolTimer){clearInterval(window.__dungeonCoolTimer);window.__dungeonCoolTimer=null;}
  const myPet=S.myPet;
  if(!myPet)return;
  const cooldownEnd=(myPet.dungeonCooldownStart||0)+DUNGEON_COOLDOWN_MS;
  if(Date.now()>=cooldownEnd)return;
  const tick=()=>{
    const timerEl=document.getElementById('dungeon_cool_timer');
    const progEl=document.getElementById('dungeon_cool_progress');
    if(!timerEl){clearInterval(window.__dungeonCoolTimer);window.__dungeonCoolTimer=null;return;}
    const rem=cooldownEnd-Date.now();
    if(rem<=0){
      timerEl.textContent='✅ 완료!';
      clearInterval(window.__dungeonCoolTimer);window.__dungeonCoolTimer=null;
      setTimeout(()=>{if(S.screen==='board'&&S.tab==='lm_dungeon')render();},500);
      return;
    }
    const m=Math.floor(rem/60000);
    const s=Math.floor((rem%60000)/1000);
    timerEl.textContent=`${m}분 ${s}초`;
    if(progEl){
      const pct=Math.min(100,Math.round(((DUNGEON_COOLDOWN_MS-rem)/DUNGEON_COOLDOWN_MS)*100));
      progEl.style.width=pct+'%';
    }
  };
  tick();
  window.__dungeonCoolTimer=setInterval(tick,1000);
}
/* ═══════════════════════════════════════
   HELPERS
═══════════════════════════════════════ */
function esc(s){return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");}
function todayStr(){const d=new Date();return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;}
function shortNick(n){return(n||"").split("/")[0].trim();}
function getMBTICompat(t1,t2){const i=TYPES.indexOf(t1),j=TYPES.indexOf(t2);return(i>=0&&j>=0)?COMPAT[i][j]:null;}
function calcMBTI(ans){
  const c={E:0,I:0,S:0,N:0,T:0,F:0,J:0,P:0};
  QS.forEach(q=>{const a=ans[q.id];if(a===undefined)return;if(a>0)c[q.p]+=a;else if(a<0)c[OPP[q.p]]+=Math.abs(a);});
  return`${c.E>=c.I?"E":"I"}${c.S>=c.N?"S":"N"}${c.T>=c.F?"T":"F"}${c.J>=c.P?"J":"P"}`;
}
function calcPctCompat(e1,e2,questions){
  let match=0,total=0;
  questions.forEach(q=>{const v1=e1.answers?.[q.id],v2=e2.answers?.[q.id];if(v1!==undefined&&v2!==undefined){total++;if(v1===v2)match++;}});
return total>0?Math.round((match/total)*100):null;
}

/* ★ 고퀄리티 펫 캐릭터 렌더러 — 등급 후광 + 장착 아이템 시각화
   size: 'tiny' | 'small' | 'medium' | 'large' (기본 large)
   showShadow: 바닥 그림자 표시 여부 (기본 true)
   showEquipment: 장비 시각화 여부 (기본 true)
   showParticles: 진화 파티클 표시 여부 (기본 true) */
function renderPetCharacter(pet, opts={}){
  if(!pet||!pet.petEmoji) return '';
  const size = opts.size || 'large';
  const showShadow = opts.showShadow !== false;
  const showEquipment = opts.showEquipment !== false;
  const showParticles = opts.showParticles !== false;
  const rebirthCount = pet.rebirthCount || 0;
  const lv = pet.level || 1;
  /* 등급 클래스 결정 */
  let auraClass = '';
  let charClass = '';
  if (rebirthCount >= 15) { auraClass = 'aura-rebirth'; charClass = 'legend'; }
  else if (rebirthCount >= 10) { auraClass = 'aura-legend'; charClass = 'legend'; }
  else if (rebirthCount >= 5) { auraClass = 'aura-unique'; }
  else if (rebirthCount >= 2) { auraClass = 'aura-epic'; }
  else if (rebirthCount >= 1) { auraClass = 'aura-rare'; }
  else if (lv >= 99) { auraClass = 'aura-epic'; }
  else if (lv >= 50) { auraClass = 'aura-rare'; }
  /* 진화 파티클 (Lv.99+) */
  let particles = '';
  if (showParticles && lv >= 99) {
    particles = `<div class="evo-effect-particles">
      <span>✨</span><span>💫</span><span>⭐</span><span>🌟</span>
    </div>`;
  } else if (showParticles && lv >= 50) {
    particles = `<div class="evo-effect-particles">
      <span>✨</span><span>💫</span>
    </div>`;
  } else if (showParticles && lv >= 10) {
    particles = `<div class="evo-effect-particles">
      <span>🌸</span>
    </div>`;
  }
  /* 장착 아이템 오버레이 */
  let equipHTML = '';
  if (showEquipment && pet.equipment) {
    const eq = pet.equipment;
    if (eq.head)      equipHTML += `<span class="pet-equipment-overlay eq-head">${eq.head.emoji||''}</span>`;
    if (eq.weapon)    equipHTML += `<span class="pet-equipment-overlay eq-weapon">${eq.weapon.emoji||''}</span>`;
    if (eq.armor)     equipHTML += `<span class="pet-equipment-overlay eq-armor">${eq.armor.emoji||''}</span>`;
    if (eq.wing)      equipHTML += `<span class="pet-equipment-overlay eq-wing">${eq.wing.emoji||''}</span>`;
    if (eq.accessory) equipHTML += `<span class="pet-equipment-overlay eq-accessory">${eq.accessory.emoji||''}</span>`;
    if (eq.special)   equipHTML += `<span class="pet-equipment-overlay eq-special">${eq.special.emoji||''}</span>`;
  }
  return `<div class="pet-character-card ${auraClass}" style="display:inline-block;position:relative">
    ${particles}
    <div class="pet-character ${size} ${charClass}" style="position:relative;display:inline-block">
      ${pet.petEmoji}
      ${equipHTML}
    </div>
    ${showShadow ? '<div class="pet-shadow"></div>' : ''}
  </div>`;
}
/* ★ 던전 몹 캐릭터 렌더러 — 적 몹용 디자인 */
function renderMobCharacter(mob, opts={}){
  if(!mob||!mob.emoji) return '';

  const isDying = opts.isDying || false;
  const auraClass = mob.hp >= 1000 ? 'aura-legend' : mob.hp >= 500 ? 'aura-epic' : mob.hp >= 200 ? 'aura-rare' : '';
  return `<div class="pet-character-card ${auraClass}" style="display:inline-block;position:relative;${isDying?'opacity:.3;filter:grayscale(.8)':''}">
    ${mob.hp>=500 ? `<div class="evo-effect-particles">

    </div>` : ''}

      ${mob.emoji}

    <div class="pet-shadow"></div>

}

function formatDateKo(dateStr){

function msToHM(ms){
  const h=Math.floor(ms/3600000);
  const m=Math.floor((ms%3600000)/60000);
  if(h>0)return`${h}시간 ${m}분`;
  return`${m}분`;
}
/* ★ 선물함/로그용 — 분/시간/일/방금 자동 포맷 */
function formatTimeAgo(timestamp){
  if(!timestamp)return'방금 전';
  let ms;
  if(typeof timestamp==='number')ms=Date.now()-timestamp;
  else if(timestamp.toDate)ms=Date.now()-timestamp.toDate().getTime();
  else if(timestamp.toMillis)ms=Date.now()-timestamp.toMillis();
  else return'방금 전';
  if(ms<60000)return'방금 전';
  const mins=Math.floor(ms/60000);
  if(mins<60)return`${mins}분 전`;
  const hrs=Math.floor(mins/60);
  if(hrs<24)return`${hrs}시간 전`;
  const days=Math.floor(hrs/24);
  if(days<30)return`${days}일 전`;
  const months=Math.floor(days/30);
  if(months<12)return`${months}개월 전`;
  return`${Math.floor(months/12)}년 전`;
}
