    const muzzle = new THREE.Mesh(new THREE.SphereGeometry(0.18, 16, 16), muzzleMat);
    muzzle.position.set(0, -0.05, 0.35);
    muzzle.scale.set(1, 0.85, 0.9);
    headGroup.add(muzzle);
  }

  /* ── 부리 (올빼미) ── */
  if (D.hasBeak) {
    const beakMat = new THREE.MeshLambertMaterial({ color: 0xFFA500 });
    const beak = new THREE.Mesh(new THREE.ConeGeometry(0.08, 0.15, 6), beakMat);
    beak.position.set(0, -0.05, 0.42);
    beak.rotation.x = Math.PI / 2;
    headGroup.add(beak);
  }

  /* ── 코 (눈 아래) ── */
  if (D.hasMuzzle || D.hasBeak === undefined) {
    if (!D.hasBeak) {
      const noseMat = new THREE.MeshLambertMaterial({ color: D.nose });
      const nose = new THREE.Mesh(new THREE.SphereGeometry(0.05, 12, 12), noseMat);
      const nz = D.hasMuzzle ? 0.5 : 0.42;
      const ny = D.hasMuzzle ? 0 : -0.02;
      nose.position.set(0, ny, nz);
      nose.scale.set(1.2, 0.85, 0.85);
      headGroup.add(nose);
    }
  }

  /* ── 눈 (종별로 다름) ── */
  if (D.eyeShape === 'panda') {
    /* 판다 검정 눈 패치 + 그 안에 흰 눈 + 검은 동공 */
    const patchL = new THREE.Mesh(new THREE.SphereGeometry(0.1, 14, 14), blackMat);
    patchL.position.set(-0.14, 0.06, 0.36);
    patchL.scale.set(1.2, 1.4, 0.4);
    headGroup.add(patchL);
    const patchR = new THREE.Mesh(new THREE.SphereGeometry(0.1, 14, 14), blackMat);
    patchR.position.set(0.14, 0.06, 0.36);
    patchR.scale.set(1.2, 1.4, 0.4);
    headGroup.add(patchR);
    const eyeL = new THREE.Mesh(new THREE.SphereGeometry(0.045, 12, 12), whiteMat);
    eyeL.position.set(-0.14, 0.06, 0.42);
    headGroup.add(eyeL);
    const eyeR = new THREE.Mesh(new THREE.SphereGeometry(0.045, 12, 12), whiteMat);
    eyeR.position.set(0.14, 0.06, 0.42);
    headGroup.add(eyeR);
    const pupilL = new THREE.Mesh(new THREE.SphereGeometry(0.025, 10, 10), blackMat);
    pupilL.position.set(-0.14, 0.06, 0.46);
    headGroup.add(pupilL);
    const pupilR = new THREE.Mesh(new THREE.SphereGeometry(0.025, 10, 10), blackMat);
    pupilR.position.set(0.14, 0.06, 0.46);
    headGroup.add(pupilR);
  } else if (D.eyeShape === 'frog') {
    /* 개구리 — 머리 위에 솟은 큰 눈 */
    const eyeBaseL = new THREE.Mesh(new THREE.SphereGeometry(0.14, 14, 14), bodyMat);
    eyeBaseL.position.set(-0.2, 0.36, 0.15);
    headGroup.add(eyeBaseL);
    const eyeBaseR = new THREE.Mesh(new THREE.SphereGeometry(0.14, 14, 14), bodyMat);
    eyeBaseR.position.set(0.2, 0.36, 0.15);
    headGroup.add(eyeBaseR);
    const eyeL = new THREE.Mesh(new THREE.SphereGeometry(0.085, 14, 14), whiteMat);
    eyeL.position.set(-0.2, 0.4, 0.21);
    headGroup.add(eyeL);
    const eyeR = new THREE.Mesh(new THREE.SphereGeometry(0.085, 14, 14), whiteMat);
    eyeR.position.set(0.2, 0.4, 0.21);
    headGroup.add(eyeR);
    const pupilL = new THREE.Mesh(new THREE.SphereGeometry(0.045, 10, 10), blackMat);
    pupilL.position.set(-0.2, 0.4, 0.27);
    headGroup.add(pupilL);
    const pupilR = new THREE.Mesh(new THREE.SphereGeometry(0.045, 10, 10), blackMat);
    pupilR.position.set(0.2, 0.4, 0.27);
    headGroup.add(pupilR);
  } else if (D.eyeShape === 'huge') {
    /* 올빼미 — 큰 부엉이 눈 */
    const eyeOuterMat = new THREE.MeshLambertMaterial({ color: 0xFFD700 });
    const eyeL = new THREE.Mesh(new THREE.SphereGeometry(0.13, 16, 16), eyeOuterMat);
    eyeL.position.set(-0.16, 0.08, 0.37);
    eyeL.scale.set(1, 1, 0.5);
    headGroup.add(eyeL);
    const eyeR = new THREE.Mesh(new THREE.SphereGeometry(0.13, 16, 16), eyeOuterMat);
    eyeR.position.set(0.16, 0.08, 0.37);
    eyeR.scale.set(1, 1, 0.5);
    headGroup.add(eyeR);
    const pupilL = new THREE.Mesh(new THREE.SphereGeometry(0.06, 12, 12), blackMat);
    pupilL.position.set(-0.16, 0.08, 0.43);
    headGroup.add(pupilL);
    const pupilR = new THREE.Mesh(new THREE.SphereGeometry(0.06, 12, 12), blackMat);
    pupilR.position.set(0.16, 0.08, 0.43);
    headGroup.add(pupilR);
  } else if (D.eyeShape === 'sharp') {
    /* 여우/사자/너구리 — 날카로운 눈 (반쯤 감긴 듯) */
    const eyeWhiteL = new THREE.Mesh(new THREE.SphereGeometry(0.06, 12, 12), whiteMat);
    eyeWhiteL.position.set(-0.14, 0.05, 0.4);
    eyeWhiteL.scale.set(1, 0.5, 0.5);
    headGroup.add(eyeWhiteL);
    const eyeWhiteR = new THREE.Mesh(new THREE.SphereGeometry(0.06, 12, 12), whiteMat);
    eyeWhiteR.position.set(0.14, 0.05, 0.4);
    eyeWhiteR.scale.set(1, 0.5, 0.5);
    headGroup.add(eyeWhiteR);
    const pupilL = new THREE.Mesh(new THREE.SphereGeometry(0.035, 10, 10), blackMat);
    pupilL.position.set(-0.14, 0.05, 0.44);
    headGroup.add(pupilL);
    const pupilR = new THREE.Mesh(new THREE.SphereGeometry(0.035, 10, 10), blackMat);
    pupilR.position.set(0.14, 0.05, 0.44);
    headGroup.add(pupilR);
  } else if (D.eyeShape === 'cat') {
    /* 고양이 — 큰 눈 + 세로 동공 */
    const eyeWhiteMat = new THREE.MeshLambertMaterial({ color: 0xFFFF99 });
    const eyeL = new THREE.Mesh(new THREE.SphereGeometry(0.08, 14, 14), eyeWhiteMat);
    eyeL.position.set(-0.16, 0.06, 0.38);
    eyeL.scale.set(1, 1.2, 0.5);
    headGroup.add(eyeL);
    const eyeR = new THREE.Mesh(new THREE.SphereGeometry(0.08, 14, 14), eyeWhiteMat);
    eyeR.position.set(0.16, 0.06, 0.38);
    eyeR.scale.set(1, 1.2, 0.5);
    headGroup.add(eyeR);
    const pupilL = new THREE.Mesh(new THREE.SphereGeometry(0.035, 10, 10), blackMat);
    pupilL.position.set(-0.16, 0.06, 0.43);
    pupilL.scale.set(0.6, 1.4, 0.5);
    headGroup.add(pupilL);
    const pupilR = new THREE.Mesh(new THREE.SphereGeometry(0.035, 10, 10), blackMat);
    pupilR.position.set(0.16, 0.06, 0.43);
    pupilR.scale.set(0.6, 1.4, 0.5);
    headGroup.add(pupilR);
  } else if (D.eyeShape === 'bead') {
    /* 햄스터/쥐/고슴도치 — 작은 검정 콩알 눈 */
    const eyeL = new THREE.Mesh(new THREE.SphereGeometry(0.05, 12, 12), blackMat);
    eyeL.position.set(-0.13, 0.05, 0.4);
    headGroup.add(eyeL);
    const eyeR = new THREE.Mesh(new THREE.SphereGeometry(0.05, 12, 12), blackMat);
    eyeR.position.set(0.13, 0.05, 0.4);
    headGroup.add(eyeR);
    /* 작은 반짝임 */
    const sparkleL = new THREE.Mesh(new THREE.SphereGeometry(0.018, 8, 8), whiteMat);
    sparkleL.position.set(-0.12, 0.07, 0.44);
    headGroup.add(sparkleL);
    const sparkleR = new THREE.Mesh(new THREE.SphereGeometry(0.018, 8, 8), whiteMat);
    sparkleR.position.set(0.14, 0.07, 0.44);
    headGroup.add(sparkleR);
  } else {
    /* round (기본 — 강아지/곰/토끼/거북/코알라) */
    const eyeL = new THREE.Mesh(new THREE.SphereGeometry(0.07, 14, 14), whiteMat);
    eyeL.position.set(-0.14, 0.06, 0.38);
    eyeL.scale.set(1, 1, 0.5);
    headGroup.add(eyeL);
    const eyeR = new THREE.Mesh(new THREE.SphereGeometry(0.07, 14, 14), whiteMat);
    eyeR.position.set(0.14, 0.06, 0.38);
    eyeR.scale.set(1, 1, 0.5);
    headGroup.add(eyeR);
    const pupilL = new THREE.Mesh(new THREE.SphereGeometry(0.04, 10, 10), blackMat);
    pupilL.position.set(-0.14, 0.05, 0.42);
    headGroup.add(pupilL);
    const pupilR = new THREE.Mesh(new THREE.SphereGeometry(0.04, 10, 10), blackMat);
    pupilR.position.set(0.14, 0.05, 0.42);
    headGroup.add(pupilR);
    /* 반짝임 */
    const sparkleL = new THREE.Mesh(new THREE.SphereGeometry(0.015, 8, 8), whiteMat);
    sparkleL.position.set(-0.13, 0.08, 0.46);
    headGroup.add(sparkleL);
    const sparkleR = new THREE.Mesh(new THREE.SphereGeometry(0.015, 8, 8), whiteMat);
    sparkleR.position.set(0.15, 0.08, 0.46);
    headGroup.add(sparkleR);
  }

  /* ── 입 ── */
  if (D.mouthType === 'smile' || D.mouthType === 'smile_dog') {
    /* 미소 — 토러스 호 */
    const mouthMat = new THREE.MeshLambertMaterial({ color: 0x6D1B2E });
    const mouth = new THREE.Mesh(new THREE.TorusGeometry(0.05, 0.012, 6, 12, Math.PI), mouthMat);
    mouth.position.set(0, -0.16, D.hasMuzzle ? 0.5 : 0.41);
    mouth.rotation.z = Math.PI;
    headGroup.add(mouth);
  } else if (D.mouthType === 'cat') {
    /* 고양이 — 세 점선 입 */
    const mouthMat = new THREE.MeshLambertMaterial({ color: 0x6D1B2E });
    const m1 = new THREE.Mesh(new THREE.TorusGeometry(0.025, 0.008, 4, 8, Math.PI), mouthMat);
    m1.position.set(-0.025, -0.13, 0.41);
    m1.rotation.z = Math.PI;
    headGroup.add(m1);
    const m2 = new THREE.Mesh(new THREE.TorusGeometry(0.025, 0.008, 4, 8, Math.PI), mouthMat);
    m2.position.set(0.025, -0.13, 0.41);
    m2.rotation.z = Math.PI;
    headGroup.add(m2);
    /* 수염 */
    if (D.hasWhiskers) {
      const whiskerMat = new THREE.MeshBasicMaterial({ color: 0xFFFFFF });
      for (let side = -1; side <= 1; side += 2) {
        for (let i = 0; i < 3; i++) {
          const w = new THREE.Mesh(new THREE.CylinderGeometry(0.003, 0.003, 0.18, 4), whiskerMat);
          w.position.set(side * 0.18, -0.08 + i * 0.04, 0.36);
          w.rotation.z = side * 0.1;
          w.rotation.y = side * Math.PI / 2;
          headGroup.add(w);
        }
      }
    }
  } else if (D.mouthType === 'bunny') {
    /* 토끼 — Y 모양 */
    const mouthMat = new THREE.MeshLambertMaterial({ color: 0x6D1B2E });
    const stem = new THREE.Mesh(new THREE.BoxGeometry(0.012, 0.05, 0.01), mouthMat);
    stem.position.set(0, -0.14, 0.41);
    headGroup.add(stem);
    const m1 = new THREE.Mesh(new THREE.TorusGeometry(0.025, 0.008, 4, 8, Math.PI), mouthMat);
    m1.position.set(-0.025, -0.17, 0.41);
    m1.rotation.z = Math.PI;
    headGroup.add(m1);
    const m2 = new THREE.Mesh(new THREE.TorusGeometry(0.025, 0.008, 4, 8, Math.PI), mouthMat);
    m2.position.set(0.025, -0.17, 0.41);
    m2.rotation.z = Math.PI;
    headGroup.add(m2);
    /* 토끼 이빨 (앞니 2개) */
    const toothMat = new THREE.MeshLambertMaterial({ color: 0xFFFFFF });
    const tooth = new THREE.Mesh(new THREE.BoxGeometry(0.05, 0.05, 0.02), toothMat);
    tooth.position.set(0, -0.19, 0.42);
    headGroup.add(tooth);
  } else if (D.mouthType === 'wide') {
    /* 개구리 — 넓은 입 */
    const mouthMat = new THREE.MeshLambertMaterial({ color: 0x4A0E1F });
    const mouth = new THREE.Mesh(new THREE.TorusGeometry(0.15, 0.018, 6, 16, Math.PI), mouthMat);
    mouth.position.set(0, -0.15, 0.38);
    mouth.rotation.z = Math.PI;
    headGroup.add(mouth);
  } else if (D.mouthType === 'beak') {
    /* 부리 (위/아래) */
    const beakBotMat = new THREE.MeshLambertMaterial({ color: 0xFF8C00 });
    const lower = new THREE.Mesh(new THREE.ConeGeometry(0.06, 0.08, 6), beakBotMat);
    lower.position.set(0, -0.12, 0.38);
    lower.rotation.x = -Math.PI / 2;
    headGroup.add(lower);
  } else if (D.mouthType === 'smirk') {
    /* 악동 — 비웃는 입 */
    const mouthMat = new THREE.MeshLambertMaterial({ color: 0x6D1B2E });
    const mouth = new THREE.Mesh(new THREE.TorusGeometry(0.06, 0.014, 6, 12, Math.PI), mouthMat);
    mouth.position.set(0.02, -0.14, 0.4);
    mouth.rotation.z = Math.PI + 0.3;
    headGroup.add(mouth);
  } else {
    /* small — 작은 점 */
    const mouthMat = new THREE.MeshLambertMaterial({ color: 0x6D1B2E });
    const mouth = new THREE.Mesh(new THREE.SphereGeometry(0.018, 8, 8), mouthMat);
    mouth.position.set(0, -0.14, 0.41);
    mouth.scale.set(1.5, 0.7, 0.5);
    headGroup.add(mouth);
  }

  /* ── 사자 갈기 ── */
  if (D.hasMane) {
    const maneMat = new THREE.MeshLambertMaterial({ color: 0x8B4513 });
    for (let i = 0; i < 14; i++) {
      const angle = (i / 14) * Math.PI * 2;
      const mane = new THREE.Mesh(new THREE.SphereGeometry(0.13, 10, 10), maneMat);
      mane.position.set(Math.cos(angle) * 0.42, Math.sin(angle) * 0.42 * 0.7, -0.1);
      mane.scale.set(1, 1, 0.8);
      headGroup.add(mane);
    }
  }

  /* ── 너구리 가면 ── */
  if (D.hasMask) {
    const maskMat = new THREE.MeshLambertMaterial({ color: 0x1A1A1A });
    const maskL = new THREE.Mesh(new THREE.SphereGeometry(0.1, 12, 12), maskMat);
    maskL.position.set(-0.14, 0.06, 0.34);
    maskL.scale.set(1.3, 0.9, 0.3);
    headGroup.add(maskL);
    const maskR = new THREE.Mesh(new THREE.SphereGeometry(0.1, 12, 12), maskMat);
    maskR.position.set(0.14, 0.06, 0.34);
    maskR.scale.set(1.3, 0.9, 0.3);
    headGroup.add(maskR);
  }

  /* ── 호랑이 무늬 ── */
  if (D.hasStripes) {
    const stripeMat = new THREE.MeshLambertMaterial({ color: 0x1A1A1A });
    for (let i = 0; i < 3; i++) {
      const s = new THREE.Mesh(new THREE.BoxGeometry(0.04, 0.04, 0.06), stripeMat);
      s.position.set(-0.32 + i * 0.05, 0.22, 0.28);
      s.rotation.z = 0.3;
      headGroup.add(s);
    }
    for (let i = 0; i < 3; i++) {
      const s = new THREE.Mesh(new THREE.BoxGeometry(0.04, 0.04, 0.06), stripeMat);
      s.position.set(0.32 - i * 0.05, 0.22, 0.28);
      s.rotation.z = -0.3;
      headGroup.add(s);
    }
  }

  /* ── 볼터치 (선택적) ── */
  if (!D.hasMask && !D.hasPandaEyes && D.eyeShape !== 'frog' && D.eyeShape !== 'huge') {
    const cheekMat = new THREE.MeshBasicMaterial({ color: 0xFF8FB5, transparent: true, opacity: 0.55 });
    const cheekL = new THREE.Mesh(new THREE.SphereGeometry(0.06, 10, 10), cheekMat);
    cheekL.position.set(-0.3, -0.08, 0.32);
    headGroup.add(cheekL);
    const cheekR = new THREE.Mesh(new THREE.SphereGeometry(0.06, 10, 10), cheekMat);
    cheekR.position.set(0.3, -0.08, 0.32);
    headGroup.add(cheekR);
  }

  headGroup.position.y = 1.45;
  group.add(headGroup);
  ud.headGroup = headGroup;

  /* ═══════════════ 몸통 ═══════════════ */
  const torso = new THREE.Mesh(new THREE.SphereGeometry(0.4, 24, 24), bodyMat);
  torso.castShadow = true;
  torso.scale.set(1, 1.15, 0.95);
  torso.position.y = 0.85;
  group.add(torso);
  /* 등껍질 (거북이) */
  if (D.hasShell) {
    const shellMat = new THREE.MeshLambertMaterial({ color: 0x4E342E });
    const shell = new THREE.Mesh(new THREE.SphereGeometry(0.5, 20, 20, 0, Math.PI * 2, 0, Math.PI / 2), shellMat);
    shell.position.y = 0.95;
    shell.castShadow = true;
    group.add(shell);
    /* 등껍질 패턴 (육각형들) */
    const patMat = new THREE.MeshLambertMaterial({ color: 0x6D4C41 });
    for (let i = 0; i < 6; i++) {
      const a = (i / 6) * Math.PI * 2;
      const hex = new THREE.Mesh(new THREE.CylinderGeometry(0.08, 0.08, 0.02, 6), patMat);
      hex.position.set(Math.cos(a) * 0.25, 1.05, Math.sin(a) * 0.25);
      group.add(hex);
    }
  }

  /* 고슴도치 가시 */
  if (D.hasSpikes) {
    const spikeMat = new THREE.MeshLambertMaterial({ color: 0x5D4037 });
    for (let i = 0; i < 30; i++) {
      const spike = new THREE.Mesh(new THREE.ConeGeometry(0.04, 0.15, 5), spikeMat);
      const theta = Math.random() * Math.PI * 2;
      const phi = Math.random() * Math.PI * 0.6;
      spike.position.set(
        Math.sin(phi) * Math.cos(theta) * 0.42,
        0.85 + Math.cos(phi) * 0.42,
        Math.sin(phi) * Math.sin(theta) * 0.42 - 0.05
      );
      spike.lookAt(0, 0.85, -0.1);
      spike.rotateX(-Math.PI);
      group.add(spike);
    }
  }

  /* 배 (흰색 포인트 — 갑옷 가린 종 제외) */
  if (!D.hasShell && !D.hasSpikes) {
    const bellyMat = new THREE.MeshLambertMaterial({ color: D.muzzle, transparent: true, opacity: 0.85 });
    const belly = new THREE.Mesh(new THREE.SphereGeometry(0.3, 16, 16), bellyMat);
    belly.scale.set(0.8, 1, 0.6);
    belly.position.set(0, 0.78, 0.18);
    group.add(belly);
  }

  /* ═══════════════ 팔 ═══════════════ */
  const armL = new THREE.Group();
  const upperArmL = new THREE.Mesh(new THREE.CylinderGeometry(0.09, 0.085, 0.32, 12), bodyMat);
  upperArmL.position.y = -0.16;
  upperArmL.castShadow = true;
  armL.add(upperArmL);
  const forearmL = new THREE.Mesh(new THREE.CylinderGeometry(0.085, 0.07, 0.28, 12), bodyMat);
  forearmL.position.y = -0.45;
  forearmL.castShadow = true;
  armL.add(forearmL);
  const handL = new THREE.Mesh(new THREE.SphereGeometry(0.1, 12, 12), accentMat);
  handL.position.y = -0.62;
  handL.castShadow = true;
  armL.add(handL);
  for (let i = 0; i < 3; i++) {
    const finger = new THREE.Mesh(new THREE.SphereGeometry(0.025, 8, 8), accentMat);
    finger.position.set(-0.06 + i * 0.04, -0.7, 0.06);
    armL.add(finger);
  }
  armL.position.set(-0.45, 1.0, 0);
  armL.rotation.z = 0.25;
  group.add(armL);
  ud.armL = armL;
  const armR = new THREE.Group();
  const upperArmR = new THREE.Mesh(new THREE.CylinderGeometry(0.09, 0.085, 0.32, 12), bodyMat);
  upperArmR.position.y = -0.16;
  upperArmR.castShadow = true;
  armR.add(upperArmR);
  const forearmR = new THREE.Mesh(new THREE.CylinderGeometry(0.085, 0.07, 0.28, 12), bodyMat);
  forearmR.position.y = -0.45;
  forearmR.castShadow = true;
  armR.add(forearmR);
  const handR = new THREE.Mesh(new THREE.SphereGeometry(0.1, 12, 12), accentMat);
  handR.position.y = -0.62;
  handR.castShadow = true;
  armR.add(handR);
  for (let i = 0; i < 3; i++) {
    const finger = new THREE.Mesh(new THREE.SphereGeometry(0.025, 8, 8), accentMat);
    finger.position.set(-0.06 + i * 0.04, -0.7, 0.06);
    armR.add(finger);
  }
  armR.position.set(0.45, 1.0, 0);
  armR.rotation.z = -0.25;
  group.add(armR);
  ud.armR = armR;
  /* ═══════════════ 다리 ═══════════════ */
  const legL = new THREE.Group();
  const thighL = new THREE.Mesh(new THREE.CylinderGeometry(0.11, 0.1, 0.3, 12), bodyMat);
  thighL.position.y = -0.15;
  thighL.castShadow = true;
  legL.add(thighL);
  const shinL = new THREE.Mesh(new THREE.CylinderGeometry(0.1, 0.09, 0.28, 12), bodyMat);
  shinL.position.y = -0.44;
  shinL.castShadow = true;
  legL.add(shinL);
  const footL = new THREE.Mesh(new THREE.SphereGeometry(0.13, 12, 12), accentMat);
  footL.position.set(0, -0.62, 0.06);
  footL.scale.set(1, 0.5, 1.3);
  footL.castShadow = true;
  legL.add(footL);
  legL.position.set(-0.18, 0.45, 0);
  group.add(legL);
  ud.legL = legL;

  const legR = new THREE.Group();
  const thighR = new THREE.Mesh(new THREE.CylinderGeometry(0.11, 0.1, 0.3, 12), bodyMat);
  thighR.position.y = -0.15;
  thighR.castShadow = true;
  legR.add(thighR);
  const shinR = new THREE.Mesh(new THREE.CylinderGeometry(0.1, 0.09, 0.28, 12), bodyMat);
  shinR.position.y = -0.44;
  shinR.castShadow = true;
  legR.add(shinR);
  const footR = new THREE.Mesh(new THREE.SphereGeometry(0.13, 12, 12), accentMat);
  footR.position.set(0, -0.62, 0.06);
  footR.scale.set(1, 0.5, 1.3);
  footR.castShadow = true;
  legR.add(footR);
  legR.position.set(0.18, 0.45, 0);
  group.add(legR);
  ud.legR = legR;

  /* ═══════════════ 꼬리 (종별) ═══════════════ */
  const tail = new THREE.Group();
  if (D.tailType === 'wag') {
    /* 강아지 — 위로 솟은 꼬리 */
    const tailSeg = new THREE.Mesh(new THREE.SphereGeometry(0.1, 12, 12), accentMat);
    tailSeg.position.set(0, 0.2, 0);
    tailSeg.scale.set(1, 1.5, 1);
    tail.add(tailSeg);
    tail.position.set(0, 0.85, -0.4);
    tail.rotation.x = -0.5;
  } 
  else if (D.tailType === 'bird') {
      const tailGeo = new THREE.SphereGeometry(0.12, 12, 12);
      
      // 꼬리 1단계 (기본)
      const tailSeg1 = new THREE.Mesh(tailGeo, accentMat);
      tailSeg1.position.set(0, 0, 0);
      tail.add(tailSeg1);
      
      // 꼬리 2단계 (중간)
      const tailSeg2 = new THREE.Mesh(new THREE.SphereGeometry(0.14, 12, 12), accentMat);
      tailSeg2.position.set(0, 0.15, -0.05);
      tail.add(tailSeg2);
      
      // 꼬리 끝 (깃털 펼친 느낌)
      const tip = new THREE.Mesh(new THREE.SphereGeometry(0.13, 12, 12), accentMat);
      tip.position.set(0, 0.25, -0.15);
      tail.add(tip);
      
      tail.position.set(0, 0.6, -0.4); 

   }else if (D.tailType === 'bushy_white') {
    /* 여우 — 큰 꼬리, 흰색 끝 */
    const tailSeg1 = new THREE.Mesh(new THREE.SphereGeometry(0.14, 14, 14), accentMat);
    tailSeg1.position.y = 0;
    tail.add(tailSeg1);
    const tailSeg2 = new THREE.Mesh(new THREE.SphereGeometry(0.16, 14, 14), accentMat);
    tailSeg2.position.set(0, 0.18, -0.05);
    tail.add(tailSeg2);
    const tip = new THREE.Mesh(new THREE.SphereGeometry(0.15, 14, 14), whiteMat);
    tip.position.set(0, 0.36, -0.1);
    tail.add(tip);
    tail.position.set(0, 0.7, -0.4);
  } else if (D.tailType === 'lion') {
    /* 사자 — 술 달린 꼬리 */
    const tailSeg = new THREE.Mesh(new THREE.CylinderGeometry(0.05, 0.04, 0.4, 8), bodyMat);
    tailSeg.position.y = 0.2;
    tailSeg.rotation.z = 0.2;
    tail.add(tailSeg);
    const tassel = new THREE.Mesh(new THREE.SphereGeometry(0.12, 12, 12), new THREE.MeshLambertMaterial({ color: 0x8B4513 }));
    tassel.position.set(0.08, 0.42, 0);
    tail.add(tassel);
    tail.position.set(0, 0.85, -0.4);
  } else if (D.tailType === 'cat') {
    /* 고양이 — 긴 꼬리 */
    const tailSeg = new THREE.Mesh(new THREE.CylinderGeometry(0.06, 0.04, 0.5, 8), accentMat);
    tailSeg.position.y = 0.22;
    tailSeg.rotation.z = -0.3;
    tail.add(tailSeg);
    const tip = new THREE.Mesh(new THREE.SphereGeometry(0.06, 10, 10), accentMat);
    tip.position.set(-0.16, 0.4, 0);
    tail.add(tip);
    tail.position.set(0, 0.85, -0.4);
  } else if (D.tailType === 'puff') {
    /* 토끼 — 솜털 공 */
    const puff = new THREE.Mesh(new THREE.SphereGeometry(0.13, 16, 16), whiteMat);
    puff.position.y = 0.05;
    tail.add(puff);
    tail.position.set(0, 0.7, -0.45);
  } else if (D.tailType === 'striped') {
    /* 호랑이/너구리 — 줄무늬 꼬리 */
    const tailMat = new THREE.MeshLambertMaterial({ color: 0x1A1A1A });
    for (let i = 0; i < 5; i++) {
      const seg = new THREE.Mesh(new THREE.SphereGeometry(0.08, 12, 12), i % 2 === 0 ? accentMat : tailMat);
      seg.position.set(0, 0.08 + i * 0.12, -i * 0.04);
      tail.add(seg);
    }
    tail.position.set(0, 0.75, -0.4);
  } else if (D.tailType === 'devil') {
    /* 악동 — 화살 꼬리 */
    const tailSeg = new THREE.Mesh(new THREE.CylinderGeometry(0.04, 0.03, 0.4, 8), accentMat);
    tailSeg.position.y = 0.2;
    tail.add(tailSeg);
    const arrow = new THREE.Mesh(new THREE.ConeGeometry(0.1, 0.15, 4), new THREE.MeshLambertMaterial({ color: 0xFF4081 }));
    arrow.position.y = 0.45;
    tail.add(arrow);
    tail.position.set(0, 0.8, -0.4);
  } else if (D.tailType === 'feather') {
    /* 올빼미 — 깃털 꼬리 */
    const featherGeo = new THREE.PlaneGeometry(0.1, 0.25);
    const featherMat = new THREE.MeshLambertMaterial({ color: 0x654321, side: THREE.DoubleSide });
    for (let i = -1; i <= 1; i++) {
      const f = new THREE.Mesh(featherGeo, featherMat);
      f.position.set(i * 0.05, 0.12, 0);
      f.rotation.x = -0.4;
      f.rotation.z = i * 0.2;
      tail.add(f);
    }
    tail.position.set(0, 0.7, -0.4);
  } else if (D.tailType === 'thin') {
    /* 쥐 — 가는 꼬리 */
    const tailSeg = new THREE.Mesh(new THREE.CylinderGeometry(0.025, 0.015, 0.6, 8), new THREE.MeshLambertMaterial({ color: 0xFFB6C1 }));
    tailSeg.position.y = 0.25;
    tailSeg.rotation.z = -0.4;
    tail.add(tailSeg);
    tail.position.set(0, 0.65, -0.4);
  } else if (D.tailType === 'short') {
    /* 곰/판다/거북 — 작은 꼬리 */
    const shortTail = new THREE.Mesh(new THREE.SphereGeometry(0.07, 10, 10), accentMat);
    shortTail.position.y = 0.05;
    tail.add(shortTail);
    tail.position.set(0, 0.7, -0.42);
  } else if (D.tailType === 'tiny') {
    /* 햄스터/기본 — 작은 꼬리 */
    const tinyTail = new THREE.Mesh(new THREE.SphereGeometry(0.06, 10, 10), accentMat);
    tinyTail.position.y = 0.05;
    tail.add(tinyTail);
    tail.position.set(0, 0.7, -0.42);
  }
  /* tailType === 'none'이면 추가 안 함 (코알라/개구리) */
  if (D.tailType !== 'none') {
    group.add(tail);
    ud.tail = tail;
  }

  /* ═══════════════ 장착 아이템 ═══════════════ */
  if (equipment.head) {
    const headItem = buildEquipMesh3DNew('head', equipment.head);
    if (headItem) {
      headItem.position.set(0, 1.98, -0.02);
      group.add(headItem);
    }
  }
  if (equipment.weapon) {
    const weaponItem = buildEquipMesh3DNew('weapon', equipment.weapon);
    if (weaponItem) {
      weaponItem.position.set(0.55, 0.4, 0.1);
      weaponItem.rotation.z = -0.6;
      weaponItem.rotation.x = -0.1;
      group.add(weaponItem);
    }
  }
  if (equipment.armor) {
    const armorItem = buildEquipMesh3DNew('armor', equipment.armor);
    if (armorItem) {
      armorItem.position.set(0, 0.85, 0.18);
      group.add(armorItem);
    }
  }
  if (equipment.wing) {
    const wingItem = buildEquipMesh3DNew('wing', equipment.wing);
    if (wingItem) {
      wingItem.position.set(0, 1.0, -0.4);
      group.add(wingItem);
      ud.wing = wingItem;
    }
  }
  if (equipment.accessory) {
    const accItem = buildEquipMesh3DNew('accessory', equipment.accessory);
    if (accItem) {
      accItem.position.set(0, 1.15, 0.3);
      group.add(accItem);
    }
  }
  if (equipment.special) {
    const spItem = buildEquipMesh3DNew('special', equipment.special);
    if (spItem) {
      spItem.position.set(0, 2.25, 0);
      group.add(spItem);
      ud.special = spItem;
    }
  }

  /* epic+ 등급 머리 아이템이 있으면 왼손에 방패 */
  const headGrade = equipment.head?.grade;
  if (headGrade === 'epic' || headGrade === 'unique' || headGrade === 'legend') {
    const shield = buildShield3D(headGrade);
    shield.position.set(-0.55, 0.4, 0.05);
    shield.rotation.z = 0.4;
    group.add(shield);
  }

  group.userData = ud;
  return group;
};

/* 슬롯별 장비 메쉬 빌드 — 외부 헬퍼 */
function buildEquipMesh3DNew(slot, item) {
  const grade = item.grade || 'normal';
  const colorMap = { normal: 0x9E9E9E, rare: 0x2196F3, epic: 0x9C27B0, unique: 0xFF5722, legend: 0xFFD700 };
  const color = colorMap[grade] || 0x9E9E9E;
  const mat = new THREE.MeshLambertMaterial({
    color, emissive: color,
    emissiveIntensity: grade === 'legend' ? 0.4 : grade === 'unique' ? 0.3 : grade === 'epic' ? 0.2 : 0.1
  });
  const group = new THREE.Group();
  if (slot === 'head') {
    /* 왕관 (디테일) */
    const band = new THREE.Mesh(new THREE.CylinderGeometry(0.32, 0.36, 0.14, 16), mat);
    band.castShadow = true;
    group.add(band);
    /* 봉우리 5개 */
    for (let i = 0; i < 5; i++) {
      const spike = new THREE.Mesh(new THREE.ConeGeometry(0.07, 0.22, 6), mat);
      const angle = (i / 5) * Math.PI * 2;
      spike.position.set(Math.cos(angle) * 0.32, 0.16, Math.sin(angle) * 0.32);
      spike.castShadow = true;
      group.add(spike);
      /* 봉우리 끝 보석 */
      if (grade !== 'normal') {
        const tip = new THREE.Mesh(
          new THREE.SphereGeometry(0.04, 8, 8),
          new THREE.MeshBasicMaterial({ color: 0xFF1493 })
        );
        tip.position.set(Math.cos(angle) * 0.32, 0.28, Math.sin(angle) * 0.32);
        group.add(tip);
      }
    }
    /* 중앙 큰 보석 */
    if (grade !== 'normal') {
      const centerGem = new THREE.Mesh(
        new THREE.OctahedronGeometry(0.1, 0),
        new THREE.MeshBasicMaterial({ color: grade === 'legend' ? 0xFF1493 : 0xFF6B9D })
      );
      centerGem.position.set(0, 0.08, 0.34);
      group.add(centerGem);
    }
    if (grade === 'legend') {
      const halo = new THREE.PointLight(0xFFD700, 1, 3, 2);
      halo.position.y = 0.2;
      group.add(halo);
    }
  } else if (slot === 'weapon') {
    /* 검 (디테일) */
    const blade = new THREE.Mesh(new THREE.BoxGeometry(0.07, 0.65, 0.022), mat);
    blade.position.y = 0.4;
    blade.castShadow = true;
    group.add(blade);
    /* 칼날 가운데 홈 */
    const bladeMid = new THREE.Mesh(
      new THREE.BoxGeometry(0.025, 0.55, 0.026),
      new THREE.MeshBasicMaterial({ color: 0xFFFFFF, transparent: true, opacity: 0.4 })
    );
    bladeMid.position.y = 0.4;
    group.add(bladeMid);
    /* 검 끝 */
    const tip = new THREE.Mesh(new THREE.ConeGeometry(0.04, 0.12, 4), mat);
    tip.position.y = 0.78;
    group.add(tip);
    /* 가드 (가로) */
    const guardMat = new THREE.MeshLambertMaterial({ color: grade === 'legend' ? 0xFFD700 : 0x8B4513 });
    const guard = new THREE.Mesh(new THREE.BoxGeometry(0.28, 0.06, 0.08), guardMat);
    guard.position.y = 0.04;
    guard.castShadow = true;
    group.add(guard);
    /* 가드 양끝 보석 */
    if (grade !== 'normal') {
      const guardGemL = new THREE.Mesh(
        new THREE.SphereGeometry(0.045, 8, 8),
        new THREE.MeshBasicMaterial({ color: 0xFF1493 })
      );
      guardGemL.position.set(-0.14, 0.04, 0);
      group.add(guardGemL);
      const guardGemR = new THREE.Mesh(
        new THREE.SphereGeometry(0.045, 8, 8),
        new THREE.MeshBasicMaterial({ color: 0xFF1493 })
      );
      guardGemR.position.set(0.14, 0.04, 0);
      group.add(guardGemR);
    }
    /* 손잡이 */
    const handle = new THREE.Mesh(
      new THREE.CylinderGeometry(0.035, 0.035, 0.2),
      new THREE.MeshLambertMaterial({ color: 0x3E2723 })
    );
    handle.position.y = -0.1;
    group.add(handle);
    /* 손잡이 끝 (포멜) */
    const pommel = new THREE.Mesh(
      new THREE.SphereGeometry(0.05, 12, 12),
      new THREE.MeshLambertMaterial({ color: grade === 'legend' ? 0xFFD700 : 0x6B4226 })
    );
    pommel.position.y = -0.22;
    group.add(pommel);
    /* 글로우 */
    if (grade === 'legend' || grade === 'unique') {
      const glow = new THREE.PointLight(color, 1, 2.5, 2);
      glow.position.y = 0.4;
      group.add(glow);
    }
  } else if (slot === 'armor') {
    /* 흉갑 (몸 곡선) */
    const chest = new THREE.Mesh(
      new THREE.SphereGeometry(0.42, 20, 20, 0, Math.PI),
      mat
    );
    chest.rotation.x = Math.PI / 2;
    chest.scale.set(1.1, 0.55, 1.1);
    chest.castShadow = true;
    group.add(chest);
    /* 어깨 갑옷 (양쪽) */
    const pauldronL = new THREE.Mesh(new THREE.SphereGeometry(0.18, 12, 12), mat);
    pauldronL.position.set(-0.42, 0.15, 0);
    pauldronL.castShadow = true;
    group.add(pauldronL);
    const pauldronR = new THREE.Mesh(new THREE.SphereGeometry(0.18, 12, 12), mat);
    pauldronR.position.set(0.42, 0.15, 0);
    pauldronR.castShadow = true;
    group.add(pauldronR);
    /* 가운데 보석 (epic+) */
    if (grade === 'epic' || grade === 'unique' || grade === 'legend') {
      const centerGem = new THREE.Mesh(
        new THREE.OctahedronGeometry(0.09, 0),
        new THREE.MeshBasicMaterial({ color: 0xFF1493 })
      );
      centerGem.position.set(0, 0.05, 0.32);
      group.add(centerGem);
    }
  } else if (slot === 'wing') {
    /* 날개 (양쪽, 깃털) */
    const wingMat = new THREE.MeshLambertMaterial({
      color, side: THREE.DoubleSide, transparent: true, opacity: 0.92
    });
    /* 왼쪽 날개 — 부채꼴 */
    const wL = new THREE.Group();
    for (let i = 0; i < 5; i++) {
      const featherL = new THREE.Mesh(
        new THREE.PlaneGeometry(0.12, 0.55 - i * 0.06),
        wingMat
      );
      featherL.position.set(-0.05 - i * 0.08, 0, 0);
      featherL.rotation.z = 0.2 + i * 0.15;
      wL.add(featherL);
    }
    wL.position.set(-0.25, 0, 0);
    group.add(wL);
    /* 오른쪽 날개 */
    const wR = new THREE.Group();
    for (let i = 0; i < 5; i++) {
      const featherR = new THREE.Mesh(
        new THREE.PlaneGeometry(0.12, 0.55 - i * 0.06),
        wingMat
      );
      featherR.position.set(0.05 + i * 0.08, 0, 0);
      featherR.rotation.z = -(0.2 + i * 0.15);
      wR.add(featherR);
    }
    wR.position.set(0.25, 0, 0);
    group.add(wR);
    group.userData.isWing = true;
  } else if (slot === 'accessory') {
    /* 목걸이 (체인 + 펜던트) */
    const ring = new THREE.Mesh(new THREE.TorusGeometry(0.14, 0.022, 8, 24), mat);
    ring.rotation.x = Math.PI / 2;
    group.add(ring);
    /* 펜던트 (하트) */
    const pendantMat = new THREE.MeshBasicMaterial({ color: 0xFF1493 });
    const pendantL = new THREE.Mesh(new THREE.SphereGeometry(0.045, 8, 8), pendantMat);
    pendantL.position.set(-0.04, -0.12, 0.04);
    group.add(pendantL);
    const pendantR = new THREE.Mesh(new THREE.SphereGeometry(0.045, 8, 8), pendantMat);
    pendantR.position.set(0.04, -0.12, 0.04);
    group.add(pendantR);
    const pendantBottom = new THREE.Mesh(new THREE.ConeGeometry(0.06, 0.1, 4), pendantMat);
    pendantBottom.position.set(0, -0.2, 0.04);
    pendantBottom.rotation.z = Math.PI;
    group.add(pendantBottom);
  } else if (slot === 'special') {
    /* 특수 — 회전 후광 + 별 */
    const halo = new THREE.Mesh(
      new THREE.TorusGeometry(0.3, 0.025, 8, 28),
      new THREE.MeshBasicMaterial({ color })
    );
    halo.rotation.x = Math.PI / 2;
    group.add(halo);
    /* 작은 별 4개 */
    for (let i = 0; i < 4; i++) {
      const star = new THREE.Mesh(
        new THREE.OctahedronGeometry(0.06, 0),
        new THREE.MeshBasicMaterial({ color: 0xFFD700 })
      );
      const a = (i / 4) * Math.PI * 2;
      star.position.set(Math.cos(a) * 0.3, 0, Math.sin(a) * 0.3);
      group.add(star);
    }
    /* 발광 */
    const glow = new THREE.PointLight(color, 1.2, 3.5, 2);
    group.add(glow);
    group.userData.isSpecial = true;
  }
  return group;
}

/* ── 방패 (epic+ 자동 추가) ── */
function buildShield3D(grade) {
  const colorMap = { epic: 0x9C27B0, unique: 0xFF5722, legend: 0xFFD700 };
  const color = colorMap[grade] || 0x9C27B0;
  const mat = new THREE.MeshLambertMaterial({ color, emissive: color, emissiveIntensity: 0.2 });
  const group = new THREE.Group();
  const body = new THREE.Mesh(
    new THREE.CylinderGeometry(0.18, 0.15, 0.04, 6),
    mat
  );
  body.castShadow = true;
  group.add(body);
  /* 중앙 보스 */
  const boss = new THREE.Mesh(
    new THREE.SphereGeometry(0.06, 12, 12),
    new THREE.MeshLambertMaterial({ color: 0xFFD700 })
  );
  boss.position.z = 0.03;
  group.add(boss);
  return group;
}

async function initOrLoadPet(nick,gender,mbti,balAnswers){
  if(!nick)return;
  try{
    const snap=await petCol.doc(nick).get();
if(snap.exists){
      S.myPet={id:snap.id,...snap.data()};
      localStorage.setItem("lmg_pet",JSON.stringify(S.myPet));
      checkDailyBonus(); return;
    }
    const petInfo=determinePet(mbti,balAnswers);
const petData={
      nick,gender,mbti,
      petEmoji:petInfo.e,petName:petInfo.n,petDesc:petInfo.d,
      level:1,xp:0,points:100, isBred:false,
      lastLogin:todayStr(),loginStreak:1,
      nameChangeCount:0,
      affectionMap:{},
      iq:100, /* ★ 초기 IQ */
    };
await petCol.doc(nick).set({...petData,timestamp:TS()});
    S.myPet={id:nick,...petData};
    localStorage.setItem("lmg_pet",JSON.stringify(S.myPet));
    alert(`🥚 ${petInfo.e} 러브몬 [${petInfo.n}]이 탄생했습니다!\n신규 가입 보너스 100P도 드려요! 💕`);
    render();
  }catch(e){console.error(e);}
}
async function checkDailyBonus(){
  if(!S.myPet)return;
const today=todayStr();
  if(S.myPet.lastLogin===today)return;
  try{
    await petCol.doc(S.myPet.nick).update({lastLogin:today,points:INC(10),loginStreak:INC(1)});
    S.myPet.points=(S.myPet.points||0)+10;S.myPet.lastLogin=today;
    alert("🎊 오늘의 출석 보너스! +10P 획득!");
}catch(e){}
}
async function addPoints(nick,amount){
  try{
    await petCol.doc(nick).update({points:INC(amount)});
    if(S.myPet?.nick===nick)S.myPet.points=(S.myPet.points||0)+amount;
}catch(e){console.error(e);}
}
async function checkAndLevelUp(nick){
  try{
    const snap=await petCol.doc(nick).get();
    if(!snap.exists)return;
    const data=snap.data();
    let lv=data.level||1;
    let xp=data.xp||0;
    let leveled=false;
let levelsGained=0;
    /* ★ 안전장치: 이미 MAX_LV 초과 시 강제 캡 */
    if(lv>MAX_LV){
      await petCol.doc(nick).update({level:MAX_LV,xp:0});
if(S.myPet?.nick===nick){S.myPet.level=MAX_LV;S.myPet.xp=0;}
      return;
    }
    while(xp>=XP_PER_LV && lv<MAX_LV){
      lv++;xp-=XP_PER_LV;leveled=true;levelsGained++;
}
    /* ★ 안전장치: while 이후에도 캡 보장 */
    lv=Math.min(lv,MAX_LV);
if(leveled){
      await petCol.doc(nick).update({level:lv, xp:xp});
      if(S.myPet?.nick===nick){S.myPet.level=lv;S.myPet.xp=xp;}
      if(S.myEntry?.nick===nick){
        alert(
          `🎉 레벨 업! Lv.${lv} 달성!`+
          (levelsGained>1?` (${levelsGained}단계 연속 상승! 🔥)`:"")+
          (lv===99?"\n✨ 성체 달성!":"")
        );
}
    }
  }catch(e){console.error(e);}
}
/* ★ 애정도 시스템 (신규) - affectionMap 상호 적립 */
async function growAffection(myNick, targetNick, amount){
  try{
    await petCol.doc(myNick).update({[`affectionMap.${targetNick}`]:INC(amount)});
await petCol.doc(targetNick).update({[`affectionMap.${myNick}`]:INC(amount)});
    if(S.myPet?.nick===myNick){
      if(!S.myPet.affectionMap)S.myPet.affectionMap={};
      S.myPet.affectionMap[targetNick]=(S.myPet.affectionMap[targetNick]||0)+amount;
}
  }catch(e){console.error(e);}
}
async function feedPet(itemId, targetNick = null){

async function doBabyActivity(babyId, actId){
  const myNick=S.myEntry?.nick;
if(!myNick||!S.myPet){alert("MBTI 검사 완료 후 이용해주세요!");return;}
  const act=BABY_ACTIVITIES.find(a=>a.id===actId);
  if(!act)return;
  const baby=S.babyPets.find(b=>b.id===babyId);
if(!baby){alert("아기 러브몬을 찾을 수 없어요.");return;}
  if((S.myPet.points||0)<act.cost){alert(`포인트 부족! (필요: ${act.cost}P, 보유: ${S.myPet.points||0}P)`);return;}
  if(!confirm(`${act.emoji} ${act.label}\n${act.desc}\n(-${act.cost}P)`))return;
try{
    /* 포인트 차감 */
    await petCol.doc(myNick).update({points:INC(-act.cost)});
    S.myPet.points=(S.myPet.points||0)-act.cost;
    let newXp=(baby.babyXp||0)+(act.xp||0);
    let newLv=baby.babyLevel||1;
    let leveled=false;
while(newXp>=XP_PER_LV&&newLv<MAX_LV){newLv++;newXp-=XP_PER_LV;leveled=true;}
    const babyUpdate={babyXp:newXp,babyLevel:newLv};
    let resultMsg=`${act.emoji} ${act.label} 완료!${act.xp?` XP +${act.xp}`:''}`;
/* 타입별 추가 효과 */
    if(act.type==='hp'){
      const newHp=(baby.babyStats?.maxHp||0)+(act.val||10);
      babyUpdate['babyStats.maxHp']=newHp;
resultMsg+=`\n💗 최대 HP 영구 +${act.val}!`;
    } else if(act.type==='stat'){
      const statNames=['힘','마력','민첩','지능','매력'];
      const rStat=statNames[Math.floor(Math.random()*statNames.length)];
      const curVal=(baby.babyStats?.[rStat]||10)+(act.val||5);
      babyUpdate[`babyStats.${rStat}`]=curVal;
resultMsg+=`\n📊 ${rStat} 영구 +${act.val}!`;
    } else if(act.type==='drop'){
      const bonus=Math.floor(Math.random()*100)+50;
      await petCol.doc(myNick).update({points:INC(bonus)});
      S.myPet.points+=bonus;
resultMsg+=`\n💰 산책 중 ${bonus}P 발견!`;
    } else if(act.type==='bond'){
      /* 부모 양쪽 애정도 +5 */
      const partner=baby.parent1Nick===myNick?baby.parent2Nick:baby.parent1Nick;
if(partner)await growAffection(myNick,partner,5);
      resultMsg+=`\n💕 ${partner}님과 애정도 +5!`;
    }
    /* 로그 추가 */
    const feedLog=[...(baby.feedLog||[])];
    feedLog.push({nick:shortNick(myNick),activity:act.label,xp:act.xp||0,time:Date.now()});
babyUpdate.feedLog=feedLog.slice(-30);
    await babyPetCol.doc(babyId).update(babyUpdate);
    if(baby){baby.babyXp=newXp;baby.babyLevel=newLv;}
    if(leveled)resultMsg+=`\n🎉 레벨업! Lv.${newLv} 달성!`;
    alert(resultMsg);render();
}catch(e){console.error(e);alert("오류가 발생했습니다.");}
}
function rollDiceStats(){
  /* ★ 환생 횟수당 +20 보너스 */
  const rb=(S.myPet?.rebirthCount||0)*REBIRTH_DICE_BONUS;
return{
    hp:  Math.floor(Math.random()*151)+50+rb,
    mp:  Math.floor(Math.random()*121)+30+rb,
    atk: Math.floor(Math.random()*41)+10+rb,
    def: Math.floor(Math.random()*26)+5+rb,
    eva: Math.min(40,Math.floor(Math.random()*21)+5+Math.floor(rb/4)),
  };
}
function getScaledStats(pet){
  const d=pet.diceStats||{hp:80,mp:50,atk:15,def:8,eva:10};
  const lv=pet.level||1;
  return{
    maxHp: Math.round(d.hp+(lv-1)*12),
    maxMp: Math.round(d.mp+(lv-1)*6),
    atk:   Math.round(d.atk+(lv-1)*3),
    def:   Math.round(d.def+(lv-1)*2),
    eva:   Math.min(75,Math.round(d.eva+(lv-1)*0.5)),
    maxSp: 100,
  };
}
/* ★ 장착 아이템 포함 최종 스탯 */
function getEquippedStats(pet){
  const base=getScaledStats(pet);
  const eq=pet.equipment||{};
Object.values(eq).forEach(item=>{
    if(!item?.stats)return;
    if(item.stats.atk) base.atk   +=item.stats.atk;
    if(item.stats.def) base.def   +=item.stats.def;
    if(item.stats.hp)  base.maxHp +=item.stats.hp;
    if(item.stats.mp)  base.maxMp +=item.stats.mp;
    if(item.stats.eva) base.eva=Math.min(75,base.eva+item.stats.eva);
  });
return base;
}

function startDungeon(floorIdx, mobIdx){
  const myPet=S.myPet;
if(!myPet){alert("펫이 없어요!");return;}
  if(!myPet.diceStats){alert("먼저 주사위를 굴려 기본 스탯을 설정해주세요! 🎲");return;}
  /* ★ 쿨타임 체크 (5층 전부 클리어 후 시작) */
  const cooldownStart=myPet.dungeonCooldownStart||0;
const cooldownEnd=cooldownStart+DUNGEON_COOLDOWN_MS;
  if(Date.now()<cooldownEnd){
    const rem=cooldownEnd-Date.now();
    alert(`⏳ 던전 쿨타임 중!\n1~5층을 모두 클리어해서 발동된 쿨타임이에요.\n${Math.ceil(rem/60000)}분 ${Math.ceil((rem%60000)/1000)}초 후 다시 입장 가능합니다.`);
return;
  }
  /* ★ 해당 층 이미 클리어했는지 체크 */
  const kills=myPet.dungeonKills||{};
  const floorNum=floorIdx+1;
if(kills[floorNum]){
    if(!confirm(`${floor.emoji} ${floorNum}층은 이번 라운드에 이미 클리어했어요!\n\n🏆 클리어 현황: ${DUNGEON_ALL_FLOORS.map(f=>`${f}층 ${kills[f]?'✅':'❌'}`).join(' ')}\n\n다시 입장하겠습니까? (기록에는 반영되지 않아요)`))return;
}
  const floor=DUNGEON_FLOORS[floorIdx];
  const mob={...floor.mobs[mobIdx]};
  /* ★ 장착 아이템 포함 스탯 */
  const scaled=getEquippedStats(myPet);
  const curHp=Math.min(myPet.currentHp??scaled.maxHp,scaled.maxHp);
  const curMp=Math.min(myPet.currentMp??scaled.maxMp,scaled.maxMp);
const curSp=myPet.currentSp??100;
  const myNick=S.myEntry?.nick;
  const hatchedBaby=S.babyPets.find(b=>b.hatched&&(b.parent1Nick===myNick||b.parent2Nick===myNick));
  /* ★ 쿨타임 기록 제거 (finalizeDungeon에서 처리) */
  S.dungeonState={
    active:true,floorIdx,mobIdx,
    floorName:floor.name,floorEmoji:floor.emoji,
    mob:{...mob},mobCurrentHp:mob.hp,
    playerHp:curHp,playerMaxHp:scaled.maxHp,
    playerMp:curMp,playerMaxMp:scaled.maxMp,
    playerSp:curSp,playerMaxSp:100,
    defBoost:1,evaBoost:1,
    log:[`⚔️ ${floor.emoji} ${floor.name} ${floorIdx+1}층에 입장!`,`👾 ${mob.emoji} ${mob.name} 등장!
(HP ${mob.hp})`],
    turn:1,won:false,lost:false,totalXp:0,totalPts:0,
    baby:hatchedBaby,babyCooldown:0,
    inventory:{...myPet.inventory||{}},
  };
  render();
}
function calcDmg(atk, def, mult=1){
  /* DEF가 아무리 높아도 ATK의 28%는 항상 관통
     DEF는 68%만 방어력으로 작용 (나머지는 관통)
     ±5 랜덤 변동 */
  const minDmg=Math.max(1,Math.round(atk*0.28*mult));
const rawDmg=Math.round((atk-def*0.68)*mult+(Math.random()*10-5));
  return Math.max(minDmg,rawDmg);
}
function checkEva(eva){ return Math.random()*100 < eva; }
function dungeonAction(actionType, skillId){
  const ds=S.dungeonState;
  if(!ds||ds.won||ds.lost)return;
  const myPet=S.myPet;
const scaled=getScaledStats(myPet);
  let log=[];
  let defBoostNext=1, evaBoostNext=1;
  /* ── 플레이어 행동 ── */
  if(actionType==='attack'){
    const skill=ATK_SKILLS.find(s=>s.id===skillId)||ATK_SKILLS[0];
/* MP 체크 */
    const mpCost=skill.mp||0;
    if(mpCost>0&&ds.playerMp<mpCost){
      alert(`MP가 부족합니다! (필요: ${mpCost}MP, 보유: ${ds.playerMp}MP)`);return;
}
    ds.playerMp=Math.max(0,ds.playerMp-mpCost);
    /* 크리티컬 확정 or 랜덤 */
    const isCrit=skill.id==='crit'||Math.random()<0.12;
    const mult=skill.dmgMult*(isCrit&&skill.id!=='crit'?1.5:1);
const dmg=calcDmg(scaled.atk, ds.mob.def, mult);
    ds.mobCurrentHp=Math.max(0,ds.mobCurrentHp-dmg);
    log.push(`${skill.emoji} ${skill.name}! ${ds.mob.emoji}에게 ${dmg} 피해${isCrit&&skill.id!=='crit'?' ⚡크리!':''} (남은 HP: ${ds.mobCurrentHp})`);
}
  else if(actionType==='defense'){
    const skill=DEF_SKILLS.find(s=>s.id===skillId);
    if(!skill)return;
    const mpCost=skill.mp||0;
if(mpCost>0&&ds.playerMp<mpCost){alert(`MP 부족! (필요 ${mpCost}MP, 보유 ${ds.playerMp}MP)`);return;}
    ds.playerMp=Math.max(0,ds.playerMp-mpCost);
if(skill.id==='guard'){defBoostNext=skill.defMult;log.push(`${skill.emoji} 철벽 가드! 방어력 ${skill.defMult}배 (이번 턴)`);}
    else if(skill.id==='dodge'){evaBoostNext=skill.evaMult;log.push(`${skill.emoji} 회피 강화! 회피율 ${skill.evaMult}배 (이번 턴)`);}
    else if(skill.id==='heal'){
      const healAmt=Math.round(ds.playerMaxHp*skill.healPct);
ds.playerHp=Math.min(ds.playerMaxHp,ds.playerHp+healAmt);
      log.push(`${skill.emoji} 자가 치유! HP +${healAmt} (현재 ${ds.playerHp}/${ds.playerMaxHp})`);
    }
  }
  else if(actionType==='potion'){
    const item=POTION_ITEMS.find(i=>i.id===skillId);
    if(!item)return;
const cnt=ds.inventory[skillId]||0;
    if(cnt<=0){alert("물약이 없어요! 상점에서 구입해주세요 🧪");return;}
    ds.inventory[skillId]=cnt-1;
if(item.hp){ds.playerHp=Math.min(ds.playerMaxHp,ds.playerHp+item.hp);log.push(`${item.emoji} HP +${item.hp} 회복! (현재 ${ds.playerHp}/${ds.playerMaxHp})`);}
    if(item.mp){ds.playerMp=Math.min(ds.playerMaxMp,ds.playerMp+item.mp);log.push(`${item.emoji} MP +${item.mp} 회복! (현재 ${ds.playerMp}/${ds.playerMaxMp})`);}
  }
  else if(actionType==='baby'){
    /* 2세 펫 지원 */
    if(ds.babyCooldown>0){alert(`2세 펫은 ${ds.babyCooldown}턴 후 다시 지원 가능해요!`);return;}
    const baby=ds.baby;
if(!baby){alert("지원 가능한 2세 펫이 없어요!");return;}
    const babyAtk=(baby.babyStats?.힘||10)+(baby.babyLevel||1)*2;
    const babyDmg=calcDmg(babyAtk,ds.mob.def,1.2);
    ds.mobCurrentHp=Math.max(0,ds.mobCurrentHp-babyDmg);
    const babyHeal=Math.round(ds.playerMaxHp*0.08);
    ds.playerHp=Math.min(ds.playerMaxHp,ds.playerHp+babyHeal);
    ds.babyCooldown=3;
log.push(`🍼 ${baby.babyEmoji||'🐣'} 2세 지원! 적 ${babyDmg} 피해 + HP +${babyHeal} 회복!`);
}
  else if(actionType==='flee'){
    if(!confirm("던전에서 도망칩니다. 이번 전투 보상은 없어요."))return;
    S.dungeonState=null;render();return;
}
  /* ── 몹이 죽었는지 체크 ── */
  if(ds.mobCurrentHp<=0){
    ds.won=true;
    ds.totalXp+=ds.mob.xp;
    ds.totalPts+=ds.mob.pts;
log.push(`🎉 ${ds.mob.emoji} ${ds.mob.name} 처치! XP +${ds.mob.xp} · 포인트 +${ds.mob.pts}`);
    ds.log=[...ds.log,...log];
    setTimeout(()=>finalizeDungeon(true),800);
    render();return;
}
  /* ── 몹 공격 턴 ── */
  const defEff=Math.round(scaled.def*defBoostNext);
  const evaEff=Math.min(75,Math.round(scaled.eva*evaBoostNext));
if(checkEva(evaEff)){
    log.push(`💨 회피 성공! ${ds.mob.emoji}의 공격을 피했어요!`);
  }else{
    const mobDmg=calcDmg(ds.mob.atk, defEff);
    ds.playerHp=Math.max(0,ds.playerHp-mobDmg);
log.push(`${ds.mob.emoji} ${ds.mob.name} 공격! ${mobDmg} 피해 (남은 HP: ${ds.playerHp}/${ds.playerMaxHp})`);
  }
  /* 2세 쿨다운 감소 */
  if(ds.babyCooldown>0)ds.babyCooldown--;
/* ── 플레이어가 죽었는지 체크 ── */
  if(ds.playerHp<=0){
    ds.lost=true;
    log.push(`💀 ${myPet.petName}이(가) 쓰러졌어요...`);
    ds.log=[...ds.log,...log];
    setTimeout(()=>finalizeDungeon(false),800);
    render();return;
}
  ds.turn++;
  ds.log=[...ds.log,...log];
  if(ds.log.length>30)ds.log=ds.log.slice(-30);
  render();
}
async function finalizeDungeon(won){
  const ds=S.dungeonState;
  const myNick=S.myEntry?.nick;
  if(!myNick||!S.myPet)return;
  try{
    if(won){
      let newXp=(S.myPet.xp||0)+ds.totalXp;
      let newLv=S.myPet.level||1;
      let leveled=false;
      while(newXp>=XP_PER_LV&&newLv<MAX_LV){newLv++;newXp-=XP_PER_LV;leveled=true;}
      const kills={...(S.myPet.dungeonKills||{})};
      const floorNum=ds.floorIdx+1;
      kills[floorNum]=true;
      const now=Date.now();
      const newBattleCount=(S.myPet.dungeonBattleCount||0)+1;
      const triggerCooldown=newBattleCount>=5;
      const dbUpdate={
        xp:newXp,level:newLv,points:INC(ds.totalPts),
        currentHp:ds.playerHp,currentMp:ds.playerMp,currentSp:ds.playerSp,
        inventory:ds.inventory,
        dungeonBattleCount:triggerCooldown?0:newBattleCount,
      };
      S.myPet.dungeonBattleCount=triggerCooldown?0:newBattleCount;
      if(triggerCooldown){
        dbUpdate.dungeonCooldownStart=now;
        S.myPet.dungeonCooldownStart=now;
      }
      S.myPet.dungeonKills=kills;
      S.myPet.dungeonCooldownStart=now;
      await petCol.doc(myNick).update(dbUpdate);
      S.myPet={...S.myPet,xp:newXp,level:newLv,
        points:(S.myPet.points||0)+ds.totalPts,
        currentHp:ds.playerHp,currentMp:ds.playerMp,currentSp:ds.playerSp,inventory:ds.inventory};
      const battleCount=S.myPet.dungeonBattleCount||0;
      const remainBattles=triggerCooldown?0:(5-battleCount);
      alert(`🏆 전투 승리!\n획득: XP +${ds.totalXp} · 포인트 +${ds.totalPts}${leveled?`\n🎉 레벨업! Lv.${newLv} 달성!`:''}${triggerCooldown?'\n\n⏳ 5전 완료! 5분 쿨타임 시작!':`\n\n⚔️ 이번 라운드 ${battleCount}전/${5}전 (${remainBattles}전 더 하면 쿨타임)`}`);    }else{
      const penaltyXp=Math.min(100,S.myPet.xp||0);
      const newXp=Math.max(0,(S.myPet.xp||0)-penaltyXp);
      await petCol.doc(myNick).update({
        xp:newXp,points:INC(-1000),
        currentHp:1,currentMp:ds.playerMp,currentSp:ds.playerSp,
      });
      S.myPet={...S.myPet,xp:newXp,
        points:Math.max(0,(S.myPet.points||0)-1000),
        currentHp:1,currentMp:ds.playerMp,currentSp:ds.playerSp};
      alert(`💀 전투 패배...\n페널티: XP -${penaltyXp} · 포인트 -1000\nHP 1로 부활했어요. 물약을 사용해 회복하세요!`);
    }
  }catch(e){console.error(e);}
  S.dungeonState=null;
  render();
}

/* ★ 선물함 리스너 attach — myEntry 가 준비된 시점/닉네임 확정 시점에 호출.
   - 중복 부착 방지 (같은 닉네임으로 이미 붙어 있으면 무시)
   - 닉네임이 바뀌면 기존 구독을 해제하고 새로 부착 */
function attachGiftsListener(){
  const myNick=S.myEntry?.nick;
  if(!myNick)return;
  if(window.__giftsListenerNick===myNick && window.__giftsUnsub)return;
  if(window.__giftsUnsub){try{window.__giftsUnsub();}catch(e){}window.__giftsUnsub=null;}
  window.__giftsListenerNick=myNick;
  try{
    // orderBy 제거 → 인덱스 없이도 작동 / 클라이언트에서 정렬
    window.__giftsUnsub=giftsCol.where("to","==",myNick).onSnapshot(snap=>{
      const gifts=snap.docs.map(d=>({id:d.id,...d.data()}));
      // 클라이언트 측 정렬 (최신 순)
      gifts.sort((a,b)=>{
        const ta=a.timestamp?.toMillis?.()||0;
        const tb=b.timestamp?.toMillis?.()||0;
        return tb-ta;
      });
      S.myGifts=gifts.slice(0,50);
      S.unreadGifts=S.myGifts.filter(g=>!g.read).length;
      if(S.screen==="board")render();
    },err=>{
      console.error("[gifts listener error]",err);
      // 인덱스 에러 시 폴백: 전체 가져와서 필터링
      giftsCol.where("to","==",myNick).get().then(snap=>{
        const gifts=snap.docs.map(d=>({id:d.id,...d.data()}));
        gifts.sort((a,b)=>(b.timestamp?.toMillis?.()||0)-(a.timestamp?.toMillis?.()||0));
        S.myGifts=gifts.slice(0,50);
        S.unreadGifts=S.myGifts.filter(g=>!g.read).length;
        if(S.screen==="board")render();
      }).catch(e=>console.error("[gifts fallback fail]",e));
    });
  }catch(e){console.error("[attachGiftsListener]",e);}
}

/* ═══════════════════════════════════════
   🏰 Three.js 하우스 3D 렌더러 — 가구 편집 모드 지원 ver.
   - 가구별 디테일 3D 모델 (소파/침대/벽난로/책장/분수 등)
   - 가구 위치/회전 자유 배치 (position, rotation 필드 사용)
   - 편집 중인 가구는 위아래로 떠오르며 노란 글로우 (방향 화살표 표시)
═══════════════════════════════════════ */
class HouseRenderer3D {
  constructor(containerId, houseData, petEmoji, petData) {
    this.container = document.getElementById(containerId);
    if (!this.container || !window.THREE) return;
    this.houseData = houseData;
    this.petEmoji = petEmoji || '🐾';
    this.equipment = petData?.equipment || null;
    this.petData = petData;
    this.meshes = [];
    this.animated = [];
    this.furnitureMap = new Map(); // itemId → THREE.Group
    this.editingId = null;
    this.editArrow = null; // 방향 표시 화살표
    this.isAlive = true;
    this.theta = 0.6;
    this.targetTheta = 0.6;
    this.isDrag = false;
    this.lastX = 0;
    this.autoRotate = true;
    this.init();
  }
  /* 이모지 텍스처 */
  emojiTexture(emoji, bg = '#FDEEF4', size = 256) {
    const c = document.createElement('canvas');
    c.width = c.height = size;
    const ctx = c.getContext('2d');
    ctx.fillStyle = bg;
    ctx.fillRect(0, 0, size, size);
    ctx.font = `${Math.round(size * 0.62)}px serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(emoji, size / 2, size * 0.56);
    return new THREE.CanvasTexture(c);
  }
  /* 마룻바닥 텍스처 */
  woodFloorTexture(baseColor = '#D4A574', size = 512) {
    const c = document.createElement('canvas');
    c.width = c.height = size;
    const ctx = c.getContext('2d');
    ctx.fillStyle = baseColor;
    ctx.fillRect(0, 0, size, size);
    const plankH = size / 8;
    for (let i = 0; i < 8; i++) {
      const y = i * plankH;
      ctx.fillStyle = 'rgba(60,40,20,.18)';
      ctx.fillRect(0, y, size, 1);
      for (let k = 0; k < 4; k++) {
        ctx.strokeStyle = `rgba(${Math.random() > 0.5 ? '110,75,40' : '180,140,90'},.${Math.floor(Math.random() * 3) + 1}5)`;
        ctx.lineWidth = 0.6;
        ctx.beginPath();
        const yk = y + Math.random() * plankH;
        ctx.moveTo(0, yk);
        ctx.bezierCurveTo(size * 0.3, yk - 3 + Math.random() * 6, size * 0.6, yk - 4 + Math.random() * 8, size, yk);
        ctx.stroke();
      }
    }
    const tex = new THREE.CanvasTexture(c);
    tex.wrapS = tex.wrapT = THREE.RepeatWrapping;
    tex.repeat.set(2, 1.6);
    return tex;
  }
  flatFloorTexture(color, type) {
    const c = document.createElement('canvas');
    c.width = c.height = 256;
    const ctx = c.getContext('2d');
    ctx.fillStyle = color;
    ctx.fillRect(0, 0, 256, 256);
    if (type === 'marble') {
      for (let i = 0; i < 8; i++) {
        ctx.strokeStyle = `rgba(180,180,180,.${Math.floor(Math.random() * 3) + 2}5)`;
        ctx.lineWidth = Math.random() * 1.5;
        ctx.beginPath();
        ctx.moveTo(Math.random() * 256, 0);
        ctx.bezierCurveTo(Math.random() * 256, 80, Math.random() * 256, 180, Math.random() * 256, 256);
        ctx.stroke();
      }
    } else if (type === 'grass') {
      for (let i = 0; i < 400; i++) {
        ctx.fillStyle = `rgba(80,${130 + Math.random() * 40},80,.4)`;
        ctx.fillRect(Math.random() * 256, Math.random() * 256, 2, 4);
      }
    } else if (type === 'dark') {
      for (let i = 0; i < 200; i++) {
        ctx.fillStyle = `rgba(255,255,255,.0${Math.floor(Math.random() * 3)})`;
        ctx.fillRect(Math.random() * 256, Math.random() * 256, 1, 1);
      }
    }
    const tex = new THREE.CanvasTexture(c);
    tex.wrapS = tex.wrapT = THREE.RepeatWrapping;
    tex.repeat.set(3, 3);
    return tex;
  }
  wallTexture(baseColor, pattern) {
    const c = document.createElement('canvas');
    c.width = c.height = 512;
    const ctx = c.getContext('2d');
    ctx.fillStyle = baseColor;
    ctx.fillRect(0, 0, 512, 512);
    if (pattern === 'rose') {
      for (let y = 32; y < 512; y += 64) {
        for (let x = ((y / 64) % 2 === 0 ? 32 : 64); x < 512; x += 64) {
          ctx.fillStyle = 'rgba(232,83,122,.08)';
          ctx.beginPath();
          ctx.arc(x, y, 6, 0, Math.PI * 2);
          ctx.fill();
        }
      }
    } else if (pattern === 'night') {
      for (let i = 0; i < 80; i++) {
        const x = Math.random() * 512, y = Math.random() * 512;
        const s = Math.random() * 1.8 + 0.3;
        ctx.fillStyle = `rgba(255,255,200,${Math.random() * 0.6 + 0.2})`;
        ctx.beginPath();
        ctx.arc(x, y, s, 0, Math.PI * 2);
        ctx.fill();
      }
    } else if (pattern === 'forest') {
      for (let i = 0; i < 24; i++) {
        ctx.fillStyle = `rgba(80,140,90,.${Math.floor(Math.random() * 3) + 1})`;
        const x = Math.random() * 512, y = Math.random() * 512;
        ctx.beginPath();
        ctx.ellipse(x, y, 12, 6, Math.random() * Math.PI, 0, Math.PI * 2);
        ctx.fill();
      }
    } else if (pattern === 'gold') {
      ctx.strokeStyle = 'rgba(218,165,32,.18)';
      ctx.lineWidth = 1;
      for (let y = 0; y < 512; y += 48) {
        for (let x = 0; x < 512; x += 48) {
          ctx.beginPath();
          ctx.moveTo(x + 24, y); ctx.lineTo(x + 48, y + 24);
          ctx.lineTo(x + 24, y + 48); ctx.lineTo(x, y + 24); ctx.closePath();
          ctx.stroke();
        }
      }
    } else if (pattern === 'galaxy') {
      const grad = ctx.createRadialGradient(256, 256, 30, 256, 256, 280);
      grad.addColorStop(0, 'rgba(155,89,182,.35)');
      grad.addColorStop(0.6, 'rgba(60,40,120,.2)');
      grad.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.fillStyle = grad;
      ctx.fillRect(0, 0, 512, 512);
      for (let i = 0; i < 150; i++) {
        ctx.fillStyle = `rgba(255,255,255,${Math.random() * 0.8 + 0.2})`;
        ctx.beginPath();
        ctx.arc(Math.random() * 512, Math.random() * 512, Math.random() * 1.6, 0, Math.PI * 2);
        ctx.fill();
      }
    }
    return new THREE.CanvasTexture(c);
  }
  init() {
    const W = this.container.clientWidth || 340;
    const H = 420;
    this.scene = new THREE.Scene();
    const fogColor = (this.houseData?.wallpaper === 'galaxy' || this.houseData?.wallpaper === 'night')

    this.resizeObserver.observe(this.container);
  }
  updateCamera() {
    this.camera.position.x = this.cameraDist * Math.sin(this.theta);
    this.camera.position.z = this.cameraDist * Math.cos(this.theta);
    this.camera.position.y = this.cameraY;
    this.camera.lookAt(0, 1.5, 0);
  }
  handleResize() {
    const W = this.container.clientWidth || 340;

  lighten(hex, amount = 30) {
    const c = new THREE.Color(hex);
    c.r = Math.min(1, c.r + amount / 100);
    c.g = Math.min(1, c.g + amount / 100);
    c.b = Math.min(1, c.b + amount / 100);
    return c.getHex();
  }
  gradeToColor(grade) {
    const map = {
      normal: 0xe8b8a0, rare: 0x42a5f5, epic: 0xab47bc,
      unique: 0xff7043, legend: 0xffc107,
    };
    return map[grade] || 0xe8b8a0;
  }
  inferType(item) {
    if (item.type) return item.type;
    const e = item.emoji || '';
    if (e.includes('🛋️') || e.includes('🌸')) return 'sofa';
    if (e.includes('🛏️')) return 'bed';
    if (e.includes('🌹') || e.includes('🌿')) return 'plant';
    if (e.includes('💡') || e.includes('✨')) return 'lamp';
    if (e.includes('🔮') || e.includes('📕')) return 'desk';
    if (e.includes('🐠') || e.includes('🐟')) return 'aquarium';
    if (e.includes('🐲') || e.includes('🔥')) return 'fireplace';
    if (e.includes('📖')) return 'library';
    if (e.includes('⛲')) return 'fountain';
    if (e.includes('👑') || e.includes('🗿')) return 'statue';
    if (e.includes('💑')) return 'frame';
    if (e.includes('⚔️')) return 'flag';
    return 'sofa';
  }
  /* 가구 배치 — position / rotation 필드 사용 (기존 데이터 호환) */
  placeFurniture3D() {
    const furniture = this.houseData?.furniture || [];
    /* 기본 격자 — position이 없는 경우 fallback */
    const defaultGrid = [
      { x: -4.5, z: -4.5, rot: 0 }, { x: 0, z: -4.8, rot: 0 }, { x: 4.5, z: -4.5, rot: 0 },
      { x: -5.5, z: 0, rot: Math.PI / 2 }, { x: 5.5, z: 0, rot: -Math.PI / 2 },
      { x: -4, z: 4, rot: 0 }, { x: 4, z: 4, rot: 0 },
      { x: -2, z: 3.5, rot: 0 }, { x: 2, z: 3.5, rot: 0 },
      { x: -3, z: -2, rot: 0 }, { x: 3, z: -2, rot: 0 }, { x: 0, z: 4.5, rot: Math.PI },
    ];
    furniture.forEach((item, i) => {
      const type = this.inferType(item);
      const grade = item.grade || 'normal';
      const color = this.gradeToColor(grade);
      const fGroup = this.buildFurniture(type, item.emoji, color);
      const fallback = defaultGrid[i % defaultGrid.length];
      const px = (item.position && typeof item.position.x === 'number') ? item.position.x : fallback.x;
      const pz = (item.position && typeof item.position.z === 'number') ? item.position.z : fallback.z;
      const rot = (typeof item.rotation === 'number') ? item.rotation : fallback.rot;
      fGroup.position.set(px, 0, pz);
      fGroup.rotation.y = rot;
      fGroup.userData.itemId = item.id;
      fGroup.userData.baseY = 0;
      this.scene.add(fGroup);
      this.meshes.push(fGroup);
      this.furnitureMap.set(item.id, fGroup);
    });
  }
  /* 편집 모드 진입 */
  setEditingItem(itemId) {
    /* 이전 편집 가구 원위치 복귀 */
    if (this.editingId && this.furnitureMap.has(this.editingId)) {
      const prev = this.furnitureMap.get(this.editingId);
      prev.userData.editing = false;
      prev.position.y = prev.userData.baseY || 0;
    }
    this.editingId = itemId;
    if (itemId && this.furnitureMap.has(itemId)) {
      this.furnitureMap.get(itemId).userData.editing = true;
      this.autoRotate = false; // 편집 중에는 자동회전 멈춤
    }
    this.updateEditArrow();
  }
  /* 편집 중인 가구 위치/회전 실시간 업데이트 */
  updateEditingTransform(x, z, rotation) {
    if (!this.editingId || !this.furnitureMap.has(this.editingId)) return;
    const g = this.furnitureMap.get(this.editingId);
    g.position.x = x;
g.position.z = z;
    g.rotation.y = rotation;
    this.updateEditArrow();
  }
  /* 가구 앞 방향 표시 화살표 (편집 모드에서만) */
  updateEditArrow() {
    if (this.editArrow) {
      this.scene.remove(this.editArrow);
      this.editArrow = null;
    }
    if (!this.editingId || !this.furnitureMap.has(this.editingId)) return;
    const g = this.furnitureMap.get(this.editingId);
    /* 화살표 = 작은 원뿔 — 가구 앞 방향 (Z+ 방향) */
    const arrowGroup = new THREE.Group();
    const cone = new THREE.Mesh(
      new THREE.ConeGeometry(0.18, 0.45, 8),
      new THREE.MeshBasicMaterial({ color: 0xff6f00 })
    );
    cone.position.set(0, 0.05, 1.1);
    cone.rotation.x = Math.PI / 2;
    arrowGroup.add(cone);
    /* 베이스 원반 — 가구 발판 */
    const baseRing = new THREE.Mesh(
      new THREE.RingGeometry(1.0, 1.15, 32),
      new THREE.MeshBasicMaterial({ color: 0xffa726, side: THREE.DoubleSide, transparent: true, opacity: 0.7 })
    );
    baseRing.rotation.x = -Math.PI / 2;
    baseRing.position.y = 0.02;
    arrowGroup.add(baseRing);
    arrowGroup.position.set(g.position.x, 0, g.position.z);
    arrowGroup.rotation.y = g.rotation.y;
    this.scene.add(arrowGroup);
    this.editArrow = arrowGroup;
  }
  addPet3D() {
    /* ✨ 풀바디 3D 펫 — 머리/몸통/팔/다리/손/꼬리/장비 */

    this.petWing = this.pet.userData.wing;
    this.petSpecial = this.pet.userData.special;
    this.petArmL = this.pet.userData.armL;
    this.petArmR = this.pet.userData.armR;
    this.petLegL = this.pet.userData.legL;

  /* ★ 장착 아이템 3D 시각화 */
  add3DEquipment() {
    const eq = this.equipment || {};
    /* 머리 (왕관/투구) */
    if (eq.head) {
      const headItem = this.buildEquipMesh('head', eq.head);
      if (headItem) {
        headItem.position.set(0, 1.55, 0);
        this.pet.add(headItem);
      }
    }
    /* 무기 (오른손) */
    if (eq.weapon) {
      const weaponItem = this.buildEquipMesh('weapon', eq.weapon);
      if (weaponItem) {
        weaponItem.position.set(0.42, 0.62, 0.15);
        weaponItem.rotation.z = -0.4;
        this.pet.add(weaponItem);
      }
    }
    /* 갑옷 (몸통) */
    if (eq.armor) {
      const armorItem = this.buildEquipMesh('armor', eq.armor);
      if (armorItem) {
        armorItem.position.set(0, 0.45, 0.18);
        this.pet.add(armorItem);
      }
    }
    /* 날개 (등) */
    if (eq.wing) {
      const wingItem = this.buildEquipMesh('wing', eq.wing);
      if (wingItem) {
        wingItem.position.set(0, 0.7, -0.3);
        this.pet.add(wingItem);
        this.petWing = wingItem;
      }
    }
    /* 장신구 (목) */
    if (eq.accessory) {
      const accItem = this.buildEquipMesh('accessory', eq.accessory);
      if (accItem) {
        accItem.position.set(0, 0.75, 0.32);
        this.pet.add(accItem);
      }
    }
    /* 특수 (머리 위 떠다님) */
    if (eq.special) {
      const spItem = this.buildEquipMesh('special', eq.special);
      if (spItem) {
        spItem.position.set(0, 1.85, 0);
        this.pet.add(spItem);
        this.petSpecial = spItem;
      }
    }
  }
  /* 슬롯별 3D 메쉬 빌드 */
  buildEquipMesh(slot, item) {
    const grade = item.grade || 'normal';
    const colorMap = { normal: 0x9E9E9E, rare: 0x2196F3, epic: 0x9C27B0, unique: 0xFF5722, legend: 0xFFD700 };
    const color = colorMap[grade] || 0x9E9E9E;
    const mat = new THREE.MeshLambertMaterial({ color, emissive: color, emissiveIntensity: grade==='legend'?0.4:grade==='unique'?0.25:0.1 });
    const group = new THREE.Group();
    if (slot === 'head') {
      /* 왕관: 원기둥 + 뾰족한 4개 봉우리 */
      const band = new THREE.Mesh(new THREE.CylinderGeometry(0.32, 0.35, 0.12, 12), mat);
      band.castShadow = true;
      group.add(band);
      for (let i = 0; i < 5; i++) {
        const spike = new THREE.Mesh(new THREE.ConeGeometry(0.06, 0.18, 6), mat);
        const angle = (i / 5) * Math.PI * 2;
        spike.position.set(Math.cos(angle) * 0.3, 0.13, Math.sin(angle) * 0.3);
        spike.castShadow = true;

  }
  addOrbit() {
    const c = this.renderer.domElement;
    c.style.touchAction = 'none';
    c.style.cursor = 'grab';
    const onDown = (clientX) => {
      if (this.editingId) return; // ★ 추가: 가구 편집 중에는 화면 회전(드래그) 방지
      this.isDrag = true;
      this.autoRotate = false;
      this.lastX = clientX;
      c.style.cursor = 'grabbing';
    };
    const onMove = (clientX) => {
      if (!this.isDrag) return;
      this.targetTheta += (clientX - this.lastX) * 0.012;
      this.lastX = clientX;
    };
    const onUp = () => {
      this.isDrag = false;
      c.style.cursor = 'grab';
    };
    c.addEventListener('mousedown', e => onDown(e.clientX));
    window.addEventListener('mousemove', e => onMove(e.clientX));
    window.addEventListener('mouseup', onUp);
    c.addEventListener('touchstart', e => onDown(e.touches[0].clientX), { passive: true });
    window.addEventListener('touchmove', e => onMove(e.touches[0].clientX), { passive: true });
    window.addEventListener('touchend', onUp);
  }
  animate() {
    if (!this.isAlive) return;
    requestAnimationFrame(() => this.animate());
    const t = Date.now() * 0.001;
    /* 자동 회전 — 편집 중이면 멈춤 */
    if (this.autoRotate && !this.editingId) {
      this.targetTheta += 0.0015;
    }
    this.theta += (this.targetTheta - this.theta) * 0.08;
    this.updateCamera();
    /* 펫 */
    if (this.pet) {
      this.pet.position.y = Math.sin(t * 1.5) * 0.12;
      this.pet.rotation.y += 0.003;
      /* 꼬리 흔들기 */
      if (this.petTail) {
        this.petTail.position.x = Math.sin(t * 4) * 0.08;
        this.petTail.position.y = 0.45 + Math.cos(t * 4) * 0.04;
      }
      /* 날개 펄럭임 */
      if (this.petWing) {
        this.petWing.rotation.y = Math.sin(t * 3) * 0.3;
        this.petWing.scale.x = 1 + Math.sin(t * 3) * 0.1;
      }
      /* 특수 아이템 회전 */
      if (this.petSpecial) {
        this.petSpecial.rotation.y += 0.04;
        this.petSpecial.position.y = 1.85 + Math.sin(t * 2) * 0.08;
      }
    }
    if (this.petFace) {
      this.petFace.lookAt(this.camera.position);
    }
    /* 편집 중인 가구 — 위아래로 떠오르며 강조 */
    if (this.editingId && this.furnitureMap.has(this.editingId)) {
      const g = this.furnitureMap.get(this.editingId);
      g.position.y = 0.3 + Math.sin(t * 3) * 0.12;
    }
    /* 편집 화살표 — 회전 애니메이션 + 펄스 */
    if (this.editArrow) {
      this.editArrow.children[1].material.opacity = 0.5 + Math.sin(t * 4) * 0.25;
    }
    /* 가구 애니메이션 */
    this.animated.forEach(a => {
      if (a.type === 'fish') {
        a.mesh.position.x = a.basePos.x + Math.sin(t * 0.8 + a.phase) * 0.25;
        a.mesh.position.y = a.basePos.y + Math.cos(t * 0.6 + a.phase) * 0.15;
      } else if (a.type === 'fire') {
        a.mesh.scale.y = 0.9 + Math.sin(t * 8) * 0.12;
        a.mesh.scale.x = 0.95 + Math.cos(t * 6) * 0.08;
      } else if (a.type === 'drop') {
        const cycle = (t * 1.5 + a.phase) % 2;
        a.mesh.position.y = 1.15 + (cycle < 1 ? cycle * 0.6 : (2 - cycle) * 0.6);
        a.mesh.position.x = Math.sin(cycle * Math.PI) * 0.15 * Math.cos(a.phase * 2);
      } else if (a.type === 'flag') {
        a.mesh.rotation.y = Math.sin(t * 2) * 0.2;
      } else if (a.type === 'halo') {
        a.mesh.rotation.z += 0.015;
        a.mesh.position.y = 1.72 + Math.sin(t * 2) * 0.05;
      }
    });
    this.renderer.render(this.scene, this.camera);
  }
  destroy() {
    this.isAlive = false;
    if (this.resizeObserver) this.resizeObserver.disconnect();
    if (this.renderer) {
      this.renderer.dispose();
      if (this.container) this.container.innerHTML = '';
    }
  }
}

/* ═══════════════════════════════════════
   🎮 미니 3D 펫 캔버스 — 펫 카드 + 던전용
═══════════════════════════════════════ */
window.__miniRenderers = {};
function initMiniPet3D(containerId, petData) {
  if (!window.THREE) return;
  /* 기존 인스턴스 정리 */
  if (window.__miniRenderers[containerId]) {
    try { window.__miniRenderers[containerId].destroy(); } catch(e) {}
    delete window.__miniRenderers[containerId];
  }
  setTimeout(() => {
    const container = document.getElementById(containerId);
    if (!container) return;
    const W = container.clientWidth || 340;
    const H = container.clientHeight || 280;
    const scene = new THREE.Scene();
    scene.fog = new THREE.Fog(0xfff0f5, 6, 14);
    const camera = new THREE.PerspectiveCamera(40, W / H, 0.1, 100);
    let theta = 0.4, targetTheta = 0.4;
    let isDrag = false, lastX = 0;
    let autoRotate = true;
    const dist = 5.5, camY = 1.6;
    const updateCamera = () => {
      camera.position.x = dist * Math.sin(theta);
      camera.position.z = dist * Math.cos(theta);
      camera.position.y = camY;
      camera.lookAt(0, 1.1, 0);
    };
    updateCamera();
    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setSize(W, H);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    container.appendChild(renderer.domElement);
    /* 조명 */
    scene.add(new THREE.AmbientLight(0xffe4ec, 0.7));
    const sun = new THREE.DirectionalLight(0xffeedf, 0.9);
    sun.position.set(3, 5, 3);
    sun.castShadow = true;
    sun.shadow.mapSize.width = sun.shadow.mapSize.height = 512;
    scene.add(sun);
    const moodLight = new THREE.PointLight(0xff8fb5, 0.6, 8, 1.8);
    moodLight.position.set(-2, 2, 2);
    scene.add(moodLight);
    /* 바닥 (원형 디스크) */
    const floor = new THREE.Mesh(
      new THREE.CylinderGeometry(2.2, 2.2, 0.1, 32),
      new THREE.MeshLambertMaterial({ color: 0xFFE5F1 })
    );
    floor.position.y = -0.05;
    floor.receiveShadow = true;
    scene.add(floor);
    /* 펫 */
    const pet = window.buildFullBodyPet3D({
      petEmoji: petData.petEmoji || '🐾',
      equipment: petData.equipment || {},
      bodyColor: 0xFFE4EF,
      accentColor: 0xFFB5C8
    });
    scene.add(pet);
    /* 회전 컨트롤 */
    const cv = renderer.domElement;
    cv.style.touchAction = 'none';
    cv.addEventListener('mousedown', e => { isDrag = true; autoRotate = false; lastX = e.clientX; });
    window.addEventListener('mousemove', e => {
      if (!isDrag) return;
      targetTheta += (e.clientX - lastX) * 0.012;
      lastX = e.clientX;
    });
    window.addEventListener('mouseup', () => { isDrag = false; });
    cv.addEventListener('touchstart', e => {
      isDrag = true; autoRotate = false;
      lastX = e.touches[0].clientX;
    }, { passive: true });
    cv.addEventListener('touchmove', e => {
      if (!isDrag) return;
      targetTheta += (e.touches[0].clientX - lastX) * 0.012;
      lastX = e.touches[0].clientX;
    }, { passive: true });
    cv.addEventListener('touchend', () => { isDrag = false; });
    let alive = true;
    function animate() {
      if (!alive) return;
      requestAnimationFrame(animate);
      const t = Date.now() * 0.001;
      if (autoRotate) targetTheta += 0.004;
      theta += (targetTheta - theta) * 0.08;
      updateCamera();
      /* 호흡 */
      pet.position.y = Math.sin(t * 1.5) * 0.08;
      /* 팔/다리 흔들기 */
      const ud = pet.userData;
      if (ud.armL) ud.armL.rotation.x = Math.sin(t * 2) * 0.12;
      if (ud.armR) ud.armR.rotation.x = -Math.sin(t * 2) * 0.12;
      if (ud.legL) ud.legL.rotation.x = Math.sin(t * 2 + Math.PI) * 0.05;
      if (ud.legR) ud.legR.rotation.x = -Math.sin(t * 2 + Math.PI) * 0.05;
      if (ud.tail) {
        ud.tail.rotation.y = Math.sin(t * 4) * 0.3;
      }
      if (ud.wing) {
        ud.wing.rotation.y = Math.sin(t * 3) * 0.35;
      }
      if (ud.special) {
        ud.special.rotation.y += 0.025;
        ud.special.position.y = 2.25 + Math.sin(t * 1.5) * 0.1;
      }
      /* 얼굴 카메라 향함 */
      if (ud.face && ud.headGroup) {
        ud.face.lookAt(camera.position);
      }
      renderer.render(scene, camera);
    }
    animate();
    /* 리사이즈 */
    const onResize = () => {
      const w = container.clientWidth || 340;
      const h = container.clientHeight || 280;
      camera.aspect = w / h;
      camera.updateProjectionMatrix();
      renderer.setSize(w, h);
    };
    const ro = new ResizeObserver(onResize);
    ro.observe(container);
    window.__miniRenderers[containerId] = {
      destroy: () => {
        alive = false;
        try { ro.disconnect(); } catch(e) {}
        try { renderer.dispose(); container.innerHTML = ''; } catch(e) {}
      }
    };
  }, 50);
}

/* ═══════════════════════════════════════
   ⚔️ PvP 시스템 (12시간 쿨타임)
═══════════════════════════════════════ */
const PVP_COOLDOWN_MS = 0 * 60 * 60 * 1000;
/* 1시간 */
const PVP_STEAL_RATE  = 0.10; /* 포인트 10% 탈취 */
const PVP_MIN_STEAL   = 50;
const PVP_MAX_STEAL   = 2000;
function simulatePvP(myPet, targetPet){
  const mySt  = getEquippedStats(myPet);
  const tgSt  = getEquippedStats(targetPet);
let myHp    = mySt.maxHp;
  let tgHp    = tgSt.maxHp;
  const log   = [];
for(let t=0; t<30 && myHp>0 && tgHp>0; t++){
    /* 내 공격 */
    if(!checkEva(tgSt.eva)){
      const dmg=calcDmg(mySt.atk,tgSt.def,1+(t===0?0.1:0));
/* 첫 턴 선공 보정 */
      tgHp=Math.max(0,tgHp-dmg);
      log.push(`⚔️ ${myPet.petEmoji}${shortNick(myPet.nick)} → ${dmg}피해 (상대HP ${tgHp})`);
}else{log.push(`💨 ${targetPet.petEmoji}${shortNick(targetPet.nick)} 회피!`);}
    if(tgHp<=0)break;
    /* 상대 반격 */
    if(!checkEva(mySt.eva)){
      const dmg=calcDmg(tgSt.atk,mySt.def);
myHp=Math.max(0,myHp-dmg);
      log.push(`💥 ${targetPet.petEmoji}${shortNick(targetPet.nick)} → ${dmg}피해 (내HP ${myHp})`);
    }else{log.push(`💨 ${myPet.petEmoji}${shortNick(myPet.nick)} 회피!`);}
  }
  return{winner:myHp>=tgHp?'me':'target', myHpLeft:myHp, tgHpLeft:tgHp, log:log.slice(-8)};
}

/* ═══ 캐치마인드 캔버스 클래스 ═══ */
class CatchmindCanvas{
  constructor(canvasId,isDrawer,tool){
    this.el=document.getElementById(canvasId);
    if(!this.el)return;
    this.ctx=this.el.getContext('2d');
    this.isDrawer=isDrawer;
this.tool=tool||{color:'#000000',width:5,eraser:false};
    this.isDown=false;
    this.curPoints=[];
    this.setupSize();
    this.clearCanvas();
    if(isDrawer)this.setupEvents();
  }
  setupSize(){
    const w=this.el.offsetWidth||340;
    const h=this.el.offsetHeight||260;
    const dpr=Math.min(window.devicePixelRatio||1,2);
    this.el.width=w*dpr;this.el.height=h*dpr;
    this.ctx.scale(dpr,dpr);
this.W=w;this.H=h;
  }
  clearCanvas(){
    this.ctx.fillStyle='#FFFFFF';
    this.ctx.fillRect(0,0,this.W,this.H);
  }
  norm(x,y){return{x:x/this.W,y:y/this.H};}
  denorm(nx,ny){return{x:nx*this.W,y:ny*this.H};}
  drawStroke(s){
    if(!s.points||s.points.length<1)return;
    const ctx=this.ctx;
    ctx.beginPath();
    ctx.strokeStyle=s.eraser?'#FFFFFF':s.color||'#000000';
    ctx.lineWidth=s.width||5;
    ctx.lineCap='round';ctx.lineJoin='round';
    const p0=this.denorm(s.points[0].x,s.points[0].y);
    ctx.moveTo(p0.x,p0.y);
    if(s.points.length===1){
      ctx.arc(p0.x,p0.y,(s.width||5)/2,0,Math.PI*2);
      ctx.fillStyle=s.eraser?'#FFFFFF':s.color||'#000000';
      ctx.fill();return;
    }
    s.points.forEach((p,i)=>{if(i===0)return;const d=this.denorm(p.x,p.y);ctx.lineTo(d.x,d.y);});
    ctx.stroke();
  }
  redrawAll(strokes){
    this.clearCanvas();
    strokes.forEach(s=>this.drawStroke(s));
  }
  getPos(e){
    const rect=this.el.getBoundingClientRect();
    const src=e.touches?e.touches[0]:e;
    return{x:src.clientX-rect.left,y:src.clientY-rect.top};
  }
  setupEvents(){
    const el=this.el;
    el.style.cursor='crosshair';
    el.addEventListener('mousedown',e=>{
      this.isDown=true;
      const pos=this.getPos(e);
      this.curPoints=[this.norm(pos.x,pos.y)];
    });
    el.addEventListener('mousemove',e=>{
      if(!this.isDown)return;
      const pos=this.getPos(e);
      this.curPoints.push(this.norm(pos.x,pos.y));
      /* 실시간 로컬 그리기 */
      const pts=this.curPoints;
      if(pts.length>=2){
        const ctx=this.ctx;
        ctx.beginPath();
        ctx.strokeStyle=this.tool.eraser?'#FFFFFF':this.tool.color;
        ctx.lineWidth=this.tool.width;
        ctx.lineCap='round';ctx.lineJoin='round';
        const a=this.denorm(pts[pts.length-2].x,pts[pts.length-2].y);
        const b=this.denorm(pts[pts.length-1].x,pts[pts.length-1].y);
        ctx.moveTo(a.x,a.y);ctx.lineTo(b.x,b.y);ctx.stroke();
      }
    });
    el.addEventListener('mouseup',()=>this.saveStroke());
    el.addEventListener('mouseleave',()=>{if(this.isDown)this.saveStroke();});
    el.addEventListener('touchstart',e=>{e.preventDefault();this.isDown=true;const pos=this.getPos(e);this.curPoints=[this.norm(pos.x,pos.y)];},{passive:false});
    el.addEventListener('touchmove',e=>{e.preventDefault();if(!this.isDown)return;const pos=this.getPos(e);this.curPoints.push(this.norm(pos.x,pos.y));const pts=this.curPoints;if(pts.length>=2){const ctx=this.ctx;ctx.beginPath();ctx.strokeStyle=this.tool.eraser?'#FFFFFF':this.tool.color;ctx.lineWidth=this.tool.width;ctx.lineCap='round';const a=this.denorm(pts[pts.length-2].x,pts[pts.length-2].y);const b=this.denorm(pts[pts.length-1].x,pts[pts.length-1].y);ctx.moveTo(a.x,a.y);ctx.lineTo(b.x,b.y);ctx.stroke();}},{passive:false});
    el.addEventListener('touchend',e=>{e.preventDefault();this.saveStroke();},{passive:false});
  }
  async saveStroke(){
    if(!this.isDown)return;
    this.isDown=false;
    if(!this.curPoints.length)return;
    const pts=[...this.curPoints];
    this.curPoints=[];
    await cmStrokesCol.add({
      points:pts,
      color:this.tool.eraser?'#FFFFFF':this.tool.color,
      width:this.tool.width,
      eraser:this.tool.eraser||false,
      timestamp:TS()
    }).catch(()=>{});
  }
  updateTool(t){this.tool={...this.tool,...t};}
}
function initCatchmindCanvas(){
  const myNick=S.myEntry?.nick;
  const state=S.catchmindState;
  const isDrawer=state?.status==='drawing'&&state?.drawerNick===myNick;
  /* render() 후 DOM이 새로 생성되므로 항상 새 인스턴스 생성 */
  const inst=new CatchmindCanvas('cm_canvas',isDrawer,S.cmTool);
  if(!inst.el)return;
  window.__cmCanvas=inst;
  inst.redrawAll(S.cmStrokes);
  /* 타이머 재시작 */
  if(window.__cmTimer)clearInterval(window.__cmTimer);
  window.__cmTimer=setInterval(()=>{
    const timerEl=document.getElementById('cm_timer');
    if(!timerEl)return;
    const st=S.catchmindState;
    if(!st||st.status!=='drawing'){timerEl.textContent='';return;}
    const elapsed=(Date.now()-(st.startedAt||0))/1000;
    const rem=Math.max(0,Math.ceil((st.roundTime||90)-elapsed));
    timerEl.textContent=rem+'초';
    timerEl.style.color=rem<=10?'#C62828':rem<=30?'#FF5722':'var(--text1)';
    if(rem===0&&!st.solvedBy){
      timerEl.textContent='⏰ 시간 초과!';
      clearInterval(window.__cmTimer);window.__cmTimer=null;
      /* 시간 초과 시 상태를 reveal로 변경하여 다음 라운드 버튼이 나타나게 함 */
      gameStateCol.doc("catchmind").update({status:'reveal', solvedBy:null});
    }
  },500);
}
