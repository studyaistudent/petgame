@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=Playfair+Display:ital,wght=0,700;1,400&display=swap');
:root {
  --rose:       #E8537A;
  --rose2:      #C73B65;
  --rose-lt:    #FDEEF4;
  --rose-pale:  #FFF6FA;
  --plum:       #7C3F7E;
  --gold:       #D4A853;
  --cream:      #FDF8F2;
  --text1:      #2A1A2E;
  --text2:      #6B4870;
  --text3:      #B89CB8;
  --border:     rgba(232,83,122,.18);
  --border2:    rgba(232,83,122,.35);
  --shadow:     0 4px 24px rgba(232,83,122,.12);
  --r:          14px;
  --r-sm:       10px;
  /* LoveMon extras */
  --mint:       #2EC4B6;
  --mint-lt:    #E8F8F7;
  --lm-gold:    #F0A500;
  --lm-purple:  #9B59B6;
}
*{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:'Noto Sans KR',sans-serif;
  background:#FDF0F6;
  background-image:
    radial-gradient(ellipse 60% 40% at 20% 10%,rgba(232,83,122,.10) 0%,transparent 60%),
    radial-gradient(ellipse 50% 50% at 80% 80%,rgba(124,63,126,.08) 0%,transparent 60%),
    radial-gradient(ellipse 40% 30% at 50% 50%,rgba(212,168,83,.05) 0%,transparent 60%);
  min-height:100vh;color:var(--text1);
}
body::before{
  content:'💕 🌹 💗 🌸 💘 ✨ 🐾 🥚 💕 🌹';
  position:fixed;top:0;left:0;width:100%;
  font-size:11px;letter-spacing:26px;
  color:rgba(232,83,122,.06);
  pointer-events:none;z-index:0;
  line-height:30px;word-spacing:18px;
  white-space:nowrap;overflow:hidden;
}
#app{max-width:560px;margin:0 auto;padding:1rem;position:relative;z-index:1;}

/* ── Card ── */
.card{background:rgba(255,255,255,.92);backdrop-filter:blur(8px);border:1px solid var(--border);border-radius:var(--r);padding:1.25rem;box-shadow:var(--shadow);}
.card-rose{background:linear-gradient(135deg,rgba(253,238,244,.95),rgba(253,245,250,.95));border-color:var(--border2);}
.card-mint{background:linear-gradient(135deg,rgba(232,248,247,.95),rgba(240,253,252,.95));border-color:rgba(46,196,182,.3);}
.card-gold{background:linear-gradient(135deg,rgba(253,248,230,.95),rgba(255,252,240,.95));border-color:rgba(212,168,83,.3);}

/* ── Buttons ── */
.btn{border:1.5px solid var(--border2);border-radius:var(--r-sm);padding:10px 16px;cursor:pointer;font-size:13.5px;font-family:'Noto Sans KR',sans-serif;background:white;color:var(--text1);transition:all .15s;display:inline-flex;align-items:center;justify-content:center;gap:5px;}
.btn:hover{background:var(--rose-lt);}
.btn:active{transform:scale(.97);}
.btn-primary{background:linear-gradient(135deg,var(--rose),var(--rose2)) !important;color:white !important;border:none !important;font-weight:500;box-shadow:0 3px 12px rgba(232,83,122,.35);}
.btn-primary:hover{opacity:.88;box-shadow:0 5px 18px rgba(232,83,122,.45);}
.btn-sel{background:linear-gradient(135deg,var(--rose),var(--rose2)) !important;color:white !important;border-color:transparent !important;}
.btn-plum{background:linear-gradient(135deg,var(--plum),#9C27B0) !important;color:white !important;border:none !important;box-shadow:0 3px 12px rgba(124,63,126,.3);}
.btn-mint{background:linear-gradient(135deg,var(--mint),#1A9E95) !important;color:white !important;border:none !important;box-shadow:0 3px 12px rgba(46,196,182,.3);}
.btn-gold{background:linear-gradient(135deg,var(--gold),#B8860B) !important;color:white !important;border:none !important;box-shadow:0 3px 12px rgba(212,168,83,.3);}
.btn-danger{color:#C62828 !important;border-color:#FFCDD2 !important;}

/* ── Inputs ── */
.inp{width:100%;padding:10px 14px;border:1.5px solid var(--border2);border-radius:var(--r-sm);font-size:13.5px;font-family:'Noto Sans KR',sans-serif;background:white;color:var(--text1);transition:border-color .15s,box-shadow .15s;}
.inp:focus{outline:none;border-color:var(--rose);box-shadow:0 0 0 3px rgba(232,83,122,.12);}

/* ── Progress bar ── */
.prog{height:6px;background:var(--rose-lt);border-radius:99px;overflow:hidden;}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--rose),var(--rose2));border-radius:99px;transition:width .5s cubic-bezier(.4,0,.2,1);}
.prog-mint{background:linear-gradient(90deg,var(--mint),#1A9E95);}

/* ── Tabs ── */
.tabs{display:flex;background:white;border:1px solid var(--border);border-radius:var(--r-sm);overflow-x:auto;margin-bottom:14px;scrollbar-width:none;}
.tabs::-webkit-scrollbar{display:none;}
.tab{flex-shrink:0;min-width:58px;padding:9px 6px;font-size:11px;font-family:'Noto Sans KR',sans-serif;background:transparent;border:none;border-right:1px solid var(--border);cursor:pointer;color:var(--text2);transition:all .15s;line-height:1.3;white-space:pre-line;text-align:center;}
.tab:last-child{border-right:none;}
.tab.on{background:linear-gradient(135deg,var(--rose),var(--rose2));color:white;font-weight:500;}
.tab.on-mint{background:linear-gradient(135deg,var(--mint),#1A9E95);color:white;font-weight:500;}

/* ── Answer buttons ── */
.ans{width:100%;padding:15px;border:1.5px solid var(--border);border-radius:var(--r-sm);background:white;color:var(--text1);cursor:pointer;font-size:14px;font-family:'Noto Sans KR',sans-serif;text-align:center;transition:all .15s;}
.ans:hover{background:var(--rose-lt);border-color:var(--rose);transform:translateY(-1px);}
.ans:active{transform:scale(.98);}

/* ── Scroll list ── */
.slist{max-height:220px;overflow-y:auto;display:flex;flex-direction:column;gap:5px;}
.slist::-webkit-scrollbar{width:3px;}
.slist::-webkit-scrollbar-thumb{background:var(--rose-lt);border-radius:99px;}

/* ── Animations ── */
@keyframes float{0%,100%{transform:translateY(0);}50%{transform:translateY(-7px);}}
@keyframes pulse{0%,100%{transform:scale(1);}50%{transform:scale(1.08);}}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
@keyframes shimmer{0%{background-position:-200% 0;}100%{background-position:200% 0;}}
@keyframes livePulse{0%,100%{opacity:1;}50%{opacity:0.4;}}

.float{animation:float 2.5s ease-in-out infinite;}
.pulse{animation:pulse 1.5s ease-in-out infinite;}
.fadein{animation:fadeIn .4s ease;}
.live-dot{width:7px;height:7px;background:#E8537A;border-radius:50%;display:inline-block;animation:livePulse 1.2s infinite;}

/* ── Score bar ── */
.sbar{height:7px;background:var(--rose-lt);border-radius:99px;overflow:hidden;flex:1;}
.sbar-fill{height:100%;background:linear-gradient(90deg,var(--rose),var(--rose2));border-radius:99px;transition:width .6s ease;}

/* ── Title decorative ── */
.title-deco{font-family:'Playfair Display',serif;font-style:italic;letter-spacing:.5px;}

/* ── Badges ── */
.rose-badge{display:inline-flex;align-items:center;gap:3px;background:linear-gradient(135deg,#FFE4EF,#FFC8DA);color:var(--rose2);padding:2px 9px;border-radius:99px;font-size:11px;font-weight:700;border:1px solid rgba(232,83,122,.3);}
.gold-badge{display:inline-flex;align-items:center;gap:3px;background:linear-gradient(135deg,#FFF3CD,#FFE082);color:#8B6914;padding:2px 9px;border-radius:99px;font-size:11px;font-weight:700;border:1px solid rgba(212,168,83,.4);}

/* ── Heart separator ── */
.sep{display:flex;align-items:center;gap:8px;font-size:11px;color:var(--text3);margin:6px 0;}
.sep::before,.sep::after{content:'';flex:1;height:1px;background:var(--border);}
.chip{display:inline-block;padding:2px 9px;border-radius:99px;font-size:11px;font-weight:500;}

/* ── LoveMon Specific ── */
.lm-pet-card{
  background:linear-gradient(160deg,rgba(253,238,244,.98),rgba(240,230,255,.98));

  box-shadow:0 6px 28px rgba(155,89,182,.12);

.lm-xp-bar{height:8px;background:rgba(155,89,182,.12);border-radius:99px;overflow:hidden;}
.lm-xp-fill{height:100%;background:linear-gradient(90deg,var(--rose),var(--lm-purple));border-radius:99px;transition:width .6s cubic-bezier(.4,0,.2,1);}
.lm-stat-row{display:flex;justify-content:center;gap:20px;margin:10px 0;}
.lm-stat{text-align:center;}
.lm-stat .val{font-size:22px;font-weight:700;line-height:1;}
.lm-stat .lbl{font-size:10.5px;color:var(--text3);margin-top:2px;}
.lm-cho-char{
  width:50px;height:50px;border-radius:12px;
  border:2px solid rgba(46,196,182,.4);
  background:white;display:inline-flex;align-items:center;justify-content:center;
  font-size:24px;font-weight:700;color:var(--mint);
  box-shadow:0 3px 12px rgba(46,196,182,.15);
  animation:pulse 2s ease-in-out infinite;

.lm-market-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.lm-market-item{
  border:1.5px solid var(--border);border-radius:12px;
  background:white;padding:10px 8px;text-align:center;
  cursor:pointer;transition:all .15s;
}
.lm-market-item:hover{border-color:var(--rose);background:var(--rose-lt);transform:translateY(-2px);}
.lm-market-item:active{transform:scale(.97);}
.lm-feed-log{max-height:150px;overflow-y:auto;}
.lm-feed-log::-webkit-scrollbar{width:3px;}
.lm-feed-log::-webkit-scrollbar-thumb{background:var(--rose-lt);}
.lm-chosung-chat{max-height:200px;overflow-y:auto;display:flex;flex-direction:column;gap:4px;}
.lm-chosung-chat::-webkit-scrollbar{width:3px;}
.lm-chosung-chat::-webkit-scrollbar-thumb{background:rgba(46,196,182,.2);}
.lm-chat-msg{padding:5px 8px;border-radius:8px;font-size:13px;display:flex;gap:6px;align-items:baseline;}
.lm-chat-msg.correct{background:rgba(232,83,122,.07);border:1px solid rgba(232,83,122,.2);}
.lm-chat-nick{font-weight:700;font-size:12px;color:var(--rose2);flex-shrink:0;}
.lm-family-row{display:flex;align-items:center;justify-content:center;gap:6px;padding:8px 0;border-bottom:1px solid var(--border);font-size:13px;flex-wrap:wrap;}
.lm-breed-incoming{background:rgba(155,89,182,.07);border:1px solid rgba(155,89,182,.2);border-radius:10px;padding:10px;margin-top:8px;}
.lm-lb-row{display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid var(--border);}
.lm-lb-rank{font-size:16px;width:26px;text-align:center;}
.lm-lb-pet{font-size:22px;}
.lm-lb-nick{flex:1;font-size:13px;font-weight:600;}
.lm-lb-pts{font-size:13px;font-weight:700;color:var(--gold);}
</style>

function esc(s){return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");}
function todayStr(){const d=new Date();return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;}
function shortNick(n){return(n||"").split("/")[0].trim();}
function getMBTICompat(t1,t2){const i=TYPES.indexOf(t1),j=TYPES.indexOf(t2);return(i>=0&&j>=0)?COMPAT[i][j]:null;}
function calcMBTI(ans){
  const c={E:0,I:0,S:0,N:0,T:0,F:0,J:0,P:0};
  QS.forEach(q=>{const a=ans[q.id];if(a===undefined)return;if(a>0)c[q.p]+=a;else if(a<0)c[OPP[q.p]]+=Math.abs(a);});
  return`${c.E>=c.I?"E":"I"}${c.S>=c.N?"S":"N"}${c.T>=c.F?"T":"F"}${c.J>=c.P?"J":"P"}`;
}
function calcPctCompat(e1,e2,questions){
  let match=0,total=0;
  questions.forEach(q=>{const v1=e1.answers?.[q.id],v2=e2.answers?.[q.id];if(v1!==undefined&&v2!==undefined){total++;if(v1===v2)match++;}});
  return total>0?Math.round((match/total)*100):null;
}
function pctLabel(pct){
  if(pct>=90)return"취향이 거의 같아요! 천생연분 💘";
  if(pct>=70)return"취향이 잘 맞아요! 아주 좋아요 💕";
  if(pct>=50)return"반반이에요! 다른 점이 매력포인트 🌸";
  if(pct>=30)return"조금 달라요... 노력이 필요해 💪";
  return"정반대예요! 신기한 인연 😅";
}
function determinePet(mbti,balAnswers){
  let spicy=0;
  if(balAnswers){if(balAnswers[8]==="A")spicy++;if(balAnswers[16]==="B")spicy++;if(balAnswers[3]==="B")spicy++;}
  if(spicy>=2)return{e:'😈',n:'악동몬',d:'매운맛 유전자! 뿔 달린 악동 몬스터 계열'};
  return PET_BY_MBTI[mbti]||{e:'🐾',n:'러브몬',d:'신비로운 인연의 펫'};
}
function lvLabel(lv){
  if(lv>=MAX_LV)return'🏆 베테랑 훈련사';

}

function load(){

  try{
    mbtiCol.orderBy("timestamp","desc").onSnapshot(snap=>{
      S.entries=snap.docs.map(d=>({id:d.id,...d.data()}));
      S.loading=false;
      if(S.screen==="board"||S.screen==="home")render();
    });
    balCol.orderBy("timestamp","desc").onSnapshot(snap=>{
      S.balEntries=snap.docs.map(d=>({id:d.id,...d.data()}));
      if(S.screen==="board"&&S.tab==="compat")render();
    });
    datCol.orderBy("timestamp","desc").onSnapshot(snap=>{
      S.datEntries=snap.docs.map(d=>({id:d.id,...d.data()}));
      if(S.screen==="board"&&S.tab==="compat")render();
    });
    const today=todayStr();
    roseCol.where("date","==",today).onSnapshot(snap=>{
      S.roseEntries=snap.docs.map(d=>({id:d.id,...d.data()}));
      if(S.screen==="board")render();
    });
    mutualCol.orderBy("timestamp","desc").limit(30).onSnapshot(snap=>{
      S.mutualRoses=snap.docs.map(d=>({id:d.id,...d.data()}));
      if(S.screen==="board"&&S.tab==="rose")render();
    });

    /* 러브몬 리스너 */
    petCol.orderBy("timestamp","desc").onSnapshot(snap=>{
      S.petEntries=snap.docs.map(d=>({id:d.id,...d.data()}));
      const myNick=S.myEntry?.nick;
      if(myNick){
        const found=S.petEntries.find(p=>p.nick===myNick);
        if(found){S.myPet=found;localStorage.setItem("lmg_pet",JSON.stringify(found));}
      }
      if(S.screen==="board"&&S.tab==="lm_pet")render();
    });
    gameStateCol.doc("chosung_current").onSnapshot(snap=>{
      S.chosungState=snap.exists?snap.data():null;
      if(S.screen==="board"&&S.tab==="lm_plaza")render();
    });
    chatCol.orderBy("timestamp","desc").limit(40).onSnapshot(snap=>{
      S.chosungChat=snap.docs.map(d=>({id:d.id,...d.data()})).reverse();
      if(S.screen==="board"&&S.tab==="lm_plaza"){
        const feed=document.getElementById("lm_chat_feed");

    breedReqCol.where("status","==","pending").onSnapshot(snap=>{
      S.breedRequests=snap.docs.map(d=>({id:d.id,...d.data()}));
      if(S.screen==="board"&&S.tab==="lm_pet")render();
    });
    familyCol.orderBy("timestamp","desc").limit(30).onSnapshot(snap=>{
      S.familyTree=snap.docs.map(d=>({id:d.id,...d.data()}));
      if(S.screen==="board"&&S.tab==="lm_pet")render();
    });

    if(S.myEntry?.nick&&!S.myPet) initOrLoadPet(S.myEntry.nick,S.myEntry.gender,S.myEntry.mbti,S.myBalEntry?.answers);
    ensureChosungGame();
    if(S.myPet) checkDailyBonus();
  }catch(e){

  }
}

  const todaySent=S.roseEntries.filter(r=>r.sender===senderNick&&r.date===today);

  if(todaySent.some(r=>r.receiver===receiverNick)){alert("이미 이 분께 장미꽃을 보냈어요 💕");return;}
  try{
    const roseData={sender:senderNick,sender_gender:senderGender,receiver:receiverNick,receiver_gender:receiverGender,date:today};
    await roseCol.add({...roseData,timestamp:TS()});
    const mutual=S.roseEntries.find(r=>r.sender===receiverNick&&r.receiver===senderNick&&r.date===today);
    if(mutual){
      const alreadyMutual=S.mutualRoses.find(m=>m.date===today&&((m.user1===senderNick&&m.user2===receiverNick)||(m.user1===receiverNick&&m.user2===senderNick)));
      if(!alreadyMutual){

        await mutualCol.add({...mData,timestamp:TS()});
      }
      alert("💕 서로 장미꽃을 주고받았어요!\n알림판을 확인해보세요! 💕");
    }else{alert("🌹 장미꽃을 보냈어요!\n상대방도 장미꽃을 주면 함께 공개돼요!");}
  }catch(e){console.error(e);}
}

      if(S.myPet?.nick===nick){S.myPet.level=newLv;S.myPet.xp=newXP;}

  if(!myNick){alert("MBTI 검사를 완료 후 이용해주세요!");return;}
  if(!S.myPet){alert("먼저 러브몬을 생성해주세요!");return;}
  if((S.myPet.points||0)<item.cost){alert(`포인트가 부족합니다! (필요: ${item.cost}P, 보유: ${S.myPet.points||0}P)`);return;}

  const isSelf=!targetNick||targetNick===myNick;
  const feedTarget=isSelf?myNick:targetNick;

  if(!confirm(`${item.emoji} ${item.name}을(를) ${isSelf?'내':'상대방'} 펫에게 주시겠습니까? (-${item.cost}P)`))return;

  try{
    await petCol.doc(myNick).update({points:INC(-item.cost)});
    S.myPet.points=(S.myPet.points||0)-item.cost;

    if(item.xp>0){
      await petCol.doc(feedTarget).update({xp:INC(item.xp)});
      if(isSelf){S.myPet.xp=(S.myPet.xp||0)+item.xp;}
      await checkAndLevelUp(feedTarget);
    }
    if(itemId==='rose_gift'&&!isSelf){
      await petCol.doc(feedTarget).update({xp:INC(40)});
      await checkAndLevelUp(feedTarget);
    }
    await feedLogCol.add({from:myNick,to:feedTarget,item:item.name,emoji:item.emoji,xp:item.xp,timestamp:TS()});

    const msg=isSelf ?`${item.emoji} ${item.name} 급여 완료! XP +${item.xp}`:`${item.emoji} ${targetNick}님 펫에게 ${item.name}을 선물했습니다! 🎁`;
    alert(msg);render();
  }catch(e){console.error(e);alert("오류가 발생했습니다.");}
}

async function transferPoints(toNick){
  const myNick=S.myPet?.nick;
  if(!myNick||!S.myPet){alert("MBTI 검사 완료 후 이용해주세요!");return;}
  const amtStr=prompt(`💰 ${toNick}님에게 보낼 포인트 금액을 입력하세요\n(보유: ${S.myPet.points||0}P)`);
  if(!amtStr)return;
  const amount=parseInt(amtStr);
  if(isNaN(amount)||amount<=0){alert("올바른 금액을 입력해주세요.");return;}
  if((S.myPet.points||0)<amount){alert("포인트가 부족합니다!");return;}
  if(!confirm(`💸 ${toNick}님에게 ${amount}P를 송금하겠습니까?`))return;
  try{
    await petCol.doc(myNick).update({points:INC(-amount)});
    S.myPet.points=(S.myPet.points||0)-amount;
    await petCol.doc(toNick).update({points:INC(amount)});
    alert(`✅ ${toNick}님에게 ${amount}P 송금 완료!`);render();
  }catch(e){console.error(e);alert("송금 중 오류 발생");}
}

async function requestBreed(toNick){
  const myNick=S.myPet?.nick;
  if(!myNick||!S.myPet){alert("MBTI 검사 완료 후 이용해주세요!");return;}
  if((S.myPet.level||1)<MAX_LV){alert(`교배는 Lv.${MAX_LV} 성체 달성 후 가능합니다!\n현재: Lv.${S.myPet.level}`);return;}

  const alreadyReq=S.breedRequests.some(r=>r.from===myNick&&r.to===toNick&&r.status==='pending');
  if(alreadyReq){alert("이미 교배 신청을 보낸 상대입니다 💕");return;}

  const myPetInfo=S.myPet;
  const targetPet=S.petEntries.find(p=>p.nick===toNick);
  if(!targetPet||(targetPet.level||1)<MAX_LV){alert(`${toNick}님의 펫도 Lv.${MAX_LV} 성체가 되어야 교배할 수 있어요!`);return;}

  if(!confirm(`💍 ${toNick}님 (${targetPet.petEmoji}${targetPet.petName})에게 교배 신청을 보내겠습니까?\n상대방도 수락하면 2세대 알이 탄생해요! 🥚`))return;

  try{
    await breedReqCol.add({
      from:myNick,fromEmoji:myPetInfo.petEmoji,fromPetName:myPetInfo.petName,
      to:toNick,toEmoji:targetPet.petEmoji,toPetName:targetPet.petName,
      status:'pending',timestamp:TS()
    });
    const mutualReq=S.breedRequests.find(r=>r.from===toNick&&r.to===myNick&&r.status==='pending');
    if(mutualReq){ await completeBreed(mutualReq.id,toNick,myNick,targetPet,myPetInfo); }
    else{ alert(`💍 ${toNick}님에게 교배 신청을 보냈습니다!\n상대방도 신청하면 2세대 알이 탄생해요 🥚`); }
    render();
  }catch(e){console.error(e);}
}

async function acceptBreed(reqId,fromNick){
  const req=S.breedRequests.find(r=>r.id===reqId);
  if(!req)return;
  const myNick=S.myPet?.nick;
  if(!myNick){alert("MBTI 검사 완료 후 이용해주세요!");return;}
  if((S.myPet.level||1)<MAX_LV){alert(`교배는 Lv.${MAX_LV} 성체 달성 후 가능합니다!`);return;}
  if(!confirm(`💍 ${fromNick}님의 교배 신청을 수락하겠습니까? 2세대 알이 탄생해요! 🥚`))return;
  const fromPet=S.petEntries.find(p=>p.nick===fromNick);
  if(!fromPet)return;
  await completeBreed(reqId,fromNick,myNick,fromPet,S.myPet);
}

async function completeBreed(reqId,parent1Nick,parent2Nick,pet1,pet2){
  try{
    await breedReqCol.doc(reqId).update({status:'accepted'});
    const childEmoji=Math.random()>0.5?pet1.petEmoji:pet2.petEmoji;
    const childName=`${shortNick(parent1Nick).slice(0,2)}×${shortNick(parent2Nick).slice(0,2)}몬`;
    const childDesc=`${pet1.mbti||'??'} × ${pet2.mbti||'??'} 혼종 하이브리드 레어몬!`;
    await familyCol.add({
      parent1Nick,parent1Emoji:pet1.petEmoji,parent1Pet:pet1.petName,
      parent2Nick,parent2Emoji:pet2.petEmoji,parent2Pet:pet2.petName,
      childEmoji,childName,childDesc,timestamp:TS()
    });
    alert(`🎉 교배 성공! ${childEmoji}[${childName}] 2세대 알이 탄생했습니다!\n족보에 기록됐어요! 🌳`);
    render();
  }catch(e){console.error(e);}
}

/* ═══════════════════════════════════════
   초성 게임 LOGIC
═══════════════════════════════════════ */
async function ensureChosungGame(){
  try{
    const snap=await gameStateCol.doc("chosung_current").get();
    if(!snap.exists){await startChosungQuestion(0);}
  }catch(e){}
}
async function startChosungQuestion(idx){
  const q=CHOSUNG_QS[idx%CHOSUNG_QS.length];
  await gameStateCol.doc("chosung_current").set({
    qIdx:idx,chosung:q.cho,genre:q.genre,answer:q.ans,hint:q.hint,
    solvedBy:null,solvedAt:null,startedAt:TS()
  });
}
async function submitChosungAnswer(){
  const inputEl=document.getElementById("lm_chosung_input");
  if(!inputEl)return;
  const val=inputEl.value.trim();
  if(!val)return;
  const myNick=S.myEntry?.nick||S.myPet?.nick;
  if(!myNick){alert("MBTI 검사를 완료 후 참여해주세요!");inputEl.value="";return;}
  const state=S.chosungState;
  if(!state){inputEl.value="";return;}
  if(state.solvedBy){alert("이미 정답이 나왔어요! 다음 문제를 기다려주세요 ⏳");inputEl.value="";return;}

  const isCorrect=val===state.answer;
  await chatCol.add({nick:shortNick(myNick),message:val,isCorrect,timestamp:TS()});
  inputEl.value="";S.chosungInput="";

  if(isCorrect){
    try{await gameStateCol.doc("chosung_current").update({solvedBy:shortNick(myNick),solvedAt:TS()});}catch(e){}
    if(S.myPet){
      await addPoints(myNick,50);
      alert(`⚡ 정답! +50P 획득! 🎉`);
    }
    setTimeout(async()=>{
      const nextIdx=((state.qIdx||0)+1);
      await startChosungQuestion(nextIdx);
    },3000);
  }
}

/* ─── COMPATIBILITY TAB ─── */
function rCompatTab(){
  const males=S.entries.filter(e=>e.gender==="남성");
  const females=S.entries.filter(e=>e.gender==="여성");
  const mList=males.length===0?`<p style="font-size:12px;color:var(--text3);padding:6px">남성 참여자 없음</p>`:males.map(e=>`<button class="btn ${S.selM?.id===e.id?"btn-sel":""}" style="padding:8px 10px;text-align:left;width:100%;font-size:12.5px" data-a="selM" data-id="${e.id}"><span style="font-weight:500">${esc(shortNick(e.nick))}</span><span style="font-size:11px;margin-left:4px;opacity:.7">${esc(e.mbti)}</span></button>`).join("");
  const fList=females.length===0?`<p style="font-size:12px;color:var(--text3);padding:6px">여성 참여자 없음</p>`:females.map(e=>`<button class="btn ${S.selF?.id===e.id?"btn-sel":""}" style="padding:8px 10px;text-align:left;width:100%;font-size:12.5px" data-a="selF" data-id="${e.id}"><span style="font-weight:500">${esc(shortNick(e.nick))}</span><span style="font-size:11px;margin-left:4px;opacity:.7">${esc(e.mbti)}</span></button>`).join("");
  let resultHTML=`<div class="card" style="text-align:center;padding:2rem"><div style="font-size:36px;margin-bottom:8px">💘</div><p style="color:var(--text2);font-size:13.5px">남성과 여성을 선택하면<br>MBTI · 밸런스 · 연애성향 궁합을 모두 볼 수 있어요</p></div>`;
  if(S.selM&&S.selF){
    const mbtiCl=getMBTICompat(S.selM.mbti,S.selF.mbti);const mbtiInfo=mbtiCl?CM[mbtiCl]:null;
    const mBal=S.balEntries.find(e=>e.nick===S.selM.nick);const fBal=S.balEntries.find(e=>e.nick===S.selF.nick);
    const balPct=(mBal&&fBal)?calcPctCompat(mBal,fBal,BQ):null;
    const mDat=S.datEntries.find(e=>e.nick===S.selM.nick);const fDat=S.datEntries.find(e=>e.nick===S.selF.nick);
    const datPct=(mDat&&fDat)?calcPctCompat(mDat,fDat,DQ):null;
    const scores=[mbtiInfo?mbtiInfo.score:null,balPct,datPct].filter(v=>v!==null);
    const avg=scores.length?Math.round(scores.reduce((a,b)=>a+b,0)/scores.length):null;
    const mbtiRow=mbtiInfo?`<div style="display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--border)"><span style="font-size:13px;color:var(--text2);flex:1">🧠 MBTI (${esc(S.selM.mbti)} × ${esc(S.selF.mbti)})</span><div class="sbar"><div class="sbar-fill" style="width:${mbtiInfo.score}%"></div></div><span style="font-size:13px;font-weight:700;color:var(--rose2);width:38px;text-align:right">${mbtiInfo.score}점</span></div><p style="font-size:12px;color:var(--text3);margin:3px 0 6px">${mbtiInfo.label}</p>`:`<p style="font-size:12px;color:var(--text3);padding:8px 0;border-bottom:1px solid var(--border)">🧠 MBTI — 두 분 모두 검사 필요</p>`;
    const balRow=balPct!==null?`<div style="display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--border)"><span style="font-size:13px;color:var(--text2);flex:1">⚖️ 밸런스 게임</span><div class="sbar"><div class="sbar-fill" style="width:${balPct}%"></div></div><span style="font-size:13px;font-weight:700;color:var(--rose2);width:38px;text-align:right">${balPct}%</span></div><p style="font-size:12px;color:var(--text3);margin:3px 0 6px">${pctLabel(balPct)}</p>`:`<p style="font-size:12px;color:var(--text3);padding:8px 0;border-bottom:1px solid var(--border)">⚖️ 밸런스 — 두 분 모두 참여 필요</p>`;
    const datRow=datPct!==null?`<div style="display:flex;align-items:center;gap:10px;padding:10px 0"><span style="font-size:13px;color:var(--text2);flex:1">💕 연애 성향</span><div class="sbar"><div class="sbar-fill" style="width:${datPct}%"></div></div><span style="font-size:13px;font-weight:700;color:var(--rose2);width:38px;text-align:right">${datPct}%</span></div><p style="font-size:12px;color:var(--text3);margin:3px 0">${pctLabel(datPct)}</p>`:`<p style="font-size:12px;color:var(--text3);padding:8px 0">💕 연애 성향 — 두 분 모두 참여 필요</p>`;
    resultHTML=`<div class="card card-rose" style="margin-bottom:8px">
      <p style="font-size:13px;color:var(--text2);margin:0 0 12px;text-align:center"><b>${esc(shortNick(S.selM.nick))}</b> × <b>${esc(shortNick(S.selF.nick))}</b></p>
      ${avg!==null?`<div style="text-align:center;margin-bottom:14px"><div style="font-size:52px;font-weight:700;background:linear-gradient(135deg,var(--rose),var(--plum));-webkit-background-clip:text;-webkit-text-fill-color:transparent;line-height:1">${avg}<span style="font-size:24px">점</span></div><p style="font-size:12px;color:var(--text3);margin:4px 0 10px">종합 궁합 점수</p><div class="prog" style="height:8px;margin-bottom:4px"><div class="prog-fill" style="width:${avg}%"></div></div></div>`:""}
      ${mbtiRow}${balRow}${datRow}
    </div>`;
  }
  return`<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px">
    <div><p style="font-size:12px;color:var(--text2);margin:0 0 6px;font-weight:600">👨 남성 선택</p><div class="slist">${mList}</div></div>
    <div><p style="font-size:12px;color:var(--text2);margin:0 0 6px;font-weight:600">👩 여성 선택</p><div class="slist">${fList}</div></div>
  </div>${resultHTML}`;
}

/* ─── ROSE TAB ─── */
function rRoseTab(){
  const today=todayStr();const me=S.myEntry;
  const meNick=me?.nick||"";const meGender=me?.gender||"";
  const sentToday=S.roseEntries.filter(r=>r.sender===meNick&&r.date===today);
  const remaining=2-sentToday.length;
  const byReceiver={};
  S.roseEntries.filter(r=>r.date===today).forEach(r=>{byReceiver[r.receiver]=(byReceiver[r.receiver]||0)+1;});
  const oppGender=meGender==="남성"?"여성":"남성";
  const targets=S.entries.filter(e=>e.gender===oppGender&&e.nick!==meNick);

  if(!meNick||!meGender){
    giveUI=`<div class="card" style="text-align:center;padding:1.5rem;margin-bottom:14px">

      ?(targets.length===0
        ?`<p style="font-size:13px;color:var(--text3);text-align:center;padding:.8rem 0">이성 참여자가 없어요</p>`
        :targets.map(e=>{

          const pet=S.petEntries.find(p=>p.nick===e.nick);
          return`<div style="display:flex;align-items:center;justify-content:space-between;padding:10px 12px;border:1.5px solid var(--border);border-radius:10px;margin-bottom:7px;background:white">

              <span style="font-size:11px;color:var(--text3);margin-left:6px">${esc(e.area||"미정")} · ${esc(e.mbti)}</span>
              ${rc>0?`<span class="rose-badge" style="margin-left:5px">🌹 ×${rc}</span>`:""}
            </div>
            ${alreadySent?`<span style="font-size:12px;color:var(--rose);background:var(--rose-lt);padding:5px 12px;border-radius:99px">💕 보냈어요</span>`
                        :`<button class="btn btn-plum" style="padding:6px 14px;font-size:12px" data-a="giveRose" data-recv="${esc(e.nick)}" data-rg="${esc(e.gender)}">🌹 보내기</button>`}
          </div>`;
        }).join("")
      ):`<div style="text-align:center;padding:1.2rem 0;color:var(--text3);font-size:13px">오늘의 장미꽃을 모두 보냈어요! 💕<br>자정 이후 다시 보낼 수 있어요.</div>`;
    giveUI=`<div class="card" style="margin-bottom:14px">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
        <p style="font-size:13.5px;font-weight:700;color:var(--rose2);margin:0">🌹 오늘의 장미꽃 보내기</p>
        <span style="font-size:12px;background:${remaining>0?"var(--rose-lt)":"#f5f5f5"};color:${remaining>0?"var(--rose2)":"#999"};padding:3px 11px;border-radius:99px">남은 장미 ${remaining}송이</span>
      </div>
      <p style="font-size:11.5px;color:var(--text3);margin:0 0 12px;line-height:1.6">💡 매일 자정까지 이성 2명에게 장미꽃을 보낼 수 있어요<br>익명으로 전달되며, 서로 보내면 알림판에 커플 공개돼요!</p>
      ${targetList}
    </div>`;
  }
  const mutualHTML=S.mutualRoses.length===0
    ?`<div class="card" style="text-align:center;padding:1.5rem"><div style="font-size:36px;margin-bottom:8px" class="float">💞</div><p style="color:var(--text3);font-size:13px">아직 서로 장미꽃을 주고받은 인연이 없어요!</p></div>`
    :S.mutualRoses.map(m=>`<div class="card card-rose" style="margin-bottom:8px;border-color:var(--rose)"><div style="display:flex;align-items:center;gap:10px"><span style="font-size:28px" class="pulse">💕</span><div><p style="font-size:14.5px;font-weight:700;color:var(--rose2);margin:0">${esc(shortNick(m.user1))} 💘 ${esc(shortNick(m.user2))}</p><p style="font-size:12px;color:var(--text2);margin:3px 0 0">서로 장미꽃을 주고받았어요 🌹🌹</p></div></div></div>`).join("");

/* ─── ADMIN TAB ─── */
function rAdminTab(){
  if(!S.isAdmin)return`<div class="card" style="text-align:center;max-width:360px;margin:0 auto"><div style="font-size:36px;margin-bottom:8px">🔐</div><p style="font-weight:600;margin:0 0 14px">관리자 로그인</p><input id="pwI" type="password" class="inp" placeholder="비밀번호 입력" style="margin-bottom:8px">${S.pwErr?`<p style="font-size:13px;color:#C62828;margin:0 0 8px">${S.pwErr}</p>`:""}<button class="btn btn-primary" style="width:100%;padding:10px" data-a="login">로그인</button></div>`;
  const rows=!S.entries.length?`<p style="color:var(--text2);text-align:center;padding:2rem">참여자가 없습니다.</p>`:S.entries.map(e=>{
    if(S.editId===e.id){
      return`<div class="card" style="margin-bottom:7px;display:flex;flex-direction:column;gap:6px;border:1.5px solid var(--rose);">
        <div style="font-size:12px;font-weight:bold;color:var(--rose2);margin-bottom:4px;">✏️ 정보 수정</div>
        <input id="edit_nick_${e.id}" class="inp" value="${esc(e.nick)}" placeholder="닉네임">
        <input id="edit_area_${e.id}" class="inp" value="${esc(e.area||'')}" placeholder="지역">
        <input id="edit_gender_${e.id}" class="inp" value="${esc(e.gender||'')}" placeholder="성별(남성/여성)">
        <input id="edit_height_${e.id}" class="inp" value="${esc(e.height||'')}" placeholder="키">
        <input id="edit_freeTime_${e.id}" class="inp" value="${esc(e.freeTime||'')}" placeholder="프리타임">
        <input id="edit_idealType_${e.id}" class="inp" value="${esc(e.idealType||'')}" placeholder="이상형">
        <input id="edit_appeal_${e.id}" class="inp" value="${esc(e.appeal||'')}" placeholder="어필">
        <input id="edit_giDol_${e.id}" class="inp" value="${esc(e.giDol||'')}" placeholder="기/돌">
        <input id="edit_mbti_${e.id}" class="inp" value="${esc(e.mbti||'')}" placeholder="MBTI">
        <input id="edit_pin_${e.id}" class="inp" value="${esc(e.pin||'')}" placeholder="PIN(비밀번호)">
        <div style="display:flex;gap:6px;margin-top:4px;">
          <button class="btn btn-primary" style="flex:1;padding:8px;font-size:12px" data-a="saveEdit" data-id="${e.id}">저장</button>
          <button class="btn" style="flex:1;padding:8px;font-size:12px" data-a="cancelEdit">취소</button>
        </div>
      </div>`;
    }
    return`<div class="card" style="margin-bottom:7px;display:flex;align-items:center;gap:10px">
      <div style="flex:1;min-width:0">
        <span style="font-weight:500">${esc(e.nick)}</span>
        <span style="font-size:11.5px;color:var(--text3);margin-left:6px">${esc(e.area||"미정")} · ${e.gender} · ${esc(e.mbti)} (PIN:${esc(e.pin)})</span>
      </div>
      <button class="btn btn-plum" style="padding:4px 10px;font-size:12px;flex-shrink:0" data-a="edit" data-id="${e.id}">✏️</button>
      <button class="btn btn-danger" style="padding:4px 10px;font-size:12px;flex-shrink:0" data-a="del" data-id="${e.id}">🗑️</button>
    </div>`;
  }).join("");
  return`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px"><p style="margin:0;font-weight:600">참여자 관리 (${S.entries.length}명)</p><div style="display:flex;gap:6px"><button class="btn btn-danger" style="padding:6px 12px;font-size:12px" data-a="delAll">전체삭제</button><button class="btn" style="padding:6px 12px;font-size:12px" data-a="logout">로그아웃</button></div></div>${rows}`;
}

/* ═══════════════════════════════════════
   🐾 러브몬 탭
═══════════════════════════════════════ */
function rLovemonTab(){
  const myNick=S.myEntry?.nick;
  const myPet=S.myPet||S.petEntries.find(p=>p.nick===myNick);
  const myPoints=myPet?.points||0;

  /* ─ 내 펫 없을 때 ─ */
  if(!myNick||!S.myEntry){
    return`<div class="card" style="text-align:center;padding:2rem;margin-bottom:10px">
      <div style="font-size:56px;margin-bottom:12px" class="float">🥚</div>
      <p style="font-size:17px;font-weight:700;color:var(--text1);margin-bottom:8px">아직 러브몬이 없어요!</p>
      <p style="font-size:13px;color:var(--text3);line-height:1.7;margin-bottom:16px">MBTI 검사를 완료하면<br>내 연애 DNA 기반 나만의 러브몬이 탄생해요 🐾<br><span style="color:var(--gold);font-size:12px">신규 가입 보너스 💰100P도 드려요!</span></p>
      <button class="btn btn-primary" style="padding:12px 28px;font-size:14px" data-a="goHome">🧠 MBTI 검사 시작하기</button>
    </div>`;
  }

  if(!myPet){
    return`<div class="card" style="text-align:center;padding:2rem">
      <div style="font-size:48px;margin-bottom:12px" class="float">⏳</div>
      <p style="font-size:13px;color:var(--text2);margin-bottom:12px">펫을 불러오는 중이에요...</p>
      <button class="btn btn-mint" style="padding:10px 22px" data-a="lm_createPet">🐾 펫 생성하기</button>
    </div>`;
  }

  const lvPct=Math.min(100,Math.round(((myPet.xp||0)/XP_PER_LV)*100));
  const incomingReqs=S.breedRequests.filter(r=>r.to===myNick&&r.status==='pending');
  const outgoingReqs=S.breedRequests.filter(r=>r.from===myNick&&r.status==='pending');

  /* ─ 내 펫 카드 ─ */
  const myPetHTML=`
  <div class="lm-pet-card" style="margin-bottom:12px">
    <div style="font-size:11px;color:var(--text2);letter-spacing:.5px;margin-bottom:6px">${lvLabel(myPet.level||1)}</div>
    <div style="font-size:68px;margin:4px 0 6px;animation:float 2.5s ease-in-out infinite">${esc(myPet.petEmoji)}</div>
    <div style="font-size:21px;font-weight:700;color:var(--rose2);margin-bottom:3px">${esc(myPet.petName)}</div>
    <div style="font-size:12px;color:var(--text3);margin-bottom:14px">${esc(myPet.petDesc||'')}</div>

    <div class="lm-stat-row">
      <div class="lm-stat"><div class="val" style="color:var(--rose2)">${myPet.level||1}</div><div class="lbl">레벨</div></div>
      <div class="lm-stat"><div class="val" style="color:var(--gold)">${myPoints.toLocaleString()}</div><div class="lbl">💰 포인트</div></div>
      <div class="lm-stat"><div class="val" style="color:var(--plum)">${myPet.xp||0}</div><div class="lbl">경험치</div></div>
      <div class="lm-stat"><div class="val" style="color:var(--mint)">${myPet.loginStreak||1}</div><div class="lbl">🔥 연속</div></div>
    </div>

    <div style="margin:10px 0 4px">
      <div style="display:flex;justify-content:space-between;font-size:11px;color:var(--text3);margin-bottom:5px">
        <span>경험치</span><span>${myPet.xp||0} / ${XP_PER_LV} XP (Lv.${(myPet.level||1)+1}까지)</span>
      </div>
      <div class="lm-xp-bar"><div class="lm-xp-fill" style="width:${lvPct}%"></div></div>
    </div>
    ${(myPet.level||1)>=MAX_LV?`<div style="font-size:12px;color:var(--gold);font-weight:700;margin-top:10px;padding:6px 12px;background:rgba(212,168,83,.1);border-radius:8px;border:1px solid rgba(212,168,83,.3)">✨ 성체 달성! 교배 신청 가능 상태</div>`:''}

    ${incomingReqs.length>0?`
    <div class="lm-breed-incoming">
      <p style="font-size:12px;font-weight:700;color:var(--rose2);margin:0 0 8px">💍 교배 신청 도착! (${incomingReqs.length}건)</p>
      ${incomingReqs.map(r=>`<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px">
        <div><span style="font-size:18px">${esc(r.fromEmoji||'🐾')}</span> <span style="font-size:13px;font-weight:600">${esc(r.from)}</span>님의 <span style="font-size:12px;color:var(--text3)">${esc(r.fromPetName||'')}</span></div>
        <button class="btn btn-primary" style="padding:5px 12px;font-size:12px" data-a="lm_breedAccept" data-id="${r.id}" data-from="${esc(r.from)}">수락 💍</button>
      </div>`).join('')}
    </div>`:''}
    ${outgoingReqs.length>0?`<div style="font-size:11px;color:var(--text3);margin-top:8px;padding:6px 10px;background:rgba(232,83,122,.05);border-radius:8px">⏳ 교배 신청 대기중: ${outgoingReqs.map(r=>esc(r.to)).join(', ')}</div>`:''}
  </div>`;

  /* ─ 마켓 ─ */
  const marketHTML=`
  <div class="card" style="margin-bottom:12px">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
      <p style="font-size:13.5px;font-weight:700;color:var(--rose2);margin:0">🏪 러브몬 마켓</p>
      <span class="gold-badge">💰 ${myPoints.toLocaleString()}P 보유</span>
    </div>
    <p style="font-size:11.5px;color:var(--text3);margin:0 0 10px;line-height:1.6">내 펫에게 먹이거나, 다른 사람 펫에게 선물로 보낼 수 있어요!</p>
    <div class="lm-market-grid">
      ${MARKET_ITEMS.map(item=>`
        <div class="lm-market-item" data-a="lm_buyFeed" data-item="${item.id}">
          <div style="font-size:32px;margin-bottom:5px">${item.emoji}</div>
          <div style="font-size:12.5px;font-weight:700;margin-bottom:2px">${esc(item.name)}</div>
          <div style="font-size:10.5px;color:var(--text3);margin-bottom:6px;line-height:1.4">${esc(item.desc)}</div>
          <div style="font-size:13px;font-weight:700;color:var(--gold)">${item.cost.toLocaleString()}P</div>
        </div>
      `).join('')}
    </div>
  </div>`;

  /* ─ 다른 유저 펫 ─ */
  const otherPets=S.petEntries.filter(p=>p.nick!==myNick);
  let otherPetsHTML='';
  if(otherPets.length>0){
    otherPetsHTML=`<div class="card" style="margin-bottom:12px">
      <p style="font-size:13.5px;font-weight:700;color:var(--rose2);margin:0 0 4px">🌍 다른 유저의 러브몬</p>
      <p style="font-size:11.5px;color:var(--text3);margin:0 0 10px">사료를 줘서 몰래 키워주는 우렁각시형 플러팅! 💕</p>
      ${otherPets.map(p=>{
        const canBreed=(myPet.level||1)>=MAX_LV&&(p.level||1)>=MAX_LV;
        const alreadyReq=S.breedRequests.some(r=>r.from===myNick&&r.to===p.nick&&r.status==='pending');
        const pLvPct=Math.min(100,Math.round(((p.xp||0)/XP_PER_LV)*100));
        return`<div style="display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--border)">
          <div style="font-size:34px;flex-shrink:0">${esc(p.petEmoji)}</div>
          <div style="flex:1;min-width:0">
            <div style="font-weight:700;font-size:14px">${esc(p.nick)} <span style="font-size:11px;color:var(--text3);font-weight:400">${esc(p.petName)} · Lv.${p.level||1} · ${esc(p.mbti||'')}</span></div>
            <div style="height:4px;background:rgba(155,89,182,.1);border-radius:99px;margin:5px 0 3px">
              <div style="height:100%;width:${pLvPct}%;background:linear-gradient(90deg,var(--rose),var(--lm-purple));border-radius:99px"></div>
            </div>
            <div style="font-size:10.5px;color:var(--text3)">XP ${p.xp||0}/${XP_PER_LV} · 💰${p.points||0}P</div>
          </div>
          <div style="display:flex;flex-direction:column;gap:4px;flex-shrink:0">
            <button class="btn btn-plum" style="padding:5px 10px;font-size:11px;min-width:56px" data-a="lm_feedOther" data-nick="${esc(p.nick)}">🍖 사료</button>
            ${canBreed&&!alreadyReq?`<button class="btn btn-primary" style="padding:5px 10px;font-size:11px;min-width:56px" data-a="lm_breedReq" data-nick="${esc(p.nick)}">💍 교배</button>`:''}
            ${alreadyReq?`<span style="font-size:10px;color:var(--rose);text-align:center">신청중</span>`:''}
            <button class="btn" style="padding:5px 10px;font-size:11px;min-width:56px;border-color:var(--gold);color:var(--gold)" data-a="lm_sendPoints" data-nick="${esc(p.nick)}">💰 송금</button>
          </div>
        </div>`;
      }).join('')}
    </div>`;
  }

  /* ─ 족보 ─ */
  let familyHTML='';
  if(S.familyTree.length>0){
    familyHTML=`<div class="card" style="margin-bottom:12px">
      <p style="font-size:13.5px;font-weight:700;color:var(--rose2);margin:0 0 10px">🌳 우리 방 족보 대시보드</p>
      ${S.familyTree.map(f=>`<div class="lm-family-row">
        <span>${esc(f.parent1Emoji)} ${esc(f.parent1Nick)}</span>
        <span style="color:var(--rose);font-size:14px">💕</span>
        <span>${esc(f.parent2Emoji)} ${esc(f.parent2Nick)}</span>
        <span style="color:var(--text3)">→</span>
        <span style="background:rgba(232,83,122,.08);border:1px solid var(--border2);border-radius:8px;padding:2px 8px;font-size:12px">${esc(f.childEmoji)} ${esc(f.childName)}</span>
      </div>`).join('')}
    </div>`;
  }

  return myPetHTML+marketHTML+otherPetsHTML+familyHTML;
}

/* ═══════════════════════════════════════
   ⚡ 초성 광장 탭
═══════════════════════════════════════ */
function renderChatMessages(){
  if(S.chosungChat.length===0)return`<p style="font-size:12.5px;color:var(--text3);text-align:center;padding:1.5rem">아직 채팅이 없어요. 첫 번째로 정답을 맞춰보세요!</p>`;
  return S.chosungChat.map(m=>`<div class="lm-chat-msg ${m.isCorrect?'correct':''}">
    <span class="lm-chat-nick">${esc(m.nick||'')}</span>
    <span style="font-size:13px;color:${m.isCorrect?'var(--rose2)':'var(--text1)'}">${esc(m.message||'')}</span>
    ${m.isCorrect?`<span style="font-size:11px;color:var(--rose);margin-left:auto">+50P ⚡</span>`:''}
  </div>`).join('');
}

function rPlazaTab(){
  const state=S.chosungState;
  const myNick=S.myEntry?.nick;
  const sortedPets=[...S.petEntries].sort((a,b)=>(b.points||0)-(a.points||0)).slice(0,10);

  /* 초성 디스플레이 */
  const choDisplay=state
    ?`<p style="font-size:13px;font-weight:700;color:var(--plum);text-align:center;margin:8px 0 0">[장르] ${esc(state.genre||'일반')}</p>
      <div style="display:flex;justify-content:center;gap:8px;margin:8px 0 12px;flex-wrap:wrap">
        ${(state.chosung||[]).map(c=>`<div class="lm-cho-char">${c}</div>`).join('')}
      </div>
      <p style="font-size:12px;color:var(--text3);text-align:center;margin-bottom:8px">💡 힌트: ${esc(state.hint||'')}</p>
      ${state.solvedBy?`<div style="text-align:center;padding:10px;background:var(--rose-lt);border-radius:10px;margin-bottom:10px;border:1px solid var(--border2)">
        <p style="font-size:14px;font-weight:700;color:var(--rose2)">⚡ ${esc(state.solvedBy)}님이 먼저 정답! (+50P)</p>
        <p style="font-size:12px;color:var(--text2);margin:3px 0 0">정답: "${esc(state.answer)}" · 다음 문제 준비 중...</p>
      </div>`:''}`
    :`<div style="text-align:center;padding:2rem 0;color:var(--text3)">
        <div style="font-size:40px;margin-bottom:10px">🎉</div>
        <p style="font-size:13px">초성 게임 준비 중... 잠시 후 시작됩니다!</p>
      </div>`;

  const inputSection=state&&!state.solvedBy&&myNick
    ?`<div style="display:flex;gap:8px;margin-top:10px">
        <input id="lm_chosung_input" class="inp" placeholder="정답을 입력하세요..." value="${esc(S.chosungInput)}" style="flex:1">
        <button class="btn btn-mint" style="padding:0 18px;flex-shrink:0;font-size:13px" data-a="lm_submitAnswer">⚡ 입력</button>
      </div>`
    :(!myNick?`<p style="font-size:12px;color:var(--text3);text-align:center;margin-top:10px;padding:10px;background:var(--rose-lt);border-radius:8px">포인트를 받으려면 MBTI 검사를 먼저 완료해주세요!</p>`:
      state?.solvedBy?`<p style="font-size:12px;color:var(--text3);text-align:center;margin-top:10px">다음 문제를 기다려주세요...</p>`:'');

  const lbHTML=sortedPets.length===0
    ?`<p style="font-size:13px;color:var(--text3);text-align:center;padding:1rem">아직 포인트 보유자가 없어요</p>`
    :sortedPets.map((p,i)=>`<div class="lm-lb-row">
        <div class="lm-lb-rank">${i===0?'🥇':i===1?'🥈':i===2?'🥉':i+1}</div>
        <div class="lm-lb-pet">${esc(p.petEmoji||'🐾')}</div>
        <div class="lm-lb-nick">${esc(p.nick)} <span style="font-size:10px;color:var(--text3);font-weight:400">Lv.${p.level||1}</span></div>
        <div class="lm-lb-pts">${(p.points||0).toLocaleString()}P</div>
      </div>`).join('');

  return`
  <div class="card card-mint" style="margin-bottom:12px">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px">
      <p style="font-size:14.5px;font-weight:700;color:var(--text1);margin:0">⚡ 실시간 초성 광장</p>
      <span style="display:flex;align-items:center;gap:5px;background:rgba(232,83,122,.1);color:var(--rose2);font-size:11.5px;padding:3px 10px;border-radius:99px;font-weight:600">
        <span class="live-dot"></span> LIVE
      </span>
    </div>
    <p style="font-size:12px;color:var(--text2);margin:0 0 10px;line-height:1.6">초성을 보고 정답을 먼저 입력하면 <span style="color:var(--gold);font-weight:700">+50P</span> 획득!<br>포인트로 펫을 키우고 마켓 아이템을 구매하세요 🐾</p>
    ${choDisplay}
    ${inputSection}
  </div>

  <div class="card" style="margin-bottom:12px">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">
      <p style="font-size:13px;font-weight:700;color:var(--text2);margin:0">💬 실시간 답변 피드</p>
      <span style="font-size:11px;color:var(--text3)">${S.chosungChat.length}개</span>
    </div>
    <div class="lm-chosung-chat" id="lm_chat_feed">${renderChatMessages()}</div>
  </div>

  <div class="card" style="margin-bottom:12px">
    <p style="font-size:13.5px;font-weight:700;color:var(--rose2);margin:0 0 10px">🏆 포인트 랭킹</p>
    ${lbHTML}
  </div>

  <div class="card card-gold" style="margin-bottom:12px">
    <p style="font-size:13px;font-weight:700;color:var(--text1);margin:0 0 8px">💰 포인트 획득 방법</p>
    <div style="display:flex;flex-direction:column;gap:6px;font-size:12.5px;color:var(--text2)">
      <div style="display:flex;justify-content:space-between"><span>⚡ 초성 게임 정답 (1등)</span><span class="gold-badge">+50P</span></div>
      <div style="display:flex;justify-content:space-between"><span>📅 매일 출석 보너스</span><span class="gold-badge">+10P</span></div>
      <div style="display:flex;justify-content:space-between"><span>🥚 신규 가입 보너스</span><span class="gold-badge">+100P</span></div>
    </div>
    <div style="margin-top:10px;padding-top:10px;border-top:1px solid rgba(212,168,83,.2)">
      <p style="font-size:11.5px;color:var(--text3);margin:0">💡 포인트로 펫 사료 구매, 다른 사람 펫에게 선물, 포인트 송금이 가능해요!</p>
    </div>
  </div>`;
}

/* ═══════════════════════════════════════
   DOM EVENTS BINDING
═══════════════════════════════════════ */
function attachEvents(){
  const app=document.getElementById("app");
  /* 기존 인풋 바인딩 */
  [["nickI","nick"],["areaI","area"],["pinI","pin"],["heightI","height"],["freeI","freeTime"],
   ["idealI","idealType"],["appealI","appeal"],["gidolI","giDol"]
  ].forEach(([id,key])=>{const el=app.querySelector("#"+id);if(el)el.addEventListener("input",e=>{S[key]=e.target.value;});});
  const pwI=app.querySelector("#pwI");if(pwI)pwI.addEventListener("keydown",e=>{if(e.key==="Enter")login();});

  /* 초성 인풋 */
  const chosungI=app.querySelector("#lm_chosung_input");
  if(chosungI){
    chosungI.addEventListener("input",e=>{S.chosungInput=e.target.value;});
    chosungI.addEventListener("keydown",e=>{if(e.key==="Enter")submitChosungAnswer();});
  }

  /* 채팅 피드 스크롤 */
  const feed=app.querySelector("#lm_chat_feed");
  if(feed)feed.scrollTop=feed.scrollHeight;

  /* 클릭 이벤트 */
  app.querySelectorAll("[data-a]").forEach(el=>{
    el.addEventListener("click",()=>{
      const a=el.dataset.a;
      /* 기존 액션 */
      if(a==="gender"){S.gender=el.dataset.v;render();}
      else if(a==="startMBTI")startMBTI();
      else if(a==="startBal")startBal();
      else if(a==="startDat")startDat();
      else if(a==="loadMyInfo")loadMyInfo();
      else if(a==="goHome"){S.screen="home";render();}
      else if(a==="goBoard"){S.screen="board";S.tab="board";render();}
      else if(a==="goCompat"){S.screen="board";S.tab="compat";render();}
      else if(a==="retry"){
        S.nick="";S.area="";S.pin="";S.gender="";S.height="";S.freeTime="";S.idealType="";S.appeal="";S.giDol="";
        S.myEntry=null;S.myBalEntry=null;S.myDatEntry=null;S.myPet=null;
        localStorage.removeItem("lmg_user");localStorage.removeItem("lmg_bal");localStorage.removeItem("lmg_dat");localStorage.removeItem("lmg_pet");
        S.screen="home";render();
      }
      else if(a==="testBack"){if(S.qIdx>0){S.qIdx--;render();}else{S.screen="home";render();}}
      else if(a==="mbtiAns")mbtiAns(parseInt(el.dataset.v));
      else if(a==="balBack"){if(S.balIdx>0){S.balIdx--;render();}else{S.screen="home";render();}}
      else if(a==="balAns")balAns(el.dataset.v);
      else if(a==="datBack"){if(S.datIdx>0){S.datIdx--;render();}else{S.screen="home";render();}}
      else if(a==="datAns")datAns(el.dataset.v);
      else if(a==="tab"){S.tab=el.dataset.v;render();}
      else if(a==="selM"){const e=S.entries.find(x=>x.id===el.dataset.id);S.selM=S.selM?.id===el.dataset.id?null:e;render();}
      else if(a==="selF"){const e=S.entries.find(x=>x.id===el.dataset.id);S.selF=S.selF?.id===el.dataset.id?null:e;render();}
      else if(a==="giveRose"){if(S.myEntry)giveRose(S.myEntry.nick,S.myEntry.gender,el.dataset.recv,el.dataset.rg);}
      else if(a==="login")login();
      else if(a==="logout"){S.isAdmin=false;S.pwErr="";render();}
      else if(a==="del")delMBTI(el.dataset.id);
      else if(a==="delAll"){if(confirm("정말 전체 삭제하시겠어요?"))delAllMBTI();}
      else if(a==="edit"){S.editId=el.dataset.id;render();}
      else if(a==="cancelEdit"){S.editId=null;render();}
      else if(a==="saveEdit"){
        const id=el.dataset.id;
        const newData={
          nick:document.getElementById(`edit_nick_${id}`).value.trim(),
          area:document.getElementById(`edit_area_${id}`).value.trim(),
          gender:document.getElementById(`edit_gender_${id}`).value.trim(),
          height:document.getElementById(`edit_height_${id}`).value.trim(),
          freeTime:document.getElementById(`edit_freeTime_${id}`).value.trim(),
          idealType:document.getElementById(`edit_idealType_${id}`).value.trim(),
          appeal:document.getElementById(`edit_appeal_${id}`).value.trim(),
          giDol:document.getElementById(`edit_giDol_${id}`).value.trim(),
          mbti:document.getElementById(`edit_mbti_${id}`).value.trim(),
          pin:document.getElementById(`edit_pin_${id}`).value.trim()
        };
        updateParticipant(id,newData);
      }
      /* ── 러브몬 신규 액션 ── */
      else if(a==="goLovemon"){S.screen="board";S.tab="lm_pet";render();}
      else if(a==="goPlaza"){S.screen="board";S.tab="lm_plaza";render();}
      else if(a==="lm_createPet"){initOrLoadPet(S.myEntry.nick,S.myEntry.gender,S.myEntry.mbti,S.myBalEntry?.answers);}
      else if(a==="lm_buyFeed"){feedPet(el.dataset.item);}
      else if(a==="lm_feedOther"){
        const itemId = prompt("어떤 아이템을 선물하시겠습니까?\n1. 기본 사료 (100P)\n2. 도파민 특식 (500P)\n번호를 입력해주세요:", "1");
        if(itemId === "1") feedPet('feed_basic', el.dataset.nick);
        else if(itemId === "2") feedPet('feed_dopamine', el.dataset.nick);
      }
      else if(a==="lm_sendPoints"){transferPoints(el.dataset.nick);}
      else if(a==="lm_breedReq"){requestBreed(el.dataset.nick);}
      else if(a==="lm_breedAccept"){acceptBreed(el.dataset.id, el.dataset.from);}
      else if(a==="lm_submitAnswer"){submitChosungAnswer();}
    });
  });
}

/* ═══════════════════════════════════════
   BOOT
═══════════════════════════════════════ */
render();
load();
</script>
</body>
</html>
