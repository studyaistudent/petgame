<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>💕 러브몬 미니게임</title>
<meta property="og:title" content="러브몬 미니게임">
<meta property="og:description" content="러브몬 육성 · 퀴즈 · 캐치마인드 · 마피아 오픈월드 등">
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=Playfair+Display:ital,wght@0,700;1,400&display=swap');
:root {
  --rose:       #E8537A;
  --rose2:      #C73B65;
  --rose-lt:    #FDEEF4;
  --rose-pale:  #FFF6FA;
  --plum:       #7C3F7E;
  --gold:       #D4A853;
  --cream:      #FDF8F2;
  --text1:      #2A1A2E;
  --text2:      #6B4870;
  --text3:      #B89CB8;
  --border:     rgba(232,83,122,.18);
  --border2:    rgba(232,83,122,.35);
  --shadow:     0 4px 24px rgba(232,83,122,.12);
  --r:          14px;
  --r-sm:       10px;
  --mint:       #2EC4B6;
  --mint-lt:    #E8F8F7;
  --lm-gold:    #F0A500;
  --lm-purple:  #9B59B6;
}
*{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:'Noto Sans KR',sans-serif;
  background:#FDF0F6;
  background-image:
    radial-gradient(ellipse 60% 40% at 20% 10%,rgba(232,83,122,.10) 0%,transparent 60%),
    radial-gradient(ellipse 50% 50% at 80% 80%,rgba(124,63,126,.08) 0%,transparent 60%),
    radial-gradient(ellipse 40% 30% at 50% 50%,rgba(212,168,83,.05) 0%,transparent 60%);
  min-height:100vh;color:var(--text1);
}
body::before{
  content:'💕 🌹 💗 🌸 💘 ✨ 🐾 🥚 💕 🌹';
  position:fixed;top:0;left:0;width:100%;
  font-size:11px;letter-spacing:26px;
  color:rgba(232,83,122,.06);
  pointer-events:none;z-index:0;
  line-height:30px;word-spacing:18px;
  white-space:nowrap;overflow:hidden;
}
#app{max-width:560px;margin:0 auto;padding:1rem;position:relative;z-index:1;}
/* ── Card ── */
.card{background:rgba(255,255,255,.92);backdrop-filter:blur(8px);border:1px solid var(--border);border-radius:var(--r);padding:1.25rem;box-shadow:var(--shadow);}
.card-rose{background:linear-gradient(135deg,rgba(253,238,244,.95),rgba(253,245,250,.95));border-color:var(--border2);}
.card-mint{background:linear-gradient(135deg,rgba(232,248,247,.95),rgba(240,253,252,.95));border-color:rgba(46,196,182,.3);}
.card-gold{background:linear-gradient(135deg,rgba(253,248,230,.95),rgba(255,252,240,.95));border-color:rgba(212,168,83,.3);}
/* ── Buttons ── */
.btn{border:1.5px solid var(--border2);border-radius:var(--r-sm);padding:10px 16px;cursor:pointer;font-size:13.5px;font-family:'Noto Sans KR',sans-serif;background:white;color:var(--text1);transition:all .15s;display:inline-flex;align-items:center;justify-content:center;gap:5px;}
.btn:hover{background:var(--rose-lt);}
.btn:active{transform:scale(.97);}
.btn-primary{background:linear-gradient(135deg,var(--rose),var(--rose2)) !important;color:white !important;border:none !important;font-weight:500;box-shadow:0 3px 12px rgba(232,83,122,.35);}
.btn-primary:hover{opacity:.88;box-shadow:0 5px 18px rgba(232,83,122,.45);}
.btn-sel{background:linear-gradient(135deg,var(--rose),var(--rose2)) !important;color:white !important;border-color:transparent !important;}
.btn-plum{background:linear-gradient(135deg,var(--plum),#9C27B0) !important;color:white !important;border:none !important;box-shadow:0 3px 12px rgba(124,63,126,.3);}
.btn-mint{background:linear-gradient(135deg,var(--mint),#1A9E95) !important;color:white !important;border:none !important;box-shadow:0 3px 12px rgba(46,196,182,.3);}
.btn-gold{background:linear-gradient(135deg,var(--gold),#B8860B) !important;color:white !important;border:none !important;box-shadow:0 3px 12px rgba(212,168,83,.3);}
.btn-danger{color:#C62828 !important;border-color:#FFCDD2 !important;}
/* ── Inputs ── */
.inp{width:100%;padding:10px 14px;border:1.5px solid var(--border2);border-radius:var(--r-sm);font-size:13.5px;font-family:'Noto Sans KR',sans-serif;background:white;color:var(--text1);transition:border-color .15s,box-shadow .15s;}
.inp:focus{outline:none;border-color:var(--rose);box-shadow:0 0 0 3px rgba(232,83,122,.12);}
/* ── Progress bar ── */
.prog{height:6px;background:var(--rose-lt);border-radius:99px;overflow:hidden;}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--rose),var(--rose2));border-radius:99px;transition:width .5s cubic-bezier(.4,0,.2,1);}
.prog-mint{background:linear-gradient(90deg,var(--mint),#1A9E95);}
/* ── Tabs ── */
.tabs{display:flex;background:white;border:1px solid var(--border);border-radius:var(--r-sm);overflow-x:auto;margin-bottom:14px;scrollbar-width:none;position:relative;}
.tabs::-webkit-scrollbar{display:none;}
.tab{flex-shrink:0;min-width:58px;padding:9px 6px;font-size:11px;font-family:'Noto Sans KR',sans-serif;background:transparent;border:none;border-right:1px solid var(--border);cursor:pointer;color:var(--text2);transition:all .15s;line-height:1.3;white-space:pre-line;text-align:center;}
.tab:last-child{border-right:none;}
.tab.on{background:linear-gradient(135deg,var(--rose),var(--rose2));color:white;font-weight:500;}
.tab.on-mint{background:linear-gradient(135deg,var(--mint),#1A9E95);color:white;font-weight:500;}
/* ★ 데스크탑/태블릿(≥480px): 탭이 많아도 줄바꿈으로 한눈에 보이게 */
@media (min-width:480px){
  .tabs{flex-wrap:wrap;overflow-x:visible;}
  .tab{flex:1 0 auto;min-width:70px;border-bottom:1px solid var(--border);}
  .tab:last-child{border-right:none;border-bottom:none;}
}
/* ★ 모바일(<480px): 가로 스크롤 + 우측에 스크롤 가능 힌트 그라데이션 */
@media (max-width:479px){
  .tabs::after{content:'›';position:sticky;right:0;display:flex;align-items:center;justify-content:center;width:22px;background:linear-gradient(to right,transparent,white 50%);color:var(--rose);font-size:18px;font-weight:700;pointer-events:none;flex-shrink:0;margin-left:-22px;animation:livePulse 1.6s infinite;}
}
/* ── Answer buttons ── */
.ans{width:100%;padding:15px;border:1.5px solid var(--border);border-radius:var(--r-sm);background:white;color:var(--text1);cursor:pointer;font-size:14px;font-family:'Noto Sans KR',sans-serif;text-align:center;transition:all .15s;}
.ans:hover{background:var(--rose-lt);border-color:var(--rose);transform:translateY(-1px);}
.ans:active{transform:scale(.98);}
/* ── Scroll list ── */
.slist{max-height:220px;overflow-y:auto;display:flex;flex-direction:column;gap:5px;}
.slist::-webkit-scrollbar{width:3px;}
.slist::-webkit-scrollbar-thumb{background:var(--rose-lt);border-radius:99px;}
/* ── Animations ── */
@keyframes float{0%,100%{transform:translateY(0);}50%{transform:translateY(-7px);}}
@keyframes pulse{0%,100%{transform:scale(1);}50%{transform:scale(1.08);}}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
@keyframes shimmer{0%{background-position:-200% 0;}100%{background-position:200% 0;}}
@keyframes livePulse{0%,100%{opacity:1;}50%{opacity:0.4;}}
.float{animation:float 2.5s ease-in-out infinite;}
.pulse{animation:pulse 1.5s ease-in-out infinite;}
.fadein{animation:fadeIn .4s ease;}
.live-dot{width:7px;height:7px;background:#E8537A;border-radius:50%;display:inline-block;animation:livePulse 1.2s infinite;}
/* ── Score bar ── */
.sbar{height:7px;background:var(--rose-lt);border-radius:99px;overflow:hidden;flex:1;}
.sbar-fill{height:100%;background:linear-gradient(90deg,var(--rose),var(--rose2));border-radius:99px;transition:width .6s ease;}
/* ── Title decorative ── */
.title-deco{font-family:'Playfair Display',serif;font-style:italic;letter-spacing:.5px;}
/* ── Badges ── */
.rose-badge{display:inline-flex;align-items:center;gap:3px;background:linear-gradient(135deg,#FFE4EF,#FFC8DA);color:var(--rose2);padding:2px 9px;border-radius:99px;font-size:11px;font-weight:700;border:1px solid rgba(232,83,122,.3);}
.gold-badge{display:inline-flex;align-items:center;gap:3px;background:linear-gradient(135deg,#FFF3CD,#FFE082);color:#8B6914;padding:2px 9px;border-radius:99px;font-size:11px;font-weight:700;border:1px solid rgba(212,168,83,.4);}
/* ── Heart separator ── */
.sep{display:flex;align-items:center;gap:8px;font-size:11px;color:var(--text3);margin:6px 0;}
.sep::before,.sep::after{content:'';flex:1;height:1px;background:var(--border);}
.chip{display:inline-block;padding:2px 9px;border-radius:99px;font-size:11px;font-weight:500;}
/* ── LoveMon Specific ── */
.lm-pet-card{
  background:linear-gradient(160deg,rgba(253,238,244,.98),rgba(240,230,255,.98));
  border:1.5px solid rgba(155,89,182,.25);
  border-radius:18px;padding:1.4rem;text-align:center;
  box-shadow:0 6px 28px rgba(155,89,182,.12);
}
.lm-xp-bar{height:8px;background:rgba(155,89,182,.12);border-radius:99px;overflow:hidden;}
.lm-xp-fill{height:100%;background:linear-gradient(90deg,var(--rose),var(--lm-purple));border-radius:99px;transition:width .6s cubic-bezier(.4,0,.2,1);}
.lm-stat-row{display:flex;justify-content:center;gap:20px;margin:10px 0;}
.lm-stat{text-align:center;}
.lm-stat .val{font-size:22px;font-weight:700;line-height:1;}
.lm-stat .lbl{font-size:10.5px;color:var(--text3);margin-top:2px;}
.lm-cho-char{
  width:50px;height:50px;border-radius:12px;
  border:2px solid rgba(46,196,182,.4);
  background:white;display:inline-flex;align-items:center;justify-content:center;
  font-size:24px;font-weight:700;color:var(--mint);
  box-shadow:0 3px 12px rgba(46,196,182,.15);
  animation:pulse 2s ease-in-out infinite;
}
.lm-market-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.lm-market-item{
  border:1.5px solid var(--border);border-radius:12px;
  background:white;padding:10px 8px;text-align:center;
  cursor:pointer;transition:all .15s;
}
.lm-market-item:hover{border-color:var(--rose);background:var(--rose-lt);transform:translateY(-2px);}
.lm-market-item:active{transform:scale(.97);}
.lm-feed-log{max-height:150px;overflow-y:auto;}
.lm-feed-log::-webkit-scrollbar{width:3px;}
.lm-feed-log::-webkit-scrollbar-thumb{background:var(--rose-lt);}
.lm-chosung-chat{max-height:200px;overflow-y:auto;display:flex;flex-direction:column;gap:4px;}
.lm-chosung-chat::-webkit-scrollbar{width:3px;}
.lm-chosung-chat::-webkit-scrollbar-thumb{background:rgba(46,196,182,.2);}
.lm-chat-msg{padding:5px 8px;border-radius:8px;font-size:13px;display:flex;gap:6px;align-items:baseline;}
.lm-chat-msg.correct{background:rgba(232,83,122,.07);border:1px solid rgba(232,83,122,.2);}
.lm-chat-nick{font-weight:700;font-size:12px;color:var(--rose2);flex-shrink:0;}
.lm-family-row{display:flex;align-items:center;justify-content:center;gap:6px;padding:8px 0;border-bottom:1px solid var(--border);font-size:13px;flex-wrap:wrap;}
.lm-breed-incoming{background:rgba(155,89,182,.07);border:1px solid rgba(155,89,182,.2);border-radius:10px;padding:10px;margin-top:8px;}
.lm-lb-row{display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid var(--border);}
.lm-lb-rank{font-size:16px;width:26px;text-align:center;}
.lm-lb-pet{font-size:22px;}
.lm-lb-nick{flex:1;font-size:13px;font-weight:600;}
.lm-lb-pts{font-size:13px;font-weight:700;color:var(--gold);}
/* ── 추가된 커스텀 기능 UI ── */
.color-chart-grid {
  display: grid;
  grid-template-columns: repeat(5, 1fr); 
  gap: 8px; margin-top: 15px;
}
.color-slot {
  border: 1px solid var(--border); background: var(--cream);
  padding: 12px 5px;
  text-align: center; border-radius: 8px; cursor: pointer;
  transition: all 0.2s ease; box-shadow: 0 2px 4px rgba(232, 83, 122, 0.05);
}
.color-slot:hover {
  background: var(--rose-pale); border-color: var(--rose); transform: translateY(-2px);
}
.color-slot .slot-num { font-size: 0.75rem; color: var(--text3); margin-bottom: 4px;
}
.color-slot .slot-nick { font-size: 0.85rem; font-weight: 500; color: var(--text2); word-break: break-all; }
.color-slot.has-name { background: var(--rose-lt); border-color: var(--rose2);
}
.color-slot.has-name .slot-nick { color: var(--rose2); font-weight: 700; }
.action-btn.premium {
  background: linear-gradient(135deg, var(--gold), #e8c678);
  color: #fff; border: none; padding: 10px;
  border-radius: 8px; width: 100%;
  margin-top: 8px; cursor: pointer; font-weight: bold; font-family:'Noto Sans KR',sans-serif;
  box-shadow: 0 3px 10px rgba(212,168,83,.3);
  transition: all 0.2s ease;
}
.action-btn.premium:hover { opacity: 0.9; transform: translateY(-1px); }
.action-btn.premium:active { transform: scale(0.97);
}
/* ── 애정도 바 ── */
.affection-bar{height:5px;background:rgba(232,83,122,.12);border-radius:99px;overflow:hidden;margin-top:3px;}
.affection-fill{height:100%;background:linear-gradient(90deg,#F06292,var(--rose2));border-radius:99px;transition:width .5s ease;}
/* ── 장미꽃 알림판 스크롤 ── */
.mutual-roses-scroll{max-height:320px;overflow-y:auto;padding-right:2px;}
.mutual-roses-scroll::-webkit-scrollbar{width:3px;}
.mutual-roses-scroll::-webkit-scrollbar-thumb{background:var(--rose-lt);border-radius:99px;}
/* ── 2세 육아 케어 그리드 ── */
.baby-care-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px;}
.baby-care-item{
  border:1.5px solid var(--border);border-radius:12px;
  background:white;padding:12px 10px;text-align:center;
  cursor:pointer;transition:all .15s;
}
.baby-care-item:hover{border-color:var(--rose);background:var(--rose-lt);transform:translateY(-2px);}
.baby-care-item:active{transform:scale(.97);}
/* ── 던전 / 배틀 UI ── */
.dungeon-floor-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px;}
.dungeon-floor-card{border:1.5px solid var(--border);border-radius:12px;background:white;padding:12px 10px;text-align:center;cursor:pointer;transition:all .15s;}
.dungeon-floor-card:hover{border-color:var(--rose);background:var(--rose-lt);transform:translateY(-2px);}
.dungeon-floor-card.locked{opacity:.45;cursor:not-allowed;pointer-events:none;}
.hp-bar{height:10px;background:#FFCDD2;border-radius:99px;overflow:hidden;}
.hp-fill{height:100%;background:linear-gradient(90deg,#EF5350,#E53935);border-radius:99px;transition:width .4s ease;}
.mp-bar{height:10px;background:#BBDEFB;border-radius:99px;overflow:hidden;}
.mp-fill{height:100%;background:linear-gradient(90deg,#42A5F5,#1E88E5);border-radius:99px;transition:width .4s ease;}
.sp-bar{height:8px;background:#E1BEE7;border-radius:99px;overflow:hidden;}
.sp-fill{height:100%;background:linear-gradient(90deg,#AB47BC,#8E24AA);border-radius:99px;transition:width .4s ease;}
.battle-log{max-height:130px;overflow-y:auto;font-size:12px;line-height:1.7;color:var(--text2);padding:6px 8px;background:rgba(0,0,0,.02);border-radius:8px;border:1px solid var(--border);}
.battle-log::-webkit-scrollbar{width:3px;}
.battle-log::-webkit-scrollbar-thumb{background:var(--rose-lt);}
.skill-btn-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;}
.dice-stat-box{background:white;border:1.5px solid var(--border);border-radius:10px;padding:10px;text-align:center;}
.dice-stat-box .val{font-size:20px;font-weight:700;color:var(--rose2);}
.dice-stat-box .lbl{font-size:10.5px;color:var(--text3);margin-top:2px;}
/* ── 등급별 펫 글로우 효과 (3D 퀄리티) ── */
.glow-normal  { box-shadow: 0 0 15px rgba(158,158,158,.3), var(--shadow); }
.glow-rare    { box-shadow: 0 0 25px rgba(33,150,243,.5), 0 0 60px rgba(33,150,243,.15), var(--shadow); }
.glow-epic    { box-shadow: 0 0 30px rgba(156,39,176,.6), 0 0 80px rgba(156,39,176,.2), var(--shadow); }
.glow-unique  { box-shadow: 0 0 35px rgba(255,87,34,.7), 0 0 90px rgba(255,87,34,.25), var(--shadow); }
.glow-legend  { box-shadow: 0 0 40px rgba(244,67,54,.8), 0 0 100px rgba(244,67,54,.3), var(--shadow); }
.glow-rebirth { box-shadow: 0 0 50px rgba(255,215,0,1), 0 0 120px rgba(255,165,0,.6), 0 0 200px rgba(255,100,0,.3); animation: rebirthPulse 2s ease-in-out infinite; }
@keyframes rebirthPulse { 0%,100%{box-shadow:0 0 50px rgba(255,215,0,1),0 0 120px rgba(255,165,0,.6);} 50%{box-shadow:0 0 70px rgba(255,215,0,1),0 0 160px rgba(255,165,0,.8),0 0 250px rgba(255,100,0,.5);} }
/* ── 장착 아이템 슬롯 ── */
.equip-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:6px; margin-bottom:10px; }
.equip-slot { border:1.5px solid var(--border); border-radius:10px; background:white; padding:8px 6px; text-align:center; cursor:pointer; transition:all .15s; min-height:64px; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:2px; }
.equip-slot:hover { border-color:var(--rose); background:var(--rose-lt); transform:translateY(-2px); }
.equip-slot.filled { background:linear-gradient(135deg,rgba(232,83,122,.06),rgba(155,89,182,.06)); border-color:var(--rose2); }
.equip-slot .slot-emoji { font-size:24px; }
.equip-slot .slot-name { font-size:9px; color:var(--text3); }
.equip-slot .slot-item { font-size:10.5px; font-weight:600; color:var(--text1); }
.grade-normal  { color:#9E9E9E !important; }
.grade-rare    { color:#2196F3 !important; }
.grade-epic    { color:#9C27B0 !important; }
.grade-unique  { color:#FF5722 !important; }
.grade-legend  { color:#F44336 !important; }
.grade-god     { color:#FFD700 !important; }
.grade-myth    {
  background:linear-gradient(135deg,#FFD700,#FF5BAE,#7C4DFF,#FFD700) !important;
  -webkit-background-clip:text !important;
  background-clip:text !important;
  -webkit-text-fill-color:transparent !important;
  font-weight:800 !important;
  filter:drop-shadow(0 0 6px rgba(255,215,0,.6));
}
@keyframes mythPulse { 0%,100%{filter:drop-shadow(0 0 6px rgba(255,215,0,.7));} 50%{filter:drop-shadow(0 0 14px rgba(255,91,174,.85));} }
.grade-myth { animation:mythPulse 2.4s infinite; }
.myth-card {
  position:relative;
  background:
    linear-gradient(135deg,rgba(255,215,0,.12),rgba(255,91,174,.10),rgba(124,77,255,.12)) !important;
  border:1.5px solid transparent !important;
  background-clip:padding-box;
  box-shadow:0 0 0 1.5px transparent,0 4px 24px rgba(255,91,174,.18),inset 0 0 30px rgba(255,215,0,.06) !important;
}
.myth-card::before{
  content:'';position:absolute;inset:-1.5px;border-radius:inherit;padding:1.5px;
  background:linear-gradient(135deg,#FFD700,#FF5BAE,#7C4DFF,#FFD700);
  -webkit-mask:linear-gradient(#000 0 0) content-box,linear-gradient(#000 0 0);
  -webkit-mask-composite:xor;mask-composite:exclude;pointer-events:none;
  animation:mythPulse 2.4s infinite;
}
.furn-card-pro .grade-tag.myth { background: linear-gradient(135deg,#FFD700,#FF5BAE,#7C4DFF); color: #fff; box-shadow:0 0 12px rgba(255,91,174,.55); }
.grade-chip.myth{background:linear-gradient(135deg,#FFD700,#FF5BAE,#7C4DFF);color:#fff;box-shadow:0 0 12px rgba(255,91,174,.55);font-weight:700;}
.title-chip-mini.myth {background:linear-gradient(135deg,#FFD700,#FF5BAE,#7C4DFF);color:#fff;border-color:rgba(255,91,174,.7);box-shadow:0 0 10px rgba(255,91,174,.5);}

/* 1. 강화 모달 스타일 */
.modal-overlay {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  background: rgba(0, 0, 0, 0.6);
  display: flex; justify-content: center; align-items: center;
  z-index: 10000; /* 다른 UI보다 가장 위에 표시 */
  animation: fadeIn .25s ease;
}
.modal-content {
  background: white; padding: 25px; border-radius: 20px;
  width: 88%; max-width: 360px; box-shadow: 0 10px 25px rgba(0,0,0,0.3);
  text-align: center; color: var(--text1);
}
.modal-content h3 { margin-top: 0; color: var(--rose); }

/* ═══════════════════ 🌸 오픈월드 ═══════════════════ */

}

}

/* ═══════════════════ ⚔️ 3D 전투 비주얼라이저 ═══════════════════ */
.battle-stage-3d{
  position:relative;
  width:100%;height:280px;
  background:radial-gradient(ellipse at top,rgba(155,89,182,.18),transparent 60%),
             linear-gradient(180deg,#3E2D4A 0%,#1A0E25 100%);
  border-radius:14px;overflow:hidden;
  box-shadow:0 8px 28px rgba(0,0,0,.4);
  border:1.5px solid rgba(255,255,255,.08);
}
.battle-stage-3d canvas{
  width:100%;height:100%;display:block;
}
.battle-stage-3d.shake{animation:battleShake .35s cubic-bezier(.36,.07,.19,.97);}
@keyframes battleShake{
  0%,100%{transform:translate(0,0);}
  10%{transform:translate(-4px,2px);}
  20%{transform:translate(4px,-2px);}
  30%{transform:translate(-3px,2px);}
  40%{transform:translate(3px,-1px);}
  50%{transform:translate(-2px,1px);}
  60%{transform:translate(2px,-1px);}
  70%{transform:translate(-1px,0);}
  80%{transform:translate(1px,0);}
}
.battle-stage-3d.crit-flash{animation:battleCritFlash .5s ease;}
@keyframes battleCritFlash{
  0%{background:radial-gradient(ellipse at top,rgba(255,215,0,.7),transparent 70%),linear-gradient(180deg,#FFD700 0%,#FF6F00 100%);}
  100%{background:radial-gradient(ellipse at top,rgba(155,89,182,.18),transparent 60%),linear-gradient(180deg,#3E2D4A 0%,#1A0E25 100%);}
}
.battle-stage-3d.win-flash{animation:battleWinFlash 1s ease;}
@keyframes battleWinFlash{
  0%{background:radial-gradient(ellipse,rgba(67,160,71,.6),transparent 70%),#1a3a1a;}
  100%{background:radial-gradient(ellipse at top,rgba(155,89,182,.18),transparent 60%),linear-gradient(180deg,#3E2D4A 0%,#1A0E25 100%);}
}
.battle-stage-3d.lose-flash{animation:battleLoseFlash 1s ease;}
@keyframes battleLoseFlash{
  0%{background:radial-gradient(ellipse,rgba(244,67,54,.6),transparent 70%),#3a1a1a;}
  100%{background:radial-gradient(ellipse at top,rgba(155,89,182,.18),transparent 60%),linear-gradient(180deg,#3E2D4A 0%,#1A0E25 100%);}
}
/* 데미지 팝업 */
.battle-dmg-popup{
  position:absolute;pointer-events:none;
  font-family:'Playfair Display',serif;font-weight:900;
  font-size:24px;line-height:1;
  color:#fff;text-shadow:0 2px 6px rgba(0,0,0,.8), 0 0 14px rgba(229,57,53,.6);
  transform:translate(-50%, -50%);
  z-index:6;
  animation:dmgFloat 1s cubic-bezier(.36,.07,.19,.97) forwards;
}
.battle-dmg-popup.crit{
  font-size:34px;color:#FFD700;
  text-shadow:0 2px 8px rgba(0,0,0,.8), 0 0 18px rgba(255,215,0,.9);
  animation:dmgCritFloat 1.2s cubic-bezier(.36,.07,.19,.97) forwards;
}
.battle-dmg-popup.heal{color:#69F0AE;text-shadow:0 2px 6px rgba(0,0,0,.8), 0 0 14px rgba(105,240,174,.7);}
.battle-dmg-popup.evade{
  font-size:20px;color:#80D8FF;text-shadow:0 2px 6px rgba(0,0,0,.8);
  font-weight:700;font-family:'Noto Sans KR',sans-serif;letter-spacing:.02em;
}
@keyframes dmgFloat{
  0%{transform:translate(-50%,-50%) scale(.4);opacity:0;}
  15%{transform:translate(-50%,-65%) scale(1.4);opacity:1;}
  25%{transform:translate(-50%,-70%) scale(1);}
  100%{transform:translate(-50%,-140%) scale(.85);opacity:0;}
}
@keyframes dmgCritFloat{
  0%{transform:translate(-50%,-50%) scale(.3) rotate(-12deg);opacity:0;}
  20%{transform:translate(-50%,-80%) scale(1.8) rotate(8deg);opacity:1;}
  35%{transform:translate(-50%,-78%) scale(1.3) rotate(-4deg);}
  100%{transform:translate(-50%,-160%) scale(1) rotate(0);opacity:0;}
}
/* 스킬 이펙트 텍스트 (≪뇌격≫ 등) */
.battle-skill-banner{
  position:absolute;top:18%;left:50%;transform:translate(-50%, -50%) scale(.6);

  color:#1a1a2e;font-weight:800;font-size:16px;

@keyframes skillBanner{

  20%{transform:translate(-50%,-50%) scale(1.2);opacity:1;}
  35%{transform:translate(-50%,-50%) scale(1);}
  80%{transform:translate(-50%,-50%) scale(1);opacity:1;}
  100%{transform:translate(-50%,-200%) scale(.8);opacity:0;}
}
/* VS 표시 (배틀 시작) */

@keyframes vsBanner{
  0%{opacity:0;transform:scale(.4);}
  30%{opacity:1;transform:scale(1.2);}

/* ═══ PVP 결과 오버레이 — 풀버전 디자인 ═══ */
.pvp-result-overlay {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  z-index: 100;
  background: radial-gradient(ellipse at center, rgba(124,77,255,0.25), rgba(10,5,25,0.85) 70%);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  animation: pvpResultFadeIn 0.45s ease;
  padding: 24px;
  gap: 6px;
}

@keyframes pvpResultFadeIn {
  0%   { opacity: 0; }
  100% { opacity: 1; }
}

/* 🏆 / 💀 아이콘 (텍스트 위에 자동 출력) */
.pvp-result-overlay::before {
  font-size: 80px;
  line-height: 1;
  margin-bottom: 4px;
  animation: pvpIconBounce 1.2s cubic-bezier(0.34,1.56,0.64,1) infinite alternate;
  filter: drop-shadow(0 6px 16px rgba(0,0,0,0.4));
}
.pvp-result-overlay:has(.pvp-result-text.win)::before  { content: '🏆'; }
.pvp-result-overlay:has(.pvp-result-text.lose)::before { content: '💀'; }

@keyframes pvpIconBounce {
  0%   { transform: translateY(0) scale(1); }
  100% { transform: translateY(-8px) scale(1.06); }
}

/* VICTORY / DEFEAT 큰 글씨 */
.pvp-result-text {
  font-family: 'Playfair Display','Noto Sans KR',serif;
  font-size: 60px;
  font-weight: 900;
  letter-spacing: 0.10em;
  margin: 0;
  line-height: 1.1;
  animation: pvpResultPop 0.7s cubic-bezier(0.34,1.56,0.64,1);
}

@keyframes pvpResultPop {
  0%   { transform: scale(0.3) rotate(-8deg); opacity: 0; }
  60%  { transform: scale(1.15) rotate(2deg); opacity: 1; }
  100% { transform: scale(1.0) rotate(0);    opacity: 1; }
}

.pvp-result-text.win {
  background: linear-gradient(135deg,#FFE57F 0%,#FFD700 35%,#FFA000 65%,#FF6F00 100%);
  -webkit-background-clip: text; background-clip: text;
  -webkit-text-fill-color: transparent;
  filter: drop-shadow(0 0 28px rgba(255,215,0,0.65));
}
.pvp-result-text.lose {
  background: linear-gradient(135deg,#FF5252 0%,#E53935 50%,#7C2929 100%);
  -webkit-background-clip: text; background-clip: text;
  -webkit-text-fill-color: transparent;
  filter: drop-shadow(0 0 28px rgba(229,57,53,0.55));
}

/* 포인트 변동 박스 (글래스모피즘) */
.pvp-points-display {
  margin-top: 18px;
  padding: 14px 28px;
  font-size: 15px;
  font-weight: 600;
  color: #E5E5E5;
  letter-spacing: 0.02em;
  background: rgba(255,255,255,0.07);
  border: 1px solid rgba(255,255,255,0.18);
  border-radius: 16px;
  backdrop-filter: blur(6px);
  -webkit-backdrop-filter: blur(6px);
  display: inline-flex; align-items: center; gap: 12px;
  box-shadow: 0 8px 30px rgba(0,0,0,0.35), inset 0 1px 0 rgba(255,255,255,0.08);
  animation: pvpResultSlideUp 0.55s ease 0.4s both;
}

@keyframes pvpResultSlideUp {
  0%   { transform: translateY(24px); opacity: 0; }
  100% { transform: translateY(0); opacity: 1; }
}

.pvp-points-value {
  font-family: 'Playfair Display',monospace;
  font-weight: 800;
  font-size: 30px;
  letter-spacing: 0.02em;
  text-shadow: 0 2px 12px rgba(0,0,0,0.4);
}
.pvp-points-value.win  {
  color: #69F0AE;
  text-shadow: 0 0 12px rgba(105,240,174,0.65), 0 0 24px rgba(105,240,174,0.35);
}
.pvp-points-value.lose {
  color: #FF6E6E;
  text-shadow: 0 0 12px rgba(255,82,82,0.65), 0 0 24px rgba(255,82,82,0.35);
}

/* 확인 버튼 — 그라데이션 + 호버 효과 */
.pvp-result-overlay button {
  width: 180px;
  padding: 14px 24px;
  border: none;
  border-radius: 14px;
  font-family: 'Noto Sans KR',sans-serif;
  font-size: 14px;
  font-weight: 700;
  letter-spacing: 0.06em;
  cursor: pointer;
  color: #fff;
  background: linear-gradient(135deg,#7C4DFF 0%,#E040FB 50%,#FF4081 100%);
  box-shadow: 0 8px 28px rgba(124,77,255,0.55),
              inset 0 1px 0 rgba(255,255,255,0.28);
  transition: transform 0.15s ease, box-shadow 0.15s ease, filter 0.15s ease;
  margin-top: 20px;
  animation: pvpResultSlideUp 0.55s ease 0.65s both;
}
.pvp-result-overlay button:hover {
  transform: translateY(-2px);
  filter: brightness(1.08);
  box-shadow: 0 12px 36px rgba(124,77,255,0.75),
              inset 0 1px 0 rgba(255,255,255,0.35);
}
.pvp-result-overlay button:active {
  transform: translateY(0);
  filter: brightness(0.95);
}
.pvp-modal-content{
  background:linear-gradient(180deg,#0d0d1a 0%,#2d1b3d 100%);

  width:100%;max-width:480px;max-height:96vh;

  overflow:hidden;display:flex;flex-direction:column;

}
.pvp-modal-head{
  padding:12px 16px;
  background:linear-gradient(135deg,rgba(255,23,68,.25),rgba(124,77,255,.18));

}
.pvp-modal-head .pvp-title{
  font-family:'Playfair Display',serif;font-weight:800;font-size:17px;

.pvp-stage{

.pvp-stage canvas{width:100%;height:100%;display:block;}
.pvp-stage.shake{animation:battleShake .35s cubic-bezier(.36,.07,.19,.97);}
.pvp-vs-bar{

  background:rgba(0,0,0,.45);border-bottom:1px solid rgba(255,255,255,.08);
}
.pvp-vs-side{flex:1;display:flex;align-items:center;gap:8px;}
.pvp-vs-side.right{justify-content:flex-end;}
.pvp-vs-side .nm{font-size:12.5px;font-weight:700;color:#fff;}
.pvp-vs-side .hp-row{display:flex;align-items:center;gap:5px;margin-top:3px;}
.pvp-vs-side .hp-bar-small{

}

}
.pvp-log-entry.crit{border-left-color:#FF1744;background:rgba(255,23,68,.12);}
.pvp-log-entry.evade{border-left-color:#80D8FF;background:rgba(128,216,255,.1);}
.pvp-modal-foot{
  padding:12px 16px;display:flex;gap:8px;

}
.pvp-modal-foot button{

}
.pvp-modal-foot .close{

}
.pvp-modal-foot .win{
  background:linear-gradient(135deg,#43A047,#FFD700);color:#fff;
  box-shadow:0 3px 12px rgba(67,160,71,.4);
}

  background:linear-gradient(135deg,#E53935,#7C2929);color:#fff;
  box-shadow:0 3px 12px rgba(229,57,53,.4);

/* 강화 결과 — 성공/실패 연출 */
@keyframes enhanceShake {
  0%, 100% { transform: translateX(0); }
  10%, 30%, 50%, 70%, 90% { transform: translateX(-8px); }
  20%, 40%, 60%, 80% { transform: translateX(8px); }
}
@keyframes enhanceSuccess {
  0% { transform: scale(.5); opacity:0; }
  50% { transform: scale(1.15); opacity:1; }
  100% { transform: scale(1); opacity:1; }
}
@keyframes enhanceBreak {
  0% { transform: scale(1) rotate(0); opacity:1; filter:none; }
  30% { transform: scale(1.1) rotate(-5deg); }
  60% { transform: scale(.9) rotate(8deg); filter:grayscale(.5); }
  100% { transform: scale(.7) rotate(-15deg); opacity:.3; filter:grayscale(1) blur(1px); }
}
.enhance-result-success { animation: enhanceSuccess .6s cubic-bezier(.34,1.56,.64,1); }
.enhance-result-fail { animation: enhanceShake .55s ease; }
.enhance-broken { animation: enhanceBreak 1.1s ease forwards; display:inline-block; }
.stat-arrow { color: var(--mint); font-weight:700; margin:0 4px; }
.stat-after { color: var(--rose2); font-weight:800; }

/* ── 능력치 분석 카드 (장비/칭호 발동 효과) ── */

}
.stat-section:last-child { margin-bottom: 0; }
.stat-section-head {

.stat-total-row {

}

.title-chip-mini {

}
.title-chip-mini.epic {background:linear-gradient(135deg,#E1BEE7,#CE93D8);color:#4A148C;border-color:rgba(156,39,176,.4);}
.title-chip-mini.unique {background:linear-gradient(135deg,#FFCCBC,#FFAB91);color:#BF360C;border-color:rgba(255,87,34,.5);}
.title-chip-mini.legend {background:linear-gradient(135deg,#FFE082,#FFB300);color:#7B5400;border-color:rgba(255,179,0,.6);box-shadow:0 0 8px rgba(255,179,0,.3);}
.title-chip-mini.rare {background:linear-gradient(135deg,#BBDEFB,#90CAF9);color:#0D47A1;border-color:rgba(33,150,243,.4);}

/* ── 펫 이동 컨트롤 (하우스 탭) ── */
.pet-move-panel {

}

}
.pet-move-btn {

/* ────────────────────────────────────────
   🏠 하우스 — 인테리어 잡지 감성 UI + 가구 편집기
   ──────────────────────────────────────── */
/* 메인 3D 캔버스 — 깊이감 있는 프레임 */
.house-stage {
  position: relative;
  border-radius: 20px;
  overflow: hidden;
  background:
    radial-gradient(ellipse at top, rgba(255,182,193,.15) 0%, transparent 60%),
    linear-gradient(180deg, #1f1a2e 0%, #0d0a18 100%);
  box-shadow:
    0 1px 0 rgba(255,255,255,.08) inset,
    0 24px 60px rgba(232,83,122,.18),
    0 8px 24px rgba(0,0,0,.25);
  border: 1px solid rgba(232,83,122,.2);
}
.house-stage::before {
  content: '';
  position: absolute; inset: 0;
  background:
    radial-gradient(circle at 20% 30%, rgba(232,83,122,.12), transparent 40%),
    radial-gradient(circle at 80% 70%, rgba(124,63,126,.10), transparent 40%);
  pointer-events: none; z-index: 1;
}
.house-canvas-wrap {
  width: 100%;
  height: 420px;
  position: relative;
  z-index: 2;
}
.house-canvas-wrap canvas { display: block; width: 100% !important; height: 100% !important; }
/* 상단 오버레이 */
.house-overlay-top {
  position: absolute;
  top: 14px; left: 14px; right: 14px;
  z-index: 3;
  display: flex; justify-content: space-between; align-items: flex-start;
  pointer-events: none;
}
.house-name-badge {
  display: inline-flex; align-items: center; gap: 8px;
  background: rgba(255,255,255,.92);
  backdrop-filter: blur(10px);
  border: 1px solid rgba(232,83,122,.25);
  border-radius: 99px;
  padding: 6px 14px 6px 10px;
  box-shadow: 0 4px 14px rgba(0,0,0,.18);
}
.house-name-badge .emoji { font-size: 18px; }
.house-name-badge .name { font-size: 12.5px; font-weight: 700; color: var(--text1); letter-spacing: .2px; }
.house-name-badge .meta { font-size: 10px; color: var(--text3); margin-left: 2px; }
.house-visitor-pill {
  display: inline-flex; align-items: center; gap: 5px;
  background: rgba(0,0,0,.5);
  backdrop-filter: blur(10px);
  border: 1px solid rgba(255,255,255,.15);
  color: #fff;
  border-radius: 99px;
  padding: 5px 12px;
  font-size: 11px;
  font-weight: 600;
}
.house-visitor-pill .dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: #4ADE80;
  box-shadow: 0 0 8px #4ADE80;
}
/* 편집 모드 알림 배지 */
.editing-banner {
  position: absolute;
  bottom: 50px; left: 50%; transform: translateX(-50%);
  z-index: 4;
  display: inline-flex; align-items: center; gap: 8px;
  background: linear-gradient(135deg, #FFD54F, #FFA726);
  color: #5D4037;
  border-radius: 99px;
  padding: 7px 16px;
  font-size: 12px;
  font-weight: 700;
  box-shadow: 0 6px 20px rgba(255,167,38,.5);
  animation: editPulse 1.5s ease-in-out infinite;
  letter-spacing: .3px;
}
@keyframes editPulse {
  0%,100% { transform: translateX(-50%) scale(1); }
  50% { transform: translateX(-50%) scale(1.04); }
}
/* 컨트롤 힌트 */
.house-ctrl-hint {
  position: absolute; bottom: 12px; right: 14px;
  z-index: 3;
  font-size: 10.5px;
  color: rgba(255,255,255,.65);
  background: rgba(0,0,0,.4);
  backdrop-filter: blur(6px);
  padding: 4px 10px;
  border-radius: 99px;
  pointer-events: none;
  letter-spacing: .3px;
}
/* 액션 바 */
.house-action-bar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 16px;
  background: linear-gradient(180deg, rgba(255,255,255,.96), rgba(253,238,244,.92));
  border-top: 1px solid var(--border);
}
.house-action-bar .info { font-size: 11.5px; color: var(--text2); }
.house-action-bar .info b { color: var(--text1); font-weight: 700; }
/* 섹션 헤더 */
.deco-section { margin-bottom: 14px; }
.deco-section-head {
  display: flex; align-items: baseline; justify-content: space-between;
  padding: 0 2px 10px;
  border-bottom: 1px solid var(--border);
  margin-bottom: 12px;
}
.deco-section-head .title {
  font-family: 'Playfair Display', serif;
  font-style: italic;
  font-size: 17px;
  font-weight: 700;
  color: var(--rose2);
  letter-spacing: .3px;
}
.deco-section-head .sub {
  font-size: 10.5px;
  color: var(--text3);
  letter-spacing: 1px;
  text-transform: uppercase;
}
/* 등급 카드 */
.tier-scroll {
  display: flex; gap: 10px;
  overflow-x: auto; scrollbar-width: none;
  padding-bottom: 4px; margin: 0 -4px;
}
.tier-scroll::-webkit-scrollbar { display: none; }
.tier-card-pro {
  flex-shrink: 0; width: 130px;
  border-radius: 14px; background: white;
  border: 1.5px solid var(--border);
  padding: 14px 10px 12px; text-align: center;
  cursor: pointer; transition: all .2s cubic-bezier(.4,0,.2,1);
  position: relative; overflow: hidden;
}
.tier-card-pro:hover {
  transform: translateY(-3px);
  border-color: var(--rose);
  box-shadow: 0 8px 20px rgba(232,83,122,.18);
}
.tier-card-pro.current {
  background: linear-gradient(160deg, var(--rose-lt), white);
  border-color: var(--rose2); border-width: 2px;
}
.tier-card-pro.current::before {
  content: 'NOW LIVING';
  position: absolute; top: 8px; right: -22px;
  background: var(--rose2); color: white;
  font-size: 8.5px; font-weight: 700;
  padding: 2px 24px; transform: rotate(35deg);
  letter-spacing: 1px;
}
.tier-card-pro.locked { opacity: .45; cursor: not-allowed; }
.tier-card-pro .tier-emoji {
  font-size: 38px; margin-bottom: 6px;
  filter: drop-shadow(0 3px 6px rgba(232,83,122,.25));
}
.tier-card-pro .tier-name { font-size: 13px; font-weight: 700; color: var(--text1); margin-bottom: 4px; }
.tier-card-pro .tier-meta { font-size: 10px; color: var(--text3); margin-bottom: 8px; line-height: 1.5; }
.tier-card-pro .tier-cost {
  font-size: 11.5px; font-weight: 700;
  color: var(--gold);
  padding: 4px 10px;
  background: rgba(212,168,83,.1);
  border-radius: 99px; display: inline-block;
}
.tier-card-pro.current .tier-cost { background: var(--rose); color: white; }
/* 벽지/바닥 스워치 */
.swatch-row { display: flex; gap: 8px; flex-wrap: wrap; }
.swatch-card {
  flex: 1; min-width: 88px;
  border-radius: 12px; overflow: hidden;
  cursor: pointer; border: 2px solid transparent;
  transition: all .2s; background: white;
}
.swatch-card:hover { transform: translateY(-2px); }
.swatch-card.active {
  border-color: var(--rose2);
  box-shadow: 0 6px 16px rgba(232,83,122,.25);
}
.swatch-preview { height: 48px; position: relative; }
.swatch-preview::after {
  content: ''; position: absolute; inset: 0;
  background: linear-gradient(180deg, rgba(255,255,255,.15), transparent 50%);
}
.swatch-info { padding: 6px 8px; text-align: center; }
.swatch-info .name { font-size: 11px; font-weight: 600; color: var(--text1); line-height: 1.2; }
.swatch-info .price { font-size: 10px; color: var(--gold); margin-top: 2px; font-weight: 600; }
.swatch-card.active .swatch-info .name { color: var(--rose2); }
/* 가구 상점 */
.furn-grid-pro { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.furn-card-pro {
  background: white; border-radius: 14px;
  border: 1.5px solid var(--border);
  padding: 14px 10px 10px; text-align: center;
  cursor: pointer; transition: all .2s cubic-bezier(.4,0,.2,1);
  position: relative; overflow: hidden;
}
.furn-card-pro:hover {
  transform: translateY(-3px);
  border-color: var(--rose);
  box-shadow: 0 10px 22px rgba(232,83,122,.18);
}
.furn-card-pro .grade-tag {
  position: absolute; top: 8px; left: 8px;
  font-size: 8.5px; font-weight: 700;
  padding: 2px 7px; border-radius: 99px;
  letter-spacing: .5px; text-transform: uppercase;
}
.furn-card-pro .grade-tag.normal { background: #ECEFF1; color: #607D8B; }
.furn-card-pro .grade-tag.rare   { background: #E3F2FD; color: #1976D2; }
.furn-card-pro .grade-tag.epic   { background: #F3E5F5; color: #8E24AA; }
.furn-card-pro .grade-tag.unique { background: #FFF3E0; color: #F4511E; }
.furn-card-pro .grade-tag.legend { background: linear-gradient(135deg,#FFE082,#FFB74D); color: #E65100; }
.furn-card-pro .furn-emoji {
  font-size: 44px; margin: 8px 0 6px;
  filter: drop-shadow(0 4px 8px rgba(0,0,0,.12));
  transition: transform .3s;
}
.furn-card-pro:hover .furn-emoji { transform: scale(1.1) rotate(-3deg); }
.furn-card-pro .furn-name { font-size: 12.5px; font-weight: 700; color: var(--text1); margin-bottom: 6px; line-height: 1.3; }
.furn-card-pro .furn-cost { font-size: 11.5px; font-weight: 700; color: var(--gold); }
/* 가구 칩 */
.furn-chip {
  display: inline-flex; align-items: center; gap: 5px;
  background: white;
  border: 1.5px solid var(--border);
  border-radius: 10px;
  padding: 7px 11px;
  font-size: 12px; font-weight: 600; color: var(--text1);
  cursor: pointer; transition: all .15s;
}
.furn-chip:hover { border-color: var(--rose); background: var(--rose-lt); }
.furn-chip.placed {
  background: linear-gradient(135deg, rgba(232,83,122,.08), rgba(155,89,182,.05));
  border-color: var(--rose2);
}
.furn-chip.editing {
  background: linear-gradient(135deg, #FFD54F, #FFA726) !important;
  border-color: #FF8F00 !important;
  color: #5D4037 !important;
  box-shadow: 0 4px 14px rgba(255,167,38,.4);
}
.furn-chip .chip-emoji { font-size: 18px; }
.furn-chip .chip-edit { color: var(--rose2); font-size: 11px; margin-left: 2px; }
/* ───────────────────────────────────────
   🎯 가구 편집기 패널
   ─────────────────────────────────────── */
.furniture-editor {
  background: linear-gradient(160deg, #FFFBF0 0%, #FFF8E1 100%);
  border: 2px solid #FFB74D;
  border-radius: 16px;
  padding: 14px;
  margin-bottom: 14px;
  box-shadow: 0 8px 26px rgba(255,167,38,.18);
  animation: slideDown .25s ease;
}
@keyframes slideDown {
  from { opacity: 0; transform: translateY(-8px); }
  to   { opacity: 1; transform: translateY(0); }
}
.editor-header {
  display: flex; align-items: center; gap: 10px;
  padding-bottom: 12px;
  border-bottom: 1px dashed rgba(255,143,0,.35);
  margin-bottom: 12px;
}
.editor-header .e-emoji {
  font-size: 32px;
  filter: drop-shadow(0 3px 6px rgba(0,0,0,.15));
}
.editor-header .e-name {
  flex: 1;
  font-size: 14px;
  font-weight: 700;
  color: #5D4037;
}
.editor-header .e-tag {
  display: inline-flex; align-items: center; gap: 4px;
  background: #FF8F00; color: white;
  border-radius: 99px;
  padding: 3px 10px;
  font-size: 10.5px;
  font-weight: 700;
  letter-spacing: .3px;
}
/* 편집 도움말 */
.editor-help {
  font-size: 10.5px;
  color: #8D6E63;
  text-align: center;
  background: rgba(255,255,255,.5);
  border-radius: 8px;
  padding: 6px 10px;
  margin-bottom: 10px;
  line-height: 1.5;
}
/* 컨트롤 행 */
.editor-row {
  display: grid;
  grid-template-columns: 50px 30px 1fr 30px 52px;
  align-items: center;
  gap: 6px;
  margin-bottom: 10px;
}
.editor-row .e-label {
  font-size: 11.5px;
  font-weight: 700;
  color: #6D4C41;
}
.editor-row .e-val {
  font-size: 12.5px;
  font-weight: 700;
  color: #E65100;
  text-align: right;
  font-variant-numeric: tabular-nums;
}
.e-step-btn {
  width: 30px; height: 30px;
  border-radius: 8px;
  border: 1.5px solid #FFB74D;
  background: white;
  color: #E65100;
  font-size: 13px;
  font-weight: 700;
  cursor: pointer;
  transition: all .12s;
  padding: 0;
  display: inline-flex; align-items: center; justify-content: center;
  user-select: none;
}
.e-step-btn:hover { background: #FFE0B2; transform: scale(1.05); }
.e-step-btn:active { transform: scale(.92); }
/* 슬라이더 */
.e-slider {
  -webkit-appearance: none;
  appearance: none;
  width: 100%; height: 8px;
  background: linear-gradient(90deg, #FFE0B2, #FFB74D);
  border-radius: 99px;
  outline: none;
  cursor: pointer;
}
.e-slider::-webkit-slider-thumb {
  -webkit-appearance: none;
  appearance: none;
  width: 22px; height: 22px;
  border-radius: 50%;
  background: linear-gradient(135deg, #FF6F00, #E65100);
  border: 2px solid white;
  box-shadow: 0 3px 8px rgba(230,81,0,.4);
  cursor: pointer;
  transition: transform .1s;
}
.e-slider::-webkit-slider-thumb:hover { transform: scale(1.12); }
.e-slider::-moz-range-thumb {
  width: 22px; height: 22px;
  border-radius: 50%;
  background: linear-gradient(135deg, #FF6F00, #E65100);
  border: 2px solid white;
  box-shadow: 0 3px 8px rgba(230,81,0,.4);
  cursor: pointer;
}
/* 회전 프리셋 */
.rot-presets {
  display: flex; gap: 4px;
  margin: 8px 0 12px;
  padding: 4px;
  background: rgba(255,143,0,.08);
  border-radius: 10px;
}
.rot-preset {
  flex: 1;
  padding: 7px 4px;
  border: none;
  background: transparent;
  font-size: 10.5px;
  font-weight: 700;
  color: #6D4C41;
  border-radius: 7px;
  cursor: pointer;
  transition: all .12s;
  font-family: 'Noto Sans KR', sans-serif;
}
.rot-preset:hover { background: white; color: #E65100; }
.rot-preset.active {
  background: linear-gradient(135deg, #FF8F00, #E65100);
  color: white;
  box-shadow: 0 2px 8px rgba(230,81,0,.35);
}
/* 액션 버튼 */
.editor-actions {
  display: flex; gap: 6px;
  padding-top: 10px;
  border-top: 1px dashed rgba(255,143,0,.35);
}
.editor-actions .btn {
  flex: 1;
  padding: 11px 8px;
  font-size: 12.5px;
}
.editor-actions .btn-cancel {
  background: white !important;
  color: #6D4C41 !important;
  border: 1.5px solid #FFB74D !important;
}
.editor-actions .btn-confirm {
  background: linear-gradient(135deg, #FF6F00, #E65100) !important;
  color: white !important;
  border: none !important;
  font-weight: 700;
  box-shadow: 0 4px 12px rgba(230,81,0,.35);
}
.editor-actions .btn-remove {
  background: white !important;
  color: #C62828 !important;
  border: 1.5px solid #EF9A9A !important;
}
/* 데코 탭 */
.deco-tabs {
  display: flex; gap: 4px;
  background: rgba(232,83,122,.06);
  border-radius: 10px;
  padding: 4px;
  margin-bottom: 14px;
}
.deco-tab {
  flex: 1;
  padding: 8px 6px;
  border: none;
  background: transparent;
  font-size: 11.5px;
  font-weight: 600;
  color: var(--text2);
  border-radius: 8px;
  cursor: pointer;
  transition: all .15s;
  font-family: 'Noto Sans KR', sans-serif;
}
.deco-tab.active {
  background: white;
  color: var(--rose2);
  box-shadow: 0 2px 8px rgba(232,83,122,.15);
}
/* 빈 상태 */
.empty-hint {
  text-align: center;
  padding: 24px 12px;
  color: var(--text3);
  font-size: 12.5px;
  background: rgba(0,0,0,.02);
  border-radius: 10px;
  border: 1px dashed var(--border);
}
.empty-hint .emoji { font-size: 32px; display: block; margin-bottom: 6px; opacity: .6; }
/* 온보딩 */
.house-onboarding {
  text-align: center;
  padding: 2.5rem 1.5rem;
  background:
    radial-gradient(circle at 50% 0%, rgba(232,83,122,.08), transparent 60%),
    linear-gradient(180deg, white, var(--rose-pale));
  border-radius: 18px;
  border: 1px solid var(--border);
  box-shadow: var(--shadow);
}
.house-onboarding .hero-emoji {
  font-size: 80px;
  display: inline-block;
  filter: drop-shadow(0 8px 16px rgba(232,83,122,.25));
  margin-bottom: 14px;
}
.house-onboarding h2 {
  font-family: 'Playfair Display', serif;
  font-style: italic;
  font-size: 22px;
  color: var(--rose2);
  margin-bottom: 8px;
}
.house-onboarding p {
  font-size: 13px; color: var(--text2);
  line-height: 1.75; margin-bottom: 20px;
}
/* 방명록 */
.guestbook-list {
  max-height: 240px;
  overflow-y: auto;
  background:
    repeating-linear-gradient(180deg, transparent 0, transparent 31px, rgba(232,83,122,.08) 31px, rgba(232,83,122,.08) 32px),
    linear-gradient(180deg, rgba(255,250,245,.6), rgba(255,255,255,0));
  border-radius: 10px;
  padding: 4px 12px;
}
.guestbook-entry {
  padding: 8px 0 10px;
  border-bottom: 1px dashed rgba(232,83,122,.18);
}
.guestbook-entry:last-child { border-bottom: none; }
.guestbook-entry .head {
  display: flex; align-items: baseline; gap: 6px;
  margin-bottom: 3px;
}
.guestbook-entry .head .nick {
  font-weight: 700;
  font-size: 12.5px;
  color: var(--rose2);
  font-family: 'Playfair Display', serif;
  font-style: italic;
}
.guestbook-entry .head .date {
  font-size: 10px; color: var(--text3); margin-left: auto;
}
.guestbook-entry .msg {
  font-size: 12.5px; color: var(--text1); line-height: 1.55;
}
/* ── 선물함 ── */
.gift-card { display:flex; align-items:center; gap:10px; padding:10px 12px; border:1.5px solid var(--border); border-radius:10px; background:white; margin-bottom:6px; }
.gift-card.unread { background:var(--rose-lt); border-color:var(--border2); }
.gift-unread-dot { width:8px; height:8px; background:var(--rose); border-radius:50%; flex-shrink:0; animation:pulse 1.5s infinite; }
/* ── 환생 ── */
.rebirth-btn { width:100%; padding:14px; font-size:15px; font-family:'Noto Sans KR',sans-serif; background:linear-gradient(135deg,#FF6B35,#FFD700,#FF6B35); background-size:200% 100%; color:white; border:none; border-radius:12px; cursor:pointer; font-weight:700; animation:shimmerBtn 2s linear infinite; box-shadow:0 4px 20px rgba(255,107,53,.5); }
@keyframes shimmerBtn { 0%{background-position:0% 0%} 100%{background-position:200% 0%} }
.rebirth-badge { display:inline-flex; align-items:center; gap:4px; background:linear-gradient(135deg,#FF6B35,#FFD700); color:white; padding:2px 10px; border-radius:99px; font-size:11px; font-weight:700; }
/* ── 던전 쿨타임 ── */
.dungeon-cooltime { display:flex; align-items:center; gap:10px; padding:12px 14px; background:linear-gradient(135deg,rgba(255,87,34,.08),rgba(255,152,0,.06)); border:1.5px solid rgba(255,87,34,.25); border-radius:12px; margin-bottom:12px; }
.cooltime-timer { font-size:22px; font-weight:700; color:#E64A19; font-variant-numeric:tabular-nums; }
/* ── 🎮 3D 미니 캔버스 — 펫 카드용 ── */
.pet3d-mini-canvas {
  width: 100%;
  height: 280px;
  border-radius: 20px;
  background:
    radial-gradient(ellipse at top, rgba(255,182,193,.25) 0%, transparent 60%),
    radial-gradient(ellipse at bottom, rgba(155,89,182,.15) 0%, transparent 60%),
    linear-gradient(180deg, #FFF5F8 0%, #F8E5F0 100%);
  box-shadow:
    inset 0 1px 2px rgba(255,255,255,.8),
    0 8px 24px rgba(232,83,122,.18);
  position: relative;
  overflow: hidden;
  border: 1.5px solid rgba(232,83,122,.18);
}
.pet3d-mini-canvas canvas { display: block; width: 100% !important; height: 100% !important; cursor: grab; }
.pet3d-mini-canvas canvas:active { cursor: grabbing; }
.pet3d-mini-canvas .lvl-badge {
  position: absolute; top: 8px; left: 10px; z-index: 3;
  background: linear-gradient(135deg, var(--rose), var(--rose2));
  color: white; font-size: 10.5px; font-weight: 700;
  padding: 3px 9px; border-radius: 99px;
  box-shadow: 0 2px 6px rgba(232,83,122,.4);
}
.pet3d-mini-canvas .ctrl-hint {
  position: absolute; bottom: 6px; right: 10px; z-index: 3;
  font-size: 9.5px; color: rgba(0,0,0,.4);
  background: rgba(255,255,255,.7); padding: 2px 8px; border-radius: 99px;
  pointer-events: none;
}

/* ── 👣 방문자 이력 ── */
.visitor-history-list {
  max-height: 280px;
  overflow-y: auto;
  display: flex;
  flex-direction: column;
  gap: 6px;
  padding: 4px 2px;
}
.visitor-history-list::-webkit-scrollbar { width: 4px; }
.visitor-history-list::-webkit-scrollbar-thumb { background: var(--rose-lt); border-radius: 99px; }
.visitor-entry {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 8px 12px;
  background: linear-gradient(135deg, rgba(253,238,244,.6), rgba(255,255,255,.9));
  border: 1px solid var(--border);
  border-radius: 10px;
  transition: all .15s;
}
.visitor-entry:hover {
  transform: translateX(2px);
  border-color: var(--rose2);
  background: linear-gradient(135deg, var(--rose-lt), white);
}
.visitor-entry .v-emoji { font-size: 22px; flex-shrink: 0; }
.visitor-entry .v-info { flex: 1; min-width: 0; }
.visitor-entry .v-nick { font-size: 13px; font-weight: 700; color: var(--text1); }
.visitor-entry .v-time { font-size: 10.5px; color: var(--text3); margin-top: 1px; }
.visitor-entry .v-count {
  font-size: 10.5px; color: var(--rose2);
  background: rgba(232,83,122,.1); padding: 2px 8px;
  border-radius: 99px; font-weight: 700; flex-shrink: 0;
}

/* ── 📋 펫 정보 모달 ── */
.pet-info-modal {
  position: fixed;
  inset: 0;
  z-index: 9999;
  background: rgba(0,0,0,.6);
  backdrop-filter: blur(6px);
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 1rem;
  animation: modalFadeIn .25s ease;
}
@keyframes modalFadeIn { from { opacity: 0; } to { opacity: 1; } }
.pet-info-modal-inner {
  background: white;
  border-radius: 20px;
  width: 100%;
  max-width: 420px;
  max-height: 90vh;
  overflow-y: auto;
  box-shadow: 0 20px 60px rgba(0,0,0,.4);
  animation: modalSlideUp .3s cubic-bezier(.4,0,.2,1);
}
@keyframes modalSlideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
.pet-info-modal-inner::-webkit-scrollbar { width: 5px; }
.pet-info-modal-inner::-webkit-scrollbar-thumb { background: var(--rose-lt); border-radius: 99px; }
.pet-info-header {
  background: linear-gradient(160deg, var(--rose), var(--plum));
  color: white;
  padding: 1.4rem 1.5rem 1rem;
  text-align: center;
  position: relative;
}
.pet-info-header .close-btn {
  position: absolute;
  top: 12px; right: 12px;
  background: rgba(255,255,255,.25);
  border: none;
  width: 30px; height: 30px;
  border-radius: 50%;
  color: white;
  font-size: 16px;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: background .15s;
}
.pet-info-header .close-btn:hover { background: rgba(255,255,255,.4); }
.pet-info-body { padding: 1.4rem; }
.stat-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
  margin-bottom: 16px;
}
.stat-tile {
  background: linear-gradient(135deg, rgba(253,238,244,.4), white);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 10px 12px;
}
.stat-tile .label {
  font-size: 10.5px;
  color: var(--text3);
  letter-spacing: .5px;
  margin-bottom: 4px;
}
.stat-tile .value {
  font-size: 18px;
  font-weight: 700;
  color: var(--text1);
  font-variant-numeric: tabular-nums;
}
.stat-tile.hp .value { color: #E53935; }
.stat-tile.mp .value { color: #1E88E5; }
.stat-tile.atk .value { color: var(--rose2); }
.stat-tile.def .value { color: var(--plum); }
.stat-tile.eva .value { color: var(--mint); }
.stat-tile.pts .value { color: var(--gold); }
.equip-display-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 8px;
  margin-bottom: 12px;
}
.equip-display-slot {
  background: linear-gradient(135deg, rgba(253,238,244,.5), white);
  border: 1.5px solid var(--border);
  border-radius: 12px;
  padding: 10px 6px;
  text-align: center;
  min-height: 80px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
}
.equip-display-slot.has { background: linear-gradient(135deg, rgba(232,83,122,.08), rgba(155,89,182,.06)); border-color: var(--rose2); }
.equip-display-slot .e-icon { font-size: 28px; margin-bottom: 4px; filter: drop-shadow(0 2px 6px rgba(0,0,0,.15)); }
.equip-display-slot .e-slot { font-size: 9px; color: var(--text3); text-transform: uppercase; letter-spacing: .5px; margin-bottom: 2px; }
.equip-display-slot .e-name { font-size: 11px; font-weight: 700; line-height: 1.2; }
.equip-display-slot .e-stats { font-size: 9px; color: var(--text3); margin-top: 3px; }

/* ── ✨ 고퀄리티 펫 캐릭터 카드 ── */
.pet-character-card {
  position: relative;
  display: inline-block;
  padding: 16px;
  border-radius: 50%;
  background: radial-gradient(circle at 30% 30%, rgba(255,255,255,.6), rgba(232,83,122,.05));
}
.pet-character {
  position: relative;
  display: inline-block;
  font-size: 80px;
  filter: drop-shadow(0 6px 16px rgba(232,83,122,.4)) drop-shadow(0 -2px 4px rgba(255,255,255,.6));
  animation: petBreathe 3s ease-in-out infinite;
}
.pet-character.large { font-size: 100px; }
.pet-character.medium { font-size: 60px; }
.pet-character.small { font-size: 36px; }
.pet-character.tiny { font-size: 24px; }
@keyframes petBreathe {
  0%, 100% { transform: scale(1) translateY(0); }
  50% { transform: scale(1.05) translateY(-4px); }
}
.pet-character.legend {
  animation: petBreathe 2.5s ease-in-out infinite, petAura 4s linear infinite;
}
@keyframes petAura {
  0% { filter: drop-shadow(0 6px 16px rgba(255,215,0,.7)) drop-shadow(0 0 30px rgba(255,215,0,.5)) hue-rotate(0deg); }
  50% { filter: drop-shadow(0 6px 16px rgba(255,87,34,.7)) drop-shadow(0 0 40px rgba(255,87,34,.6)) hue-rotate(15deg); }
  100% { filter: drop-shadow(0 6px 16px rgba(255,215,0,.7)) drop-shadow(0 0 30px rgba(255,215,0,.5)) hue-rotate(0deg); }
}
.pet-equipment-overlay {
  position: absolute;
  pointer-events: none;
  font-size: 28px;
  filter: drop-shadow(0 3px 8px rgba(0,0,0,.3));
  animation: equipFloat 2s ease-in-out infinite;
}
@keyframes equipFloat {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-3px); }
}
.eq-head     { top: -12%; left: 50%; transform: translateX(-50%); font-size: 32px; z-index: 3; }
.eq-weapon   { right: -8%; bottom: 8%; font-size: 28px; transform: rotate(-20deg); z-index: 4; }
.eq-armor    { bottom: -8%; left: 50%; transform: translateX(-50%); font-size: 24px; opacity: .85; z-index: 2; }
.eq-wing     { top: 15%; left: -20%; font-size: 36px; animation: wingFlap 1.5s ease-in-out infinite; z-index: 1; }
@keyframes wingFlap {
  0%, 100% { transform: rotate(-12deg) scale(1, 1); }
  50% { transform: rotate(-20deg) scale(1, 1.1); }
}
.eq-accessory{ top: 10%; right: -10%; font-size: 22px; animation: accessoryPulse 2s ease-in-out infinite; z-index: 4; }
@keyframes accessoryPulse {
  0%, 100% { transform: scale(1); opacity: 1; }
  50% { transform: scale(1.15); opacity: .85; }
}
.eq-special  { top: -15%; right: -15%; font-size: 28px; animation: specialOrbit 4s linear infinite; z-index: 5; }
@keyframes specialOrbit {
  0%   { transform: rotate(0deg) translateX(8px) rotate(0deg); }
  100% { transform: rotate(360deg) translateX(8px) rotate(-360deg); }
}
.pet-shadow {
  position: absolute;
  bottom: -6px;
  left: 50%;
  transform: translateX(-50%);
  width: 70%;
  height: 12px;
  background: radial-gradient(ellipse, rgba(0,0,0,.25), transparent 70%);
  border-radius: 50%;
  filter: blur(2px);
  z-index: 0;
}
.evo-effect-particles {
  position: absolute;
  inset: 0;
  pointer-events: none;
  z-index: 6;
}
.evo-effect-particles span {
  position: absolute;
  font-size: 16px;
  animation: particleFloat 3s ease-in-out infinite;
}
.evo-effect-particles span:nth-child(1) { top: 10%; left: 20%; animation-delay: 0s; }
.evo-effect-particles span:nth-child(2) { top: 30%; right: 10%; animation-delay: .6s; }
.evo-effect-particles span:nth-child(3) { bottom: 25%; left: 15%; animation-delay: 1.2s; }
.evo-effect-particles span:nth-child(4) { bottom: 10%; right: 20%; animation-delay: 1.8s; }
@keyframes particleFloat {
  0%, 100% { opacity: 0; transform: translateY(0) scale(.5); }
  50% { opacity: 1; transform: translateY(-15px) scale(1); }
}
/* 등급별 후광 색상 */
.aura-rare    { background: radial-gradient(circle, rgba(33,150,243,.3), transparent 70%); }
.aura-epic    { background: radial-gradient(circle, rgba(156,39,176,.35), transparent 70%); }
.aura-unique  { background: radial-gradient(circle, rgba(255,87,34,.4), transparent 70%); }
.aura-legend  { background: radial-gradient(circle, rgba(244,67,54,.5), transparent 70%); }
.aura-rebirth { background: radial-gradient(circle, rgba(255,215,0,.6) 20%, rgba(255,87,34,.3) 50%, transparent 80%); animation: auraRotate 3s linear infinite; }
@keyframes auraRotate { 0%{transform:rotate(0deg) scale(1);} 50%{transform:rotate(180deg) scale(1.1);} 100%{transform:rotate(360deg) scale(1);} }
.pet-character-card.aura-rebirth { background: radial-gradient(circle, rgba(255,215,0,.6) 20%, rgba(255,87,34,.3) 50%, transparent 80%); animation: auraRotate 3s linear infinite; }
/* ── 향상된 펫 카드 ── */
.pet-card-3d { background:linear-gradient(160deg,rgba(253,238,244,.98),rgba(240,230,255,.98)); border-radius:20px; padding:1.5rem; text-align:center; position:relative; overflow:hidden; }
.pet-card-3d::before { content:''; position:absolute; top:-50%; left:-50%; width:200%; height:200%; background:radial-gradient(circle at 60% 40%, rgba(232,83,122,.08) 0%, transparent 50%); pointer-events:none; }
.pet-emoji-3d { font-size:80px; display:block; margin:0 auto 8px; filter:drop-shadow(0 8px 16px rgba(232,83,122,.3)); animation:float3d 3s ease-in-out infinite; }
@keyframes float3d { 0%,100%{transform:translateY(0) rotate(-2deg);} 50%{transform:translateY(-12px) rotate(2deg);} }
/* ── 랭킹 모드 탭 ── */
.lb-mode-tabs{display:flex;gap:6px;margin-bottom:10px;}
.lb-mode-btn{flex:1;padding:8px;font-size:12.5px;font-family:'Noto Sans KR',sans-serif;border:1.5px solid var(--border2);border-radius:8px;cursor:pointer;background:white;color:var(--text2);transition:all .15s;}
.lb-mode-btn.active{background:linear-gradient(135deg,var(--rose),var(--rose2));color:white;border-color:transparent;font-weight:600;}
/* ── 대기중 카드 ── */
.pending-card{background:linear-gradient(135deg,rgba(255,248,230,.98),rgba(255,252,240,.98));border:1.5px dashed var(--gold);border-radius:var(--r);padding:1.1rem;margin-bottom:8px;display:flex;align-items:center;gap:12px;}

/* ═══════════════════════════════════════
   🎰 GACHA / 박스 시스템
═══════════════════════════════════════ */
.gacha-stage{position:relative;background:linear-gradient(160deg,#1a0e2e 0%,#3a1854 60%,#5a1f7a 100%);border-radius:20px;padding:2rem 1.2rem;text-align:center;overflow:hidden;box-shadow:0 8px 32px rgba(80,30,150,.35);min-height:240px;}
.gacha-stage::before{content:'';position:absolute;inset:0;background:radial-gradient(circle at 50% 40%,rgba(255,200,100,.18) 0%,transparent 55%),radial-gradient(circle at 80% 80%,rgba(232,83,122,.18) 0%,transparent 55%);pointer-events:none;}
.gacha-stage::after{content:'✨ ⭐ ✨ ⭐ ✨ ⭐ ✨ ⭐';position:absolute;top:0;left:0;width:100%;font-size:14px;color:rgba(255,215,100,.18);letter-spacing:24px;pointer-events:none;line-height:34px;animation:starDrift 14s linear infinite;}
@keyframes starDrift{0%{transform:translateX(0)}100%{transform:translateX(-50px)}}
.gacha-box{font-size:96px;display:inline-block;filter:drop-shadow(0 12px 24px rgba(255,200,100,.45));position:relative;z-index:2;}
.gacha-box.shake{animation:gachaShake .8s cubic-bezier(.4,0,.2,1);}
@keyframes gachaShake{0%,100%{transform:rotate(0)}10%,30%,50%,70%,90%{transform:rotate(-12deg) translateY(-4px)}20%,40%,60%,80%{transform:rotate(12deg) translateY(-4px)}}
.gacha-box.burst{animation:gachaBurst .6s ease-out;}
@keyframes gachaBurst{0%{transform:scale(1);filter:drop-shadow(0 0 0 rgba(255,255,200,0))}50%{transform:scale(1.4);filter:drop-shadow(0 0 40px rgba(255,255,200,1))}100%{transform:scale(1);filter:drop-shadow(0 0 0 rgba(255,255,200,0))}}
.gacha-title{position:relative;z-index:2;font-family:'Playfair Display',serif;font-style:italic;font-size:24px;font-weight:700;color:#FFE082;margin:10px 0 4px;letter-spacing:.5px;text-shadow:0 2px 8px rgba(0,0,0,.4);}
.gacha-sub{position:relative;z-index:2;font-size:12px;color:rgba(255,255,255,.7);margin-bottom:18px;}
.gacha-buttons{position:relative;z-index:2;display:flex;gap:10px;justify-content:center;flex-wrap:wrap;}
.gacha-btn{padding:12px 22px;border:none;border-radius:99px;font-family:'Noto Sans KR',sans-serif;font-weight:700;font-size:13.5px;cursor:pointer;transition:all .2s;box-shadow:0 4px 16px rgba(0,0,0,.25);}
.gacha-btn.single{background:linear-gradient(135deg,#FF6B9D,#C73B65);color:white;}
.gacha-btn.ten{background:linear-gradient(135deg,#FFD700,#FF8C00);color:white;}
.gacha-btn:hover:not(:disabled){transform:translateY(-2px);box-shadow:0 6px 22px rgba(0,0,0,.35);}
.gacha-btn:disabled{opacity:.5;cursor:not-allowed;}
.gacha-result-card{background:white;border-radius:16px;padding:20px 16px;text-align:center;animation:fadeIn .5s ease;position:relative;overflow:hidden;}
.gacha-result-card .reward-emoji{font-size:64px;margin-bottom:6px;display:block;animation:pulse 1.6s ease-in-out infinite;}
.gacha-result-card.normal{border:2px solid #9E9E9E;}
.gacha-result-card.rare{border:2px solid #2196F3;box-shadow:0 0 20px rgba(33,150,243,.3);}
.gacha-result-card.epic{border:2px solid #FF5722;box-shadow:0 0 28px rgba(255,87,34,.35);}
.gacha-result-card.unique{border:2px solid #E91E63;box-shadow:0 0 32px rgba(233,30,99,.4);}
.gacha-result-card.legend{border:2px solid #FFD700;box-shadow:0 0 40px rgba(255,215,0,.55);background:linear-gradient(135deg,#FFFDE7,#FFF8E1);}
.gacha-result-card.legend::before{content:'';position:absolute;inset:-50%;background:conic-gradient(from 0deg,transparent,rgba(255,215,0,.4),transparent 30%);animation:legendSpin 3s linear infinite;pointer-events:none;}
@keyframes legendSpin{to{transform:rotate(360deg)}}
.gacha-result-card>*{position:relative;z-index:1;}
.grade-chip{display:inline-block;padding:3px 12px;border-radius:99px;font-size:10.5px;font-weight:700;color:white;letter-spacing:.5px;text-transform:uppercase;margin-bottom:6px;}
.grade-chip.normal{background:#9E9E9E;}
.grade-chip.rare{background:#2196F3;}
.grade-chip.epic{background:#FF5722;}
.grade-chip.unique{background:#E91E63;}
.grade-chip.legend{background:linear-gradient(135deg,#FFD700,#FF8C00);box-shadow:0 0 8px rgba(255,215,0,.5);}
.gacha-history{margin-top:14px;}
.gacha-history-item{display:flex;align-items:center;gap:8px;padding:7px 10px;background:white;border:1px solid var(--border);border-radius:8px;margin-bottom:5px;font-size:12.5px;}

/* ═══════════════════════════════════════
   👶 2세 네비게이션
═══════════════════════════════════════ */
.baby-nav{display:flex;align-items:center;justify-content:space-between;background:linear-gradient(135deg,rgba(155,89,182,.08),rgba(232,83,122,.06));border:1px solid rgba(155,89,182,.2);border-radius:12px;padding:8px 12px;margin-bottom:10px;}
.baby-nav-btn{background:white;border:1.5px solid var(--border2);border-radius:50%;width:34px;height:34px;display:flex;align-items:center;justify-content:center;font-size:16px;cursor:pointer;color:var(--rose2);transition:all .15s;}
.baby-nav-btn:hover:not(:disabled){background:var(--rose-lt);transform:scale(1.08);}
.baby-nav-btn:disabled{opacity:.3;cursor:not-allowed;}
.baby-nav-info{font-size:13px;font-weight:600;color:var(--plum);text-align:center;}
.baby-dots{display:flex;gap:5px;justify-content:center;margin-top:5px;}
.baby-dot{width:7px;height:7px;border-radius:50%;background:rgba(155,89,182,.2);transition:all .2s;}
.baby-dot.active{background:var(--plum);width:18px;border-radius:99px;}

/* ═══════════════════════════════════════
   📝 일일 퀘스트
═══════════════════════════════════════ */
.quest-card{background:linear-gradient(135deg,rgba(255,255,255,.96),rgba(253,238,244,.7));border:1.5px solid var(--border);border-radius:14px;padding:12px 14px;margin-bottom:8px;display:flex;align-items:center;gap:12px;transition:all .15s;}
.quest-card.done{border-color:var(--mint);background:linear-gradient(135deg,rgba(232,248,247,.9),rgba(240,253,252,.9));}
.quest-card.claimed{opacity:.55;border-style:dashed;}
.quest-icon{font-size:30px;flex-shrink:0;width:48px;height:48px;display:flex;align-items:center;justify-content:center;background:rgba(232,83,122,.08);border-radius:12px;}
.quest-card.done .quest-icon{background:rgba(46,196,182,.15);}
.quest-body{flex:1;min-width:0;}
.quest-title{font-size:13.5px;font-weight:700;color:var(--text1);margin-bottom:4px;}
.quest-progress-bar{height:5px;background:rgba(0,0,0,.06);border-radius:99px;overflow:hidden;}
.quest-progress-fill{height:100%;background:linear-gradient(90deg,var(--rose),var(--rose2));border-radius:99px;transition:width .4s ease;}
.quest-card.done .quest-progress-fill{background:linear-gradient(90deg,var(--mint),#1A9E95);}
.quest-progress-text{font-size:10.5px;color:var(--text3);margin-top:3px;}
.quest-claim-btn{padding:7px 14px;font-size:12px;font-weight:700;border:none;border-radius:8px;cursor:pointer;background:linear-gradient(135deg,var(--gold),#B8860B);color:white;flex-shrink:0;box-shadow:0 2px 8px rgba(212,168,83,.35);}
.quest-claim-btn:hover{opacity:.9;transform:scale(1.04);}
.quest-claim-btn:disabled{background:#ccc;cursor:not-allowed;box-shadow:none;}
.quest-header{background:linear-gradient(135deg,rgba(232,83,122,.08),rgba(124,63,126,.06));border:1px solid var(--border);border-radius:14px;padding:14px;margin-bottom:12px;text-align:center;}

/* ═══════════════════════════════════════
   💰 되팔기 버튼
═══════════════════════════════════════ */
.sell-btn{padding:4px 8px;font-size:10.5px;border:1px solid #FFB74D;background:linear-gradient(135deg,#FFE082,#FFCA28);color:#5D4037;border-radius:6px;cursor:pointer;font-weight:700;margin-left:4px;}
.sell-btn:hover{background:linear-gradient(135deg,#FFD54F,#FFA000);}

/* ═══════════════════════════════════════
   🎴 펫 카드 스킨
═══════════════════════════════════════ */
.lm-pet-card[data-skin="mint"]{background:linear-gradient(160deg,rgba(232,248,247,.98),rgba(200,230,225,.95));border-color:rgba(46,196,182,.4);}
.lm-pet-card[data-skin="ocean"]{background:linear-gradient(160deg,#E3F2FD,#BBDEFB);border:2px solid #2196F3;}
.lm-pet-card[data-skin="sunset"]{background:linear-gradient(160deg,#FFCCBC,#FFAB91,#FF8A65);border:2px solid #FF7043;color:#5D4037;}
.lm-pet-card[data-skin="forest"]{background:linear-gradient(160deg,#C8E6C9,#A5D6A7,#81C784);border:2px solid #43A047;}
.lm-pet-card[data-skin="fire"]{background:linear-gradient(160deg,#FFCDD2,#FF8A80,#FF5252);border:2px solid #D32F2F;color:white;position:relative;overflow:hidden;}
.lm-pet-card[data-skin="fire"]::before{content:'🔥 🔥 🔥 🔥 🔥';position:absolute;top:0;left:0;width:100%;font-size:18px;letter-spacing:30px;opacity:.18;line-height:30px;animation:fireFlicker 2s ease-in-out infinite;}
@keyframes fireFlicker{0%,100%{opacity:.15}50%{opacity:.28}}
.lm-pet-card[data-skin="galaxy"]{background:linear-gradient(160deg,#0D0D2B,#311B92,#5E35B1);border:2px solid #7E57C2;color:white;position:relative;overflow:hidden;}
.lm-pet-card[data-skin="galaxy"]::before{content:'✨ ⭐ ✨ ⭐ ✨ ⭐';position:absolute;top:0;left:0;width:100%;font-size:11px;letter-spacing:26px;color:rgba(255,255,255,.35);line-height:28px;animation:starDrift 12s linear infinite;}
.lm-pet-card[data-skin="galaxy"] .lm-stat .lbl,.lm-pet-card[data-skin="galaxy"] .pet-evolution-stage{color:rgba(255,255,255,.7) !important;}
.lm-pet-card[data-skin="royal"]{background:linear-gradient(160deg,#FFF8E1,#FFE082,#FFD54F);border:3px solid #FFD700;box-shadow:0 8px 32px rgba(255,215,0,.35);}
.lm-pet-card[data-skin="rainbow"]{background:linear-gradient(135deg,#FFCDD2 0%,#FFE0B2 16%,#FFF9C4 33%,#C8E6C9 50%,#B3E5FC 66%,#D1C4E9 83%,#F8BBD0 100%);background-size:300% 300%;border:2px solid white;animation:rainbowShift 8s ease infinite;}
@keyframes rainbowShift{0%,100%{background-position:0% 50%}50%{background-position:100% 50%}}
.lm-pet-card[data-skin="phantom"]{background:linear-gradient(160deg,#1a0e2e,#2d1b4e,#3a1854);border:2px solid #BA68C8;color:#E1BEE7;box-shadow:0 0 30px rgba(186,104,200,.35);position:relative;overflow:hidden;}
.lm-pet-card[data-skin="phantom"]::after{content:'';position:absolute;inset:0;background:radial-gradient(circle at 30% 30%,rgba(186,104,200,.15) 0%,transparent 50%);pointer-events:none;}
.lm-pet-card[data-skin="phantom"] .lm-stat .lbl,.lm-pet-card[data-skin="phantom"] .pet-evolution-stage{color:rgba(225,190,231,.7) !important;}

/* ═══════════════════════════════════════
   🎴 신규 카드 스킨 20종 — 고품질
═══════════════════════════════════════ */

/* 1. 크리스탈 — 다이아몬드 패턴 */
.lm-pet-card[data-skin="crystal"]{
  background:
    linear-gradient(135deg,rgba(255,255,255,.6) 0%,transparent 50%,rgba(255,255,255,.4) 100%),
    linear-gradient(160deg,#E1F5FE,#B3E5FC,#81D4FA);
  border:2px solid #4FC3F7;box-shadow:0 8px 24px rgba(79,195,247,.4),inset 0 0 30px rgba(255,255,255,.5);
  position:relative;overflow:hidden;
}
.lm-pet-card[data-skin="crystal"]::before{
  content:'';position:absolute;inset:0;
  background:
    linear-gradient(45deg,transparent 48%,rgba(255,255,255,.5) 50%,transparent 52%) 0 0/40px 40px,
    linear-gradient(-45deg,transparent 48%,rgba(255,255,255,.3) 50%,transparent 52%) 0 0/40px 40px;
  animation:crystalShine 4s ease-in-out infinite;pointer-events:none;
}
@keyframes crystalShine{0%,100%{opacity:.4;transform:translateX(-10px)}50%{opacity:.8;transform:translateX(10px)}}

/* 2. 월광 */
.lm-pet-card[data-skin="moonlight"]{
  background:linear-gradient(160deg,#1A237E 0%,#3949AB 50%,#5C6BC0 100%);
  border:2px solid #C5CAE9;color:#E8EAF6;
  box-shadow:0 0 40px rgba(159,168,218,.4);position:relative;overflow:hidden;
}
.lm-pet-card[data-skin="moonlight"]::before{
  content:'';position:absolute;top:-30%;right:-15%;width:200px;height:200px;
  background:radial-gradient(circle,rgba(255,255,240,.9) 0%,rgba(255,255,240,.3) 40%,transparent 70%);
  border-radius:50%;animation:moonGlow 5s ease-in-out infinite;pointer-events:none;
}
@keyframes moonGlow{0%,100%{opacity:.7;transform:scale(1)}50%{opacity:1;transform:scale(1.08)}}
.lm-pet-card[data-skin="moonlight"] .lm-stat .lbl,.lm-pet-card[data-skin="moonlight"] .pet-evolution-stage{color:rgba(232,234,246,.7) !important;}

/* 3. 얼음 결정 */
.lm-pet-card[data-skin="frozen"]{
  background:linear-gradient(160deg,#E0F7FA,#B2EBF2,#80DEEA);
  border:2px solid #00BCD4;box-shadow:0 6px 22px rgba(0,188,212,.35);
  position:relative;overflow:hidden;color:#004D5C;
}
.lm-pet-card[data-skin="frozen"]::before{
  content:'❄ ❅ ❆ ❄ ❅ ❆';position:absolute;inset:0;
  font-size:14px;letter-spacing:24px;line-height:30px;
  color:rgba(255,255,255,.7);animation:frozenFall 8s linear infinite;pointer-events:none;
}
@keyframes frozenFall{0%{transform:translateY(-30px)}100%{transform:translateY(30px)}}

/* 4. 벚꽃 흩날림 */
.lm-pet-card[data-skin="cherry"]{
  background:linear-gradient(160deg,#FCE4EC,#F8BBD0,#F48FB1);
  border:2px solid #EC407A;box-shadow:0 6px 22px rgba(236,64,122,.3);
  position:relative;overflow:hidden;
}
.lm-pet-card[data-skin="cherry"]::before{
  content:'🌸 ❀ 🌸 ❀ 🌸';position:absolute;inset:0;
  font-size:12px;letter-spacing:28px;line-height:32px;opacity:.45;
  animation:cherryDrift 9s linear infinite;pointer-events:none;
}
@keyframes cherryDrift{0%{transform:translate(-20px,-20px) rotate(0)}100%{transform:translate(20px,20px) rotate(360deg)}}

/* 5. 카본 섬유 */
.lm-pet-card[data-skin="carbon"]{
  background:
    repeating-linear-gradient(45deg,#1a1a1a 0,#1a1a1a 4px,#2a2a2a 4px,#2a2a2a 8px),
    repeating-linear-gradient(-45deg,#1a1a1a 0,#1a1a1a 4px,#2a2a2a 4px,#2a2a2a 8px);
  background-blend-mode:overlay;
  border:2px solid #00E676;color:#E8F5E9;
  box-shadow:0 6px 22px rgba(0,230,118,.25),inset 0 0 20px rgba(0,230,118,.1);
}
.lm-pet-card[data-skin="carbon"] .lm-stat .lbl,.lm-pet-card[data-skin="carbon"] .pet-evolution-stage{color:rgba(232,245,233,.7) !important;}

/* 6. 네온 글로우 */
.lm-pet-card[data-skin="neon"]{
  background:linear-gradient(160deg,#1a0033,#330066,#4a148c);
  border:2px solid #E91E63;color:#FCE4EC;
  box-shadow:0 0 40px rgba(233,30,99,.5),inset 0 0 30px rgba(233,30,99,.1);
  position:relative;
  animation:neonPulse 2s ease-in-out infinite;
}
@keyframes neonPulse{0%,100%{box-shadow:0 0 30px rgba(233,30,99,.4),inset 0 0 25px rgba(233,30,99,.1)}50%{box-shadow:0 0 50px rgba(233,30,99,.7),inset 0 0 35px rgba(233,30,99,.2)}}
.lm-pet-card[data-skin="neon"] .lm-stat .lbl,.lm-pet-card[data-skin="neon"] .pet-evolution-stage{color:rgba(252,228,236,.7) !important;}

/* 7. 마그마 — 흐르는 용암 */
.lm-pet-card[data-skin="magma"]{
  background:linear-gradient(160deg,#4A0E0E,#B71C1C,#FF6F00,#FFC107);
  background-size:200% 200%;border:2.5px solid #FF6F00;color:#FFF8E1;
  box-shadow:0 6px 28px rgba(255,111,0,.5);
  animation:magmaFlow 6s ease-in-out infinite;position:relative;overflow:hidden;
